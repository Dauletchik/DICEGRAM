<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICETOK Google Auth</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;}
h1{margin:20px;}
button{padding:12px;margin:10px;border-radius:8px;border:none;width:220px;background:#2563eb;color:white;}
#main{display:none;flex-direction:column;align-items:center;}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>
<body>

<h1>DICETOK</h1>

<div id="auth">
  <button onclick="googleLogin()">Войти через Google</button>
</div>

<div id="main">
  <h2>Добро пожаловать, <span id="userNameDisplay"></span></h2>
  <p>Ваш ник: <span id="userNick"></span></p>
  <img id="userAvatar" src="" width="80" style="border-radius:50%;">
</div>

<script>
// ===== Firebase Config =====
firebase.initializeApp({
  apiKey: "AIzaSyA8slPm58rciKbNbGAqA97VP2rWiENC9_k",
  authDomain: "flikyfloky-61eed.firebaseapp.com",
  projectId: "flikyfloky-61eed",
  storageBucket: "flikyfloky-61eed.firebasestorage.app",
  messagingSenderId: "167396726913",
  appId: "1:167396726913:web:dd012abf884a768c09d580",
  measurementId: "G-7YMLFXSKG3"
});

const auth = firebase.auth();
const db = firebase.firestore();

// ===== Google Login =====
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(result => {
      const user = result.user;
      // сохраняем данные в Firestore
      db.collection("users").doc(user.uid).set({
        name: user.displayName,
        email: user.email,
        avatar: user.photoURL,
        created: Date.now()
      }, {merge:true});
      
      // показываем профиль
      document.getElementById("auth").style.display="none";
      document.getElementById("main").style.display="flex";
      document.getElementById("userNameDisplay").innerText = user.displayName;
      document.getElementById("userNick").innerText = user.email.split('@')[0];
      document.getElementById("userAvatar").src = user.photoURL;
    })
    .catch(e => alert(e.message));
}

// ===== Автологин =====
auth.onAuthStateChanged(user=>{
  if(user){
    db.collection("users").doc(user.uid).get().then(doc=>{
      document.getElementById("auth").style.display="none";
      document.getElementById("main").style.display="flex";
      document.getElementById("userNameDisplay").innerText = doc.data().name;
      document.getElementById("userNick").innerText = doc.data().email.split('@')[0];
      document.getElementById("userAvatar").src = doc.data().avatar;
    });
  }
});
</script>

</body>
</html>

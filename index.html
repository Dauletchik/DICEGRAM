<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICEGRAM</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* старт */

.start{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:15px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.btn{
width:220px;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
}

input{
width:220px;
padding:12px;
border:none;
border-radius:10px;
}

.hidden{
display:none;
}

/* чат лист */

.header{
background:#1e293b;
padding:14px;
font-size:18px;
}

.search{
width:100%;
padding:10px;
border:none;
background:#0f172a;
color:white;
}

.chatlist{
height:90vh;
overflow:auto;
}

.chatitem{
display:flex;
gap:10px;
padding:14px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.chatitem img{
width:42px;
height:42px;
border-radius:50%;
}

/* чат */

.chat{
display:flex;
flex-direction:column;
height:100vh;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
display:flex;
gap:8px;
margin:8px 0;
}

.msg img{
width:30px;
height:30px;
border-radius:50%;
}

.time{
font-size:10px;
color:#aaa;
}

.inputbox{
display:flex;
padding:10px;
background:#1e293b;
}

.inputbox input{
flex:1;
margin-right:6px;
}

.send{
padding:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}

</style>
</head>

<body>

<!-- старт -->

<div id="start" class="start">

<div class="logo">DICEGRAM</div>

<button class="btn" onclick="showRegister()">Зарегистрироваться</button>
<button class="btn" onclick="showLogin()">Войти</button>

</div>

<!-- регистрация -->

<div id="register" class="start hidden">

<h3>Регистрация</h3>

<input id="r_name" placeholder="Никнейм">
<input id="r_user" placeholder="@username">
<input id="r_pass" placeholder="Пароль">

<button class="btn" onclick="register()">Создать</button>

</div>

<!-- вход -->

<div id="login" class="start hidden">

<h3>Вход</h3>

<input id="l_user" placeholder="@username">
<input id="l_pass" placeholder="Пароль">

<button class="btn" onclick="login()">Войти</button>

</div>

<!-- список -->

<div id="main" class="hidden">

<div class="header">
<input id="search" class="search" placeholder="Поиск @username" oninput="searchUser()">
</div>

<div id="chatlist" class="chatlist"></div>

</div>

<!-- чат -->

<div id="chatpage" class="chat hidden">

<div class="header" onclick="back()">← Назад</div>

<div id="messages" class="messages"></div>

<div class="inputbox">
<input id="msg">
<button class="send" onclick="sendMsg()">Отправить</button>
</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("dice_users"))||[]
let chats=JSON.parse(localStorage.getItem("dice_chats"))||{}

let me=null
let currentChat=null

function save(){
localStorage.setItem("dice_users",JSON.stringify(users))
localStorage.setItem("dice_chats",JSON.stringify(chats))
}

function showRegister(){
start.classList.add("hidden")
register.classList.remove("hidden")
}

function showLogin(){
start.classList.add("hidden")
login.classList.remove("hidden")
}

function register(){

let name=r_name.value
let username=r_user.value.replace("@","")
let pass=r_pass.value

let check=/^[a-zA-Z0-9]{6,18}$/

if(!check.test(pass)){
alert("Пароль 6-18 латиница или цифры")
return
}

if(users.find(u=>u.username==username)){
alert("username занят")
return
}

let user={
id:Date.now(),
name:name,
username:username,
pass:pass,
avatar:"https://i.imgur.com/4M34hi2.png"
}

users.push(user)

if(!users.find(x=>x.bot)){
users.push({
id:1,
name:"DICEGRAM",
username:"dicegram",
avatar:"https://i.imgur.com/Q8QZQ9B.png",
bot:true
})
}

save()

let chatId=[user.id,1].sort().join("_")

chats[chatId]=[
{
text:"Вы успешно зарегистрировали аккаунт @"+username,
time:new Date().toLocaleTimeString().slice(0,5),
avatar:"https://i.imgur.com/Q8QZQ9B.png"
}
]

save()

alert("Аккаунт создан")

}

function login(){

let username=l_user.value.replace("@","")
let pass=l_pass.value

let user=users.find(u=>u.username==username && u.pass==pass)

if(!user){
alert("Неверный логин")
return
}

me=user

login.classList.add("hidden")
main.classList.remove("hidden")

renderChats()

}

function renderChats(){

chatlist.innerHTML=""

users.forEach(u=>{

if(u.id==me.id)return

chatlist.innerHTML+=`
<div class="chatitem" onclick="openChat('${u.id}')">
<img src="${u.avatar}">
<div>
<div>${u.name}</div>
<div style="font-size:12px;color:gray">@${u.username}</div>
</div>
</div>
`

})

}

function openChat(id){

currentChat=id

main.classList.add("hidden")
chatpage.classList.remove("hidden")

renderMessages()

}

function renderMessages(){

let chatId=[me.id,currentChat].sort().join("_")

let m=chats[chatId]||[]

messages.innerHTML=""

m.forEach(x=>{

messages.innerHTML+=`
<div class="msg">
<img src="${x.avatar}">
<div>
<div>${x.text}</div>
<div class="time">${x.time}</div>
</div>
</div>
`

})

}

function sendMsg(){

let text=msg.value

if(!text)return

let chatId=[me.id,currentChat].sort().join("_")

if(!chats[chatId])chats[chatId]=[]

chats[chatId].push({
text:text,
time:new Date().toLocaleTimeString().slice(0,5),
avatar:me.avatar
})

save()

msg.value=""

renderMessages()

}

function back(){
chatpage.classList.add("hidden")
main.classList.remove("hidden")
}

function searchUser(){

let v=search.value.replace("@","")

let u=users.find(x=>x.username==v)

if(u && u.id!=me.id){

chatlist.innerHTML=`
<div class="chatitem" onclick="openChat('${u.id}')">
<img src="${u.avatar}">
<div>
<div>${u.name}</div>
<div>@${u.username}</div>
</div>
</div>
`

}else{
renderChats()
}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BIO DAULET | MAX ENERGY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0a0015, #010003);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', 'Montserrat', system-ui, sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
            position: relative;
        }

        /* Энергетический фон с динамическими полосами */
        .energy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #ff3366, #ff9933);
            border-radius: 50%;
            filter: blur(3px);
            animation: floatParticle 6s infinite alternate ease-in-out;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0px) translateX(0px) scale(1);
                opacity: 0.2;
            }
            100% {
                transform: translateY(-60px) translateX(40px) scale(1.5);
                opacity: 0.7;
            }
        }

        /* Волновой эффект от баса */
        .bass-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #ff3366, #ffcc00, #ff3366);
            filter: blur(4px);
            z-index: 99;
            animation: bassPulse 0.2s infinite;
            pointer-events: none;
        }

        @keyframes bassPulse {
            0% { height: 4px; opacity: 0.6; }
            100% { height: 18px; opacity: 1; }
        }

        /* Главная карточка с неоновым свечением */
        .glass-card {
            position: relative;
            z-index: 20;
            backdrop-filter: blur(20px);
            background: rgba(8, 5, 20, 0.65);
            border-radius: 80px;
            padding: 2.2rem 2rem 2.8rem;
            width: 90%;
            max-width: 600px;
            border: 2px solid rgba(255, 70, 120, 0.7);
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.5), 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.2);
            text-align: center;
            animation: cardExplode 0.8s cubic-bezier(0.34, 1.2, 0.64, 1);
            transition: transform 0.1s ease;
        }

        @keyframes cardExplode {
            0% {
                opacity: 0;
                transform: scale(0.6) rotate(-5deg);
                filter: blur(12px);
            }
            40% {
                transform: scale(1.05) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
                filter: blur(0);
            }
        }

        /* ГЛАВНЫЙ ЗАГОЛОВОК С ДРОЖАНИЕМ */
        .glow-title {
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(45deg, #FFD166, #FF4D6D, #C9184A, #FFB347, #FF4D6D);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 2s ease infinite, textShake 1.2s infinite alternate;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px #ff3366;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes textShake {
            0% { transform: translate(0px, 0px); text-shadow: 0 0 5px #ff3366; letter-spacing: 6px; }
            100% { transform: translate(2px, -1px); text-shadow: 0 0 25px #ff6699; letter-spacing: 8px; }
        }

        .sub {
            font-size: 1.1rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.7);
            display: inline-block;
            padding: 0.3rem 1.8rem;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            margin-bottom: 2rem;
            color: #ffcc88;
            border: 1px solid #ff6680;
            box-shadow: 0 0 12px rgba(255,80,120,0.6);
            animation: subPulse 1s infinite;
        }

        @keyframes subPulse {
            0% { box-shadow: 0 0 0px #ff3366; }
            100% { box-shadow: 0 0 18px #ff6699; }
        }

        /* СЕТКА ССЫЛОК - НЕВЕРОЯТНЫЕ ЗНАЧКИ */
        .links-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem;
            margin: 2rem 0 1.5rem;
        }

        .social-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.2, 1.8, 0.4, 1);
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
        }

        .icon-bubble {
            width: 95px;
            height: 95px;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1f);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 80, 120, 0.9);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.7);
        }

        .social-item:hover .icon-bubble {
            transform: scale(1.25) translateY(-12px) rotate(3deg);
            background: radial-gradient(circle, #ff4d6d, #c9184a);
            border-color: #ffdf80;
            box-shadow: 0 0 40px #ff3366;
        }

        .social-item:active .icon-bubble {
            transform: scale(0.96) translateY(4px);
        }

        .social-label {
            margin-top: 14px;
            font-weight: 800;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffddbb;
            letter-spacing: 1.5px;
            backdrop-filter: blur(4px);
            border: 1px solid #ff6680;
        }

        .social-item:hover .social-label {
            background: #ff3366;
            color: white;
            box-shadow: 0 0 15px #ff3366;
        }

        /* Доп. энергичный текст */
        .energy-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            color: #ffc285;
            animation: footerGlow 0.9s infinite alternate;
        }

        @keyframes footerGlow {
            0% { text-shadow: 0 0 0px #ff884d; box-shadow: 0 0 0px #ff4d6d; }
            100% { text-shadow: 0 0 8px #ff4d6d; box-shadow: 0 0 18px #ff4d6d; }
        }

        /* Анимация тряски всей карточки при клике */
        .shake-card {
            animation: cardShake 0.2s cubic-bezier(0.36, 2.5, 0.64, 1) 0s 2;
        }

        @keyframes cardShake {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(4px, -2px) rotate(1deg); }
            50% { transform: translate(-3px, 1px) rotate(-1deg); }
            75% { transform: translate(2px, -1px) rotate(0.5deg); }
            100% { transform: translate(0,0); }
        }

        @media (max-width: 550px) {
            .glow-title { font-size: 2.5rem; letter-spacing: 3px; }
            .icon-bubble { width: 70px; height: 70px; font-size: 2.8rem; }
            .links-grid { gap: 1.5rem; }
            .glass-card { padding: 1.5rem; }
        }

        /* Визуализатор звука (простой эквалайзер) */
        .vizualizer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }
        .viz-bar {
            width: 6px;
            height: 18px;
            background: #ff4d6d;
            border-radius: 4px;
            transition: height 0.05s ease;
        }
    </style>
</head>
<body>

<div class="energy-bg" id="particleBg"></div>
<div class="bass-wave"></div>
<div class="vizualizer" id="vizualizer">
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
    <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
</div>

<div class="glass-card" id="mainCard">
    <div class="glow-title" id="bioTitle">BIO DAULET</div>
    <div class="sub">🔥 ENERGY OVERDRIVE 🔥</div>
    
    <div class="links-grid">
        <a class="social-item" id="vkLink" href="#" target="_blank" rel="noopener noreferrer">
            <div class="icon-bubble">🎧</div>
            <div class="social-label">VK</div>
        </a>
        <a class="social-item" id="tgLink" href="#" target="_blank" rel="noopener noreferrer">
            <div class="icon-bubble">✈️</div>
            <div class="social-label">TELEGRAM</div>
        </a>
        <a class="social-item" id="ttLink" href="#" target="_blank" rel="noopener noreferrer">
            <div class="icon-bubble">🎵</div>
            <div class="social-label">TIKTOK</div>
        </a>
    </div>
    
    <div class="energy-footer">
        ⚡ TAP ANY ICON — EXPLOSIVE VIBE ⚡
    </div>
</div>

<script>
    (function() {
        // ----- МОЩНЫЙ ЗВУК: БЕЗ КНОПКИ ВКЛ/ВЫКЛ, ВСЕГДА ИГРАЕТ -----
        let audioCtx = null;
        let masterGain = null;
        let bassGain = null;
        let isAudioStarted = false;
        let beatInterval = null;
        let visualizerInterval = null;
        
        // Базовые частоты для тяжелого бита
        const KICK_FREQ = 70;    // глубокий бас
        const SNARE_FREQ = 1200;
        const HAT_FREQ = 4800;
        const MELODY_BASE = 440;
        
        // Инициализация звука ПРИ СТАРТЕ (автоматически, с использованием первого клика, но звук включается мгновенно по правилам браузера)
        function initPowerSound() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                bassGain = audioCtx.createGain();
                masterGain.gain.value = 0.65;  // громкий, насыщенный
                bassGain.gain.value = 0.8;
                
                masterGain.connect(audioCtx.destination);
                bassGain.connect(masterGain);
                
                // Запускаем тяжелый ритм сразу после разрешения контекста
                startHardcoreBeat();
                
                // Визуализатор звука
                startVisualizer();
                
            } catch(e) {
                console.warn("Аудио не поддерживается, но сайт живёт", e);
            }
        }
        
        function playTone(frequency, duration, volume = 0.4, type = 'sine', useBass = false) {
            if (!audioCtx || !masterGain) return;
            if (audioCtx.state !== 'running') return;
            
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = frequency;
            
            let targetGain = useBass ? bassGain : masterGain;
            gainNode.connect(targetGain);
            osc.connect(gainNode);
            
            gainNode.gain.setValueAtTime(volume, now);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        
        // Основной энергетический драм-луп (тяжелый бит)
        let beatActive = false;
        function startHardcoreBeat() {
            if (beatInterval) clearInterval(beatInterval);
            if (!audioCtx) return;
            
            beatActive = true;
            let beatCount = 0;
            
            // первый мощный удар сразу при запуске
            const playKick = () => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                // Кик (глубокий бас)
                const oscKick = audioCtx.createOscillator();
                const gainKick = audioCtx.createGain();
                oscKick.type = 'triangle';
                oscKick.frequency.value = 80;
                gainKick.gain.setValueAtTime(0.7, audioCtx.currentTime);
                gainKick.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                oscKick.connect(gainKick);
                gainKick.connect(masterGain);
                oscKick.start();
                oscKick.stop(audioCtx.currentTime + 0.25);
                
                // добавочный низкий бум
                const subOsc = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.value = 55;
                subGain.gain.setValueAtTime(0.45, audioCtx.currentTime);
                subGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                subOsc.connect(subGain);
                subGain.connect(masterGain);
                subOsc.start();
                subOsc.stop(audioCtx.currentTime + 0.3);
            };
            
            const playSnare = () => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = 1100;
                gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            };
            
            const playHat = () => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = 5200;
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            };
            
            // басовый дроп каждый 2й такт
            const playBassDrop = () => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const bassOsc = audioCtx.createOscillator();
                const bassGainNode = audioCtx.createGain();
                bassOsc.type = 'sawtooth';
                bassOsc.frequency.value = 62;
                bassGainNode.gain.setValueAtTime(0.55, audioCtx.currentTime);
                bassGainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                bassOsc.connect(bassGainNode);
                bassGainNode.connect(masterGain);
                bassOsc.start();
                bassOsc.stop(audioCtx.currentTime + 0.35);
            };
            
            beatInterval = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running' || !beatActive) return;
                playKick();     // каждый такт кик
                
                if (beatCount % 2 === 0) {
                    playSnare();   // снэр на каждом втором
                }
                if (beatCount % 1 === 0) {
                    playHat();    // хэт часто
                }
                if (beatCount % 4 === 2) {
                    playBassDrop();  // мощный дроп
                    // дополнительная вибрация полоски баса
                    const waveDiv = document.querySelector('.bass-wave');
                    if(waveDiv) {
                        waveDiv.style.animation = 'none';
                        setTimeout(() => waveDiv.style.animation = 'bassPulse 0.2s infinite', 5);
                    }
                }
                beatCount = (beatCount + 1) % 8;
            }, 320);  // ~187 BPM — очень энергично!
        }
        
        // Визуализатор (синхронизация с битом)
        function startVisualizer() {
            const bars = document.querySelectorAll('.viz-bar');
            if (!bars.length) return;
            visualizerInterval = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running') {
                    // простая анимация даже без звука для динамики
                    bars.forEach((bar, idx) => {
                        const h = Math.sin(Date.now() * 0.015 + idx) * 12 + 12;
                        bar.style.height = Math.max(6, h) + 'px';
                    });
                    return;
                }
                // Имитация басового визуала
                bars.forEach((bar, i) => {
                    let intensity = Math.random() * 24 + 8;
                    if (i % 2 === 0) intensity += 10;
                    bar.style.height = intensity + 'px';
                    bar.style.background = `linear-gradient(180deg, #ff6699, #ffcc33)`;
                });
            }, 90);
        }
        
        // запуск звука с автополитикой: любой жест пользователя включает контекст.
        // но мы его резолвим при первом клике или тапе.
        function resumeAudioContext() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    console.log('Звук активирован! Мощный бит поехал');
                    if (!beatActive) startHardcoreBeat();
                }).catch(e=>console.log);
            } else if (!audioCtx) {
                initPowerSound();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }
        }
        
        // Добавляем слушатели на весь документ для активации звука (первое же взаимодействие включает)
        document.body.addEventListener('click', resumeAudioContext, { once: false });
        document.body.addEventListener('touchstart', resumeAudioContext, { once: false });
        
        // также пробуем авто-резолв через "старт" имитации, но браузеры блокируют, поэтому ждём клик.
        // но чтобы звук заиграл мгновенно при любом клике по кнопке или значку - делаем
        
        // Установка ссылок
        const VK_URL = "https://vk.ru/dauletchik";
        const TG_URL = "http://t.me/HETY_HOMEP";
        const TT_URL = "https://tiktok.com/@dauproff";
        
        document.getElementById('vkLink').href = VK_URL;
        document.getElementById('tgLink').href = TG_URL;
        document.getElementById('ttLink').href = TT_URL;
        
        // Функция клика - мощный звуковой фидбек + тряска
        function onSocialClick(event, platform) {
            event.preventDefault();
            // Воспроизводим взрывной звук при клике
            if (audioCtx && audioCtx.state === 'running') {
                // Взрывной панч
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sawtooth';
                osc1.frequency.value = 220;
                gain1.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc1.connect(gain1);
                gain1.connect(masterGain);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.2);
                
                setTimeout(() => {
                    if(!audioCtx) return;
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'square';
                    osc2.frequency.value = 880;
                    gain2.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc2.connect(gain2);
                    gain2.connect(masterGain);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.15);
                }, 30);
            }
            
            // тряска карточки
            const card = document.getElementById('mainCard');
            card.classList.add('shake-card');
            setTimeout(() => card.classList.remove('shake-card'), 300);
            
            // анимация заголовка
            const title = document.getElementById('bioTitle');
            title.style.animation = 'none';
            setTimeout(() => {
                title.style.animation = 'gradientShift 2s ease infinite, textShake 1.2s infinite alternate';
            }, 10);
            
            // перенаправление через 50 мс для эффекта
            let link;
            if (platform === 'vk') link = VK_URL;
            else if (platform === 'tg') link = TG_URL;
            else link = TT_URL;
            
            setTimeout(() => {
                window.open(link, '_blank');
            }, 70);
        }
        
        document.getElementById('vkLink').addEventListener('click', (e) => onSocialClick(e, 'vk'));
        document.getElementById('tgLink').addEventListener('click', (e) => onSocialClick(e, 'tg'));
        document.getElementById('ttLink').addEventListener('click', (e) => onSocialClick(e, 'tt'));
        
        // создание фоновых частиц в огромном количестве
        function createMassiveParticles() {
            const container = document.getElementById('particleBg');
            for(let i=0;i<120;i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                let size = Math.random() * 18 + 3;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 8 + 3 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                const hue = Math.random() * 20 + 330;
                p.style.background = `radial-gradient(circle, hsl(${hue}, 90%, 65%), hsl(${hue}, 80%, 45%))`;
                p.style.boxShadow = `0 0 25px hsl(${hue}, 80%, 60%)`;
                container.appendChild(p);
            }
        }
        createMassiveParticles();
        
        // динамический неон по краям карты
        setInterval(() => {
            const card = document.querySelector('.glass-card');
            if(card) {
                let glow = Math.sin(Date.now() / 300) * 0.3 + 0.7;
                card.style.boxShadow = `0 0 ${30 + glow * 20}px rgba(255, 51, 102, 0.7), 0 20px 40px black, inset 0 0 12px rgba(255,100,100,0.4)`;
            }
        }, 100);
        
        // Инициализация звука при загрузке (контекст создастся, но будет suspended до клика)
        // но пользователь кликнет куда-то гарантированно, звук проснется
        initPowerSound();
        
        // дополнительно: если страница загружена, показываем сообщение "tap to unleash"
        console.log('🔥 MAX ENERGY MODE 🔥');
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE GRAM Mobile Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0e1621;
            --bg-sidebar: #17212b;
            --bg-item-active: #2b5278;
            --accent: #5288c1;
            --text-primary: #f5f5f5;
            --text-secondary: #708499;
            --msg-in: #182533;
            --msg-out: #2b5278;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; }

        /* --- АДАПТИВНЫЙ LAYOUT --- */
        .app-container { display: flex; width: 100%; height: 100%; position: relative; }

        .sidebar {
            width: 350px; background: var(--bg-sidebar); display: flex; flex-direction: column;
            border-right: 1px solid #0e1621; transition: transform 0.3s ease;
        }

        .chat-window {
            flex: 1; display: flex; flex-direction: column; background: var(--bg-main);
            transition: transform 0.3s ease; position: relative;
        }

        /* Мобильная логика */
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; z-index: 10; }
            .chat-window { position: absolute; width: 100%; height: 100%; z-index: 5; transform: translateX(100%); }
            
            /* Классы для переключения состояния на мобилках */
            body.chat-open .sidebar { transform: translateX(-100%); }
            body.chat-open .chat-window { transform: translateX(0); z-index: 20; }
        }

        /* --- UI ЭЛЕМЕНТЫ --- */
        .header { height: 60px; background: var(--bg-sidebar); display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        .back-btn { display: none; cursor: pointer; font-size: 20px; color: var(--accent); }
        
        @media (max-width: 768px) { .back-btn { display: block; } }

        .search-container { padding: 10px; background: var(--bg-sidebar); }
        .search-container input {
            width: 100%; background: #242f3d; border: none; padding: 10px 15px;
            border-radius: 8px; color: white; outline: none;
        }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex; padding: 12px 15px; cursor: pointer; gap: 12px; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .chat-item:hover { background: #232e3c; }
        .chat-item.active { background: var(--bg-item-active); }

        .avatar {
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0;
        }

        /* --- СООБЩЕНИЯ И ССЫЛКИ --- */
        .messages-area {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .bubble {
            max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14.5px; line-height: 1.4;
            position: relative; word-wrap: break-word;
        }
        .bubble.out { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }
        .bubble.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }

        /* Стиль для @username ссылок */
        .mention { color: #82b1ff; cursor: pointer; font-weight: 500; text-decoration: none; }
        .mention:hover { text-decoration: underline; }

        .input-area { padding: 10px 15px 20px; background: var(--bg-main); display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: var(--bg-sidebar); border-radius: 20px; padding: 10px 15px; }
        .input-box input { width: 100%; background: none; border: none; color: white; outline: none; }
        
        .send-btn { color: var(--accent); font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="header">
                <i class="fa-solid fa-bars" style="color: var(--text-secondary)"></i>
                <span style="font-weight: bold; color: var(--accent)">DICE GRAM</span>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск @username...">
            </div>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <main class="chat-window" id="chatWindow">
            <header class="header">
                <i class="fa-solid fa-arrow-left back-btn" onclick="closeChat()"></i>
                <div class="avatar" id="headerAvatar" style="width: 40px; height: 40px; font-size: 14px;">?</div>
                <div class="header-info">
                    <div id="headerName" style="font-weight: 500;">Выберите чат</div>
                    <div id="headerStatus" style="font-size: 12px; color: var(--text-secondary);"></div>
                </div>
            </header>

            <div class="messages-area" id="msgArea">
                <div style="text-align: center; margin-top: 50px; color: var(--text-secondary);">Выберите, кому написать</div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="msgInput" placeholder="Сообщение..." disabled autocomplete="off">
                </div>
                <i class="fa-solid fa-paper-plane send-btn" id="sendBtn"></i>
            </div>
        </main>
    </div>

<script>
    // --- ДАННЫЕ ПРИЛОЖЕНИЯ ---
    let state = {
        activeChatId: null,
        chats: JSON.parse(localStorage.getItem('dg_v6_data')) || [
            { id: 'dice_official', name: 'JavaScript Bot', user: '@dice_official', color: '#f39c12', history: [{text: 'Привет! Напиши мне @admin или любое другое @имя.', type: 'in'}] }
        ]
    };

    // --- ЛОГИКА ССЫЛОК @USERNAME ---
    function parseMentions(text) {
        // Регулярное выражение ищет слова начинающиеся с @
        return text.replace(/@(\w+)/g, '<span class="mention" onclick="handleMentionClick(\'@$1\', event)">@$1</span>');
    }

    function handleMentionClick(username, event) {
        event.stopPropagation();
        const existing = state.chats.find(c => c.user.toLowerCase() === username.toLowerCase());
        
        if (existing) {
            selectChat(existing.id);
        } else {
            // Если юзера нет, создаем его
            const newId = 'chat_' + Date.now();
            const newChat = {
                id: newId,
                name: username.replace('@', ''),
                user: username,
                color: '#' + Math.floor(Math.random()*16777215).toString(16),
                history: []
            };
            state.chats.push(newChat);
            save();
            renderChatList();
            selectChat(newId);
        }
    }

    // --- UI ФУНКЦИИ ---
    function renderChatList(filter = '') {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        
        state.chats.filter(c => c.user.includes(filter)).forEach(chat => {
            const lastMsg = chat.history.length > 0 ? chat.history[chat.history.length-1].text : 'Нет сообщений';
            const item = document.createElement('div');
            item.className = `chat-item ${state.activeChatId === chat.id ? 'active' : ''}`;
            item.innerHTML = `
                <div class="avatar" style="background:${chat.color}">${chat.name[0]}</div>
                <div style="flex:1; overflow:hidden">
                    <div style="font-weight:500">${chat.name}</div>
                    <div style="font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${lastMsg}</div>
                </div>
            `;
            item.onclick = () => selectChat(chat.id);
            list.appendChild(item);
        });
    }

    function selectChat(id) {
        state.activeChatId = id;
        const chat = state.chats.find(c => c.id === id);
        
        // Mobile: Открываем окно чата
        document.body.classList.add('chat-open');

        document.getElementById('headerName').textContent = chat.name;
        document.getElementById('headerStatus').textContent = chat.user;
        document.getElementById('headerAvatar').textContent = chat.name[0];
        document.getElementById('headerAvatar').style.background = chat.color;
        
        document.getElementById('msgInput').disabled = false;
        document.getElementById('msgInput').focus();

        renderMessages();
        renderChatList();
    }

    function closeChat() {
        document.body.classList.remove('chat-open');
    }

    function renderMessages() {
        const area = document.getElementById('msgArea');
        area.innerHTML = '';
        const chat = state.chats.find(c => c.id === state.activeChatId);
        
        chat.history.forEach(m => {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${m.type}`;
            // Применяем парсинг меншенов при отрисовке
            bubble.innerHTML = parseMentions(m.text);
            area.appendChild(bubble);
        });
        area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !state.activeChatId) return;

        const chat = state.chats.find(c => c.id === state.activeChatId);
        chat.history.push({ text: text, type: 'out' });
        
        input.value = '';
        renderMessages();
        save();
        renderChatList();

        // Простая имитация ответа для бота
        if (state.activeChatId === 'dice_official') {
            setTimeout(() => {
                chat.history.push({ text: 'Принято! Попробуй нажать на @admin в твоем сообщении.', type: 'in' });
                renderMessages();
                save();
                renderChatList();
            }, 1000);
        }
    }

    // --- ПОИСК ---
    document.getElementById('searchInput').oninput = (e) => {
        renderChatList(e.target.value);
    };

    // --- УПРАВЛЕНИЕ ---
    function save() { localStorage.setItem('dg_v6_data', JSON.stringify(state.chats)); }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // Запуск
    renderChatList();
</script>
</body>
</html>

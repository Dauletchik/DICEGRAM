<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Онлайн Бутылочка - Spin the Bottle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #141416;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка игры */
        .game-header {
            text-align: center;
            padding: 10px;
            background: #1c1c1e;
            border-bottom: 1px solid #2c2c2e;
            z-index: 110;
        }
        .status-msg {
            font-size: 16px;
            font-weight: bold;
            color: #ffd32a;
            min-height: 20px;
            margin-bottom: 4px;
        }
        .kisses-panel {
            font-size: 13px;
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            padding: 3px 12px;
            border-radius: 12px;
            display: inline-block;
            font-weight: bold;
        }

        /* Прямоугольное игровое поле */
        .board-container {
            position: relative;
            width: 100%;
            height: 50vh; 
            background-color: #d1b894; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Бутылочка строго по центру игрового поля */
        .bottle-node {
            position: absolute;
            width: 45px;
            height: 135px;
            top: calc(50% - 67.5px);
            left: calc(50% - 22.5px);
            z-index: 100;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 3.8s cubic-bezier(0.2, 1, 0.2, 1), opacity 0.4s;
            transform: rotate(0deg);
        }
        .bottle-node.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .bottle-img {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.5));
        }

        /* Квадратные аватарки игроков с фиксированной разметкой по кругу */
        .grid-player {
            position: absolute;
            width: 65px;
            height: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .square-avatar {
            width: 52px;
            height: 52px;
            background: #2c3e50;
            border-radius: 12px; 
            border: 3px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: border-color 0.3s, box-shadow 0.3s;
            overflow: hidden;
        }
        .grid-player.active-spinner .square-avatar {
            border-color: #ffd32a;
            box-shadow: 0 0 12px #ffd32a;
        }
        .grid-player.active-target .square-avatar {
            border-color: #ff4757;
            box-shadow: 0 0 12px #ff4757;
        }
        .meta-name {
            font-size: 10px;
            color: #1e1e24; 
            font-weight: bold;
            margin-top: 3px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 100% Точные координаты рассадки 12 игроков по краям */
        /* Верхний ряд */
        #user-p0 { top: 12px; left: 8%; }
        #user-p1 { top: 12px; left: 32%; }
        #user-p2 { top: 12px; left: 58%; }
        #user-p3 { top: 12px; left: 82%; }
        /* Правая колонка */
        #user-p4 { top: 35%; right: 8%; }
        #user-p5 { top: 62%; right: 8%; }
        /* Нижний ряд (исправлено наложение) */
        #user-p6 { bottom: 12px; left: 82%; }
        #user-p7 { bottom: 12px; left: 58%; }
        #user-p8 { bottom: 12px; left: 32%; }
        #user-p9 { bottom: 12px; left: 8%; }
        /* Левая колонка */
        #user-p10 { top: 62%; left: 8%; }
        #user-p11 { top: 35%; left: 8%; }

        /* Облачка выбора */
        .vote-bubble {
            position: absolute;
            top: -22px;
            background: #ffffff;
            color: #000000;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 150;
        }

        /* Панель поцелуев в центре */
        .choice-panel-box {
            position: absolute;
            bottom: 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 200;
            width: 100%;
        }
        .choice-txt {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(0,0,0,0.85);
            padding: 5px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            text-align: center;
        }
        .choice-row-btns {
            display: flex;
            gap: 20px;
        }
        .act-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        .act-btn:active { transform: scale(0.9); }
        .btn-heart { background: #2ecc71; color: white; }
        .btn-cross { background: #e74c3c; color: white; }

        /* Игровой чат */
        .chat-section {
            flex: 1;
            background: #1c1c1e;
            border-top: 2px solid #2c2c2e;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 38vh;
        }
        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .chat-mini-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #485e74;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .chat-body-text {
            background: #2c2c2e;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 13px;
            max-width: 85%;
            line-height: 1.3;
        }
        .chat-sender-name {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 5px;
        }

        /* Панель ввода сообщений */
        .chat-input-bar {
            display: flex;
            padding: 8px;
            background: #141416;
            gap: 8px;
            align-items: center;
        }
        .chat-input-field {
            flex: 1;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .chat-submit-btn {
            width: 38px;
            height: 38px;
            background: #ff4757;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Анимация летящих сердец */
        .fx-heart {
            position: absolute;
            font-size: 26px;
            animation: fly 1s ease-out forwards;
            pointer-events: none;
            z-index: 300;
        }
        @keyframes fly {
            0% { transform: translate(0,0) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="status-msg" id="game-status-label">Загрузка игровой комнаты...</div>
        <div class="kisses-panel">Поцелуи: <span id="kisses-score">0</span> 😘</div>
    </div>

    <div class="board-container" id="board">
        
        <div class="bottle-node" id="bottle" onclick="spinBottle()">
            <svg class="bottle-img" viewBox="0 0 100 300" xmlns="http://www.w3.org/2000/svg">
                <path d="M42,15 L58,15 L58,65 L42,65 Z" fill="#1b4d3e" stroke="#0d261f" stroke-width="3"/>
                <path d="M42,65 C22,95 22,115 22,145 L22,265 C22,278 32,288 50,288 C68,288 78,278 78,265 L78,145 C78,115 78,95 58,65 Z" fill="#2c6b56" stroke="#0d261f" stroke-width="4"/>
                <rect x="27" y="135" width="46" height="50" rx="4" fill="#e74c3c"/>
                <circle cx="50" cy="160" r="10" fill="#ffffff"/>
            </svg>
        </div>

        <div class="grid-player" id="user-p0"><div class="vote-bubble" id="b-0"></div><div class="square-avatar">👑</div><div class="meta-name" id="my-profile-name">@Ты, 18</div></div>
        <div class="grid-player" id="user-p1"><div class="vote-bubble" id="b-1"></div><div class="square-avatar">💃</div><div class="meta-name">@Mira_doll, 20</div></div>
        <div class="grid-player" id="user-p2"><div class="vote-bubble" id="b-2"></div><div class="square-avatar">😎</div><div class="meta-name">@Behruz, 22</div></div>
        <div class="grid-player" id="user-p3"><div class="vote-bubble" id="b-3"></div><div class="square-avatar">💬</div><div class="meta-name">@ZAHID, 19</div></div>
        <div class="grid-player" id="user-p4"><div class="vote-bubble" id="b-4"></div><div class="square-avatar">🦄</div><div class="meta-name">@Alina, 18</div></div>
        <div class="grid-player" id="user-p5"><div class="vote-bubble" id="b-5"></div><div class="square-avatar">🔥</div><div class="meta-name">@Дмитрий, 25</div></div>
        <div class="grid-player" id="user-p6"><div class="vote-bubble" id="b-6"></div><div class="square-avatar">🐱</div><div class="meta-name">@Sapi, 21</div></div>
        <div class="grid-player" id="user-p7"><div class="vote-bubble" id="b-7"></div><div class="square-avatar">🎮</div><div class="meta-name">@Tolanov, 23</div></div>
        <div class="grid-player" id="user-p8"><div class="vote-bubble" id="b-8"></div><div class="square-avatar">💎</div><div class="meta-name">@Madi, 20</div></div>
        <div class="grid-player" id="user-p9"><div class="vote-bubble" id="b-9"></div><div class="square-avatar">🍀</div><div class="meta-name">@Aruzhan, 19</div></div>
        <div class="grid-player" id="user-p10"><div class="vote-bubble" id="b-10"></div><div class="square-avatar">🦊</div><div class="meta-name">@Askar, 26</div></div>
        <div class="grid-player" id="user-p11"><div class="vote-bubble" id="b-11"></div><div class="square-avatar">✨</div><div class="meta-name">@Aya, 18</div></div>

        <div class="choice-panel-box" id="kiss-ui-panel">
            <div class="choice-txt" id="kiss-ui-title">Поцеловать?</div>
            <div class="choice-row-btns">
                <button class="act-btn btn-heart" onclick="submitUserChoice(true)">❤️</button>
                <button class="act-btn btn-cross" onclick="submitUserChoice(false)">❌</button>
            </div>
        </div>
    </div>

    <div class="chat-section">
        <div class="chat-messages" id="chat-box">
            <div class="chat-row">
                <div class="chat-mini-avatar">📢</div>
                <div class="chat-body-text"><span class="chat-sender-name">Система:</span>Добро пожаловать в общий стол! Игра запущена.</div>
            </div>
        </div>

        <div class="chat-input-bar">
            <input type="text" class="chat-input-field" id="chat-input" placeholder="Написать сообщение..." onkeypress="handleChatKey(event)">
            <button class="chat-submit-btn" onclick="sendUserMessage()">➔</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            const webUser = tg.initDataUnsafe?.user;
            if (webUser) {
                document.getElementById('my-profile-name').innerText = `@${webUser.username || webUser.first_name}, 18`;
            }
        }

        const botPhrases = [
            "всем привет!", "ботекс екан 😂", "кто из Алматы?", "крути давай))", 
            "целуем всех ❤️", "ого, неожиданно", "Медиа тут?", "Норм тема", 
            "У кого сколько поцелуев?", "Жми на бутылку!", "Удачи игрокам 🍾", "красиво крутит"
        ];

        // Соответствие градусов направления на игроков (0° = вверх)
        const roomPlayers = [
            { id: 0, name: "Ты", avatar: "👑", angle: 0 },
            { id: 1, name: "Mira_doll", avatar: "💃", angle: 30 },
            { id: 2, name: "Behruz", avatar: "😎", angle: 60 },
            { id: 3, name: "ZAHID", avatar: "💬", angle: 90 },
            { id: 4, name: "Alina", avatar: "🦄", angle: 135 },
            { id: 5, name: "Дмитрий", avatar: "🔥", angle: 165 },
            { id: 6, name: "Sapi", avatar: "🐱", angle: 180 },
            { id: 7, name: "Tolanov", avatar: "🎮", angle: 210 },
            { id: 8, name: "Madi", avatar: "💎", angle: 240 },
            { id: 9, name: "Aruzhan", avatar: "🍀", angle: 270 },
            { id: 10, name: "Askar", avatar: "🦊", angle: 300 },
            { id: 11, name: "Aya", avatar: "✨", angle: 330 }
        ];

        let currentTurn = 0;
        let rotationDegrees = 0;
        let kissesScore = parseInt(localStorage.getItem('saved_kisses')) || 0;
        
        let spinnerObj = null;
        let targetObj = null;
        let choiceSpinner = null;
        let choiceTarget = null;
        let bottleClickable = false;

        document.getElementById('kisses-score').innerText = kissesScore;

        // Исправленная и полностью рабочая функция добавления сообщений
        function pushMessageToDOM(name, txt, av) {
            const chatBox = document.getElementById('chat-box');
            if (!chatBox) return;
            
            const row = document.createElement('div');
            row.className = 'chat-row';
            row.innerHTML = `
                <div class="chat-mini-avatar">${av}</div>
                <div class="chat-body-text">
                    <span class="chat-sender-name">${name}:</span>${txt}
                </div>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendUserMessage() {
            const input = document.getElementById('chat-input');
            if (!input) return;
            const val = input.value.trim();
            if (!val) return;

            const fullProfileName = document.getElementById('my-profile-name').innerText;
            const myName = fullProfileName.split(',')[0]; 
            
            pushMessageToDOM(myName, val, "👑");
            input.value = "";
        }

        function handleChatKey(e) {
            if (e.key === 'Enter') sendUserMessage();
        }

        function triggerBotChatMessage() {
            const randBot = roomPlayers[Math.floor(Math.random() * (roomPlayers.length - 1)) + 1];
            const randPhrase = botPhrases[Math.floor(Math.random() * botPhrases.length)];
            pushMessageToDOM(`@${randBot.name}`, randPhrase, randBot.avatar);
        }

        function initRoom() {
            // Запуск активности ботов в чате
            setInterval(triggerBotChatMessage, 6000);
            
            // Выбираем стартующего игрока и переходим к раунду
            currentTurn = Math.floor(Math.random() * roomPlayers.length);
            processNextRound();
        }

        function processNextRound() {
            roomPlayers.forEach(p => {
                const node = document.getElementById(`user-p${p.id}`);
                if (node) {
                    node.classList.remove('active-spinner', 'active-target');
                    node.style.transform = "translate(0, 0)";
                }
                const bubble = document.getElementById(`b-${p.id}`);
                if (bubble) bubble.style.display = 'none';
            });

            document.getElementById('bottle').classList.remove('hidden');
            document.getElementById('kiss-ui-panel').style.display = 'none';

            spinnerObj = roomPlayers[currentTurn];
            const activeSpinnerNode = document.getElementById(`user-p${spinnerObj.id}`);
            if (activeSpinnerNode) activeSpinnerNode.classList.add('active-spinner');

            if (spinnerObj.id === 0) {
                document.getElementById('game-status-label').innerText = "Ваш ход! Нажмите на бутылочку!";
                bottleClickable = true;
            } else {
                document.getElementById('game-status-label').innerText = `Ход игрока @${spinnerObj.name}...`;
                bottleClickable = false;
                setTimeout(executeSystemSpin, 2000);
            }
        }

        function spinBottle() {
            if (!bottleClickable) return;
            bottleClickable = false;
            executeSystemSpin();
        }

        function executeSystemSpin() {
            let potentialTargets = roomPlayers.filter(p => p.id !== spinnerObj.id);
            targetObj = potentialTargets[Math.floor(Math.random() * potentialTargets.length)];

            const extraRotations = 2160; 
            rotationDegrees += extraRotations + targetObj.angle - (rotationDegrees % 360);
            
            document.getElementById('bottle').style.transform = `rotate(${rotationDegrees}deg)`;

            setTimeout(animateCloserLook, 3900);
        }

        function animateCloserLook() {
            const targetNode = document.getElementById(`user-p${targetObj.id}`);
            if (targetNode) targetNode.classList.add('active-target');
            document.getElementById('bottle').classList.add('hidden');

            const spinnerNode = document.getElementById(`user-p${spinnerObj.id}`);

            const rectBoard = document.getElementById('board').getBoundingClientRect();
            const sRect = spinnerNode.getBoundingClientRect();
            const tRect = targetNode.getBoundingClientRect();

            const targetCenterX = rectBoard.width / 2;
            const targetCenterY = rectBoard.height / 2;

            const sDx = targetCenterX - (sRect.left - rectBoard.left + sRect.width / 2) - 40;
            const sDy = targetCenterY - (sRect.top - rectBoard.top + sRect.height / 2);
            
            const tDx = targetCenterX - (tRect.left - rectBoard.left + tRect.width / 2) + 40;
            const tDy = targetCenterY - (tRect.top - rectBoard.top + tRect.height / 2);

            spinnerNode.style.transform = `translate(${sDx}px, ${sDy}px)`;
            targetNode.style.transform = `translate(${tDx}px, ${tDy}px)`;

            setTimeout(evaluateInteractions, 700);
        }

        function evaluateInteractions() {
            choiceSpinner = null;
            choiceTarget = null;

            if (spinnerObj.id === 0) {
                document.getElementById('game-status-label').innerText = `Вы выбрали: @${targetObj.name}`;
                showKissControls(`Поцеловать @${targetObj.name}?`);
                choiceTarget = Math.random() < 0.75; 
            } else if (targetObj.id === 0) {
                document.getElementById('game-status-label').innerText = `@${spinnerObj.name} выбрал Вас!`;
                showKissControls(`@${spinnerObj.name} ждет поцелуя!`);
                choiceSpinner = Math.random() < 0.75;
            } else {
                document.getElementById('game-status-label').innerText = `@${spinnerObj.name} и @${targetObj.name}`;
                choiceSpinner = Math.random() < 0.70;
                choiceTarget = Math.random() < 0.70;

                setTimeout(() => {
                    revealBubble(spinnerObj.id, choiceSpinner);
                    revealBubble(targetObj.id, choiceTarget);
                    setTimeout(compileRoundResults, 1500);
                }, 1000);
            }
        }

        function showKissControls(promptText) {
            document.getElementById('kiss-ui-title').innerText = promptText;
            document.getElementById('kiss-ui-panel').style.display = 'flex';
        }

        function submitUserChoice(isYes) {
            document.getElementById('kiss-ui-panel').style.display = 'none';

            if (spinnerObj.id === 0) {
                choiceSpinner = isYes;
            } else {
                choiceTarget = isYes;
            }

            revealBubble(spinnerObj.id, choiceSpinner);
            revealBubble(targetObj.id, choiceTarget);

            setTimeout(compileRoundResults, 1200);
        }

        function revealBubble(pid, isYes) {
            const b = document.getElementById(`b-${pid}`);
            if (!b) return;
            b.innerText = isYes ? "❤️ Да" : "❌ Нет";
            b.style.background = isYes ? "#2ecc71" : "#e74c3c";
            b.style.color = "#ffffff";
            b.style.display = "block";
        }

        function compileRoundResults() {
            if (choiceSpinner && choiceTarget) {
                document.getElementById('game-status-label').innerText = "Взаимно! 💋";
                generateHearts();

                if (spinnerObj.id === 0 || targetObj.id === 0) {
                    kissesScore++;
                    localStorage.setItem('saved_kisses', kissesScore);
                    document.getElementById('kisses-score').innerText = kissesScore;
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }
            } else {
                document.getElementById('game-status-label').innerText = "Отказ... 💔";
            }

            setTimeout(() => {
                currentTurn = (currentTurn + 1) % roomPlayers.length;
                processNextRound();
            }, 2000);
        }

        function generateHearts() {
            const board = document.getElementById('board');
            for (let i = 0; i < 10; i++) {
                const h = document.createElement('div');
                h.className = 'fx-heart';
                h.innerText = ['❤️','💖','💋'][Math.floor(Math.random() * 3)];
                h.style.left = 'calc(50% - 13px)';
                h.style.top = 'calc(50% - 13px)';
                
                const rAngle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 80;
                h.style.setProperty('--dx', `${Math.cos(rAngle) * distance}px`);
                h.style.setProperty('--dy', `${Math.sin(rAngle) * distance}px`);

                board.appendChild(h);
                setTimeout(() => h.remove(), 1000);
            }
        }

        // Автоматический старт игры при полной инициализации DOM
        window.onload = initRoom;
    </script>
</body>
</html>

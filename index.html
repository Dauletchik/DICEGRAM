<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram-style Web Messenger</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f1f1f1; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; background: #0078FF; color: white; padding: 10px; }
        .chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; background: white; }
        .message { margin: 10px 0; }
        .input { display: flex; }
        .input input { flex: 1; padding: 10px; }
        .input button { padding: 10px; background: #0078FF; color: white; border: none; }
        .settings { margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Telegram Messenger</h1>
        <div>
            <button onclick="showSettings()">Settings</button>
        </div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
    <div class="settings" id="settings" style="display: none;">
        <h2>Settings</h2>
        <label>
            <input type="checkbox" id="multiAccount"> Enable Multi-Account Support
        </label>
    </div>
</div>
<script>
    const chat = document.getElementById('chat');
    const settings = document.getElementById('settings');

    function sendMessage() {
        const messageInput = document.getElementById('message');
        const message = messageInput.value;
        if (message) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.innerText = message;
            chat.appendChild(messageElement);
            messageInput.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function showSettings() {
        settings.style.display = settings.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM</title>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --blue: #5288c1; --text: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        h1 { color: var(--blue); margin-bottom: 20px; font-size: 32px; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: var(--panel); color: white; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 15px; background: var(--blue); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Главный экран */
        .header { width: 100%; background: var(--panel); padding: 15px; border-bottom: 1px solid #000; font-weight: bold; display: flex; justify-content: space-between; box-sizing: border-box; }
        .chat-list { width: 100%; flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; background: var(--panel); border-bottom: 1px solid #0e1621; display: flex; align-items: center; }
        .avatar { width: 45px; height: 45px; background: var(--blue); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1>DICEGRAM</h1>
        <p>Придумай свой уникальный ник</p>
        <input type="text" id="username" placeholder="@твой_ник">
        <button class="btn" onclick="createAccount()">Создать аккаунт</button>
    </div>

    <div id="main-screen" class="screen" style="justify-content: flex-start; padding:0;">
        <div class="header">
            <span>DICEGRAM</span>
            <span id="my-nick" style="color:var(--blue)"></span>
        </div>
        <div class="chat-list">
            <div class="chat-item">
                <div class="avatar">DG</div>
                <div>
                    <b>DICEGRAM Official</b><br>
                    <small id="bot-status" style="color:gray"></small>
                </div>
            </div>
        </div>
        <button onclick="clearAcc()" style="padding: 10px; background: none; border: none; color: #555;">Удалить аккаунт</button>
    </div>

    <script>
        const authScreen = document.getElementById('auth-screen');
        const mainScreen = document.getElementById('main-screen');

        // 1. Проверяем, есть ли уже аккаунт в памяти телефона
        window.onload = function() {
            const savedNick = localStorage.getItem('dice_nick');
            if (savedNick) {
                startApp(savedNick, "С возвращением!");
            } else {
                authScreen.classList.add('active');
            }
        };

        // 2. Создаем аккаунт
        function createAccount() {
            const nick = document.getElementById('username').value.trim();
            if (nick.length < 3) return alert("Ник слишком короткий!");
            
            // Сохраняем в память телефона
            localStorage.setItem('dice_nick', nick);
            startApp(nick, "Аккаунт успешно создан!");
        }

        // 3. Запуск приложения
        function startApp(nick, welcomeMsg) {
            authScreen.classList.remove('active');
            mainScreen.classList.add('active');
            document.getElementById('my-nick').innerText = nick;
            document.getElementById('bot-status').innerText = welcomeMsg;
        }

        // Сброс (для теста)
        function clearAcc() {
            localStorage.removeItem('dice_nick');
            location.reload();
        }
    </script>
</body>
</html>

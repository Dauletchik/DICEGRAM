<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICETOK Mini-TikTok</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#0f172a;color:white;}
#auth,#main{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
button{padding:12px 20px;margin:5px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold;}
input{padding:10px;margin:5px;border-radius:6px;border:none;width:200px;}
#bottomNav{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:space-around;background:#1e293b;padding:10px 0;}
#videoFeed{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;overflow-y:auto;height:80vh;}
video{width:100%;border-radius:10px;margin:10px 0;}
#profile img{border-radius:50%;width:80px;height:80px;}
#uploadSection{display:none;flex-direction:column;align-items:center;}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body>

<div id="auth">
  <h1>DICETOK</h1>
  <button onclick="googleLogin()">Войти через Google</button>
</div>

<div id="main" style="display:none;flex-direction:column;align-items:center;">
  <div id="videoFeed"></div>
</div>

<div id="uploadSection">
  <input type="file" id="videoFile">
  <button onclick="uploadVideo()">Загрузить видео</button>
  <button onclick="showFeed()">Назад</button>
</div>

<div id="profile" style="display:none;flex-direction:column;align-items:center;">
  <img id="userAvatar" src="">
  <h2 id="userNameDisplay"></h2>
  <p>Подписки: <span id="followingCount">0</span></p>
  <p>Подписчики: <span id="followersCount">0</span></p>
  <p>Общее количество лайков: <span id="totalLikes">0</span></p>
  <div id="userVideos"></div>
  <button onclick="showFeed()">Назад</button>
</div>

<div id="bottomNav" style="display:none;">
  <button onclick="showFeed()">Главная</button>
  <button onclick="showUpload()">+</button>
  <button onclick="showProfile()">Профиль</button>
</div>

<script>
// ===== Firebase Config =====
firebase.initializeApp({
  apiKey: "AIzaSyA8slPm58rciKbNbGAqA97VP2rWiENC9_k",
  authDomain: "flikyfloky-61eed.firebaseapp.com",
  projectId: "flikyfloky-61eed",
  storageBucket: "flikyfloky-61eed.firebasestorage.app",
  messagingSenderId: "167396726913",
  appId: "1:167396726913:web:dd012abf884a768c09d580",
  measurementId: "G-7YMLFXSKG3"
});

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

// ===== Google Login =====
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(result=>{
      currentUser = result.user;
      db.collection("users").doc(currentUser.uid).set({
        name: currentUser.displayName,
        email: currentUser.email,
        avatar: currentUser.photoURL,
        created: Date.now(),
        followers:0,
        following:0,
        totalLikes:0
      }, {merge:true});
      showFeed();
    }).catch(e=>alert(e.message));
}

// ===== UI Functions =====
function showFeed(){
  document.getElementById("auth").style.display="none";
  document.getElementById("uploadSection").style.display="none";
  document.getElementById("profile").style.display="none";
  document.getElementById("main").style.display="flex";
  document.getElementById("bottomNav").style.display="flex";
  loadFeed();
}

function showUpload(){
  document.getElementById("main").style.display="none";
  document.getElementById("profile").style.display="none";
  document.getElementById("uploadSection").style.display="flex";
}

function showProfile(){
  document.getElementById("main").style.display="none";
  document.getElementById("uploadSection").style.display="none";
  document.getElementById("profile").style.display="flex";
  loadProfile();
}

// ===== Load Feed =====
function loadFeed(){
  const feed = document.getElementById("videoFeed");
  feed.innerHTML="";
  db.collection("videos").orderBy("timestamp","desc").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      const v = doc.data();
      const video = document.createElement("video");
      video.src = v.url;
      video.controls = true;
      feed.appendChild(video);
    });
  });
}

// ===== Upload Video =====
function uploadVideo(){
  const file = document.getElementById("videoFile").files[0];
  if(!file){alert("Выберите видео"); return;}
  const storageRef = storage.ref(`videos/${currentUser.uid}_${Date.now()}`);
  storageRef.put(file).then(snapshot=>{
    snapshot.ref.getDownloadURL().then(url=>{
      db.collection("videos").add({
        uid: currentUser.uid,
        url: url,
        timestamp:Date.now(),
        likes:0
      }).then(()=>{alert("Видео загружено!"); showFeed();});
    });
  });
}

// ===== Load Profile =====
function loadProfile(){
  db.collection("users").doc(currentUser.uid).get().then(doc=>{
    const data = doc.data();
    document.getElementById("userAvatar").src = data.avatar;
    document.getElementById("userNameDisplay").innerText = data.name;
    document.getElementById("followersCount").innerText = data.followers || 0;
    document.getElementById("followingCount").innerText = data.following || 0;
    document.getElementById("totalLikes").innerText = data.totalLikes || 0;
    // user videos
    const userVideos = document.getElementById("userVideos");
    userVideos.innerHTML="";
    db.collection("videos").where("uid","==",currentUser.uid).orderBy("timestamp","desc").get().then(snapshot=>{
      snapshot.forEach(doc=>{
        const v = doc.data();
        const video = document.createElement("video");
        video.src = v.url;
        video.controls = true;
        userVideos.appendChild(video);
      });
    });
  });
}

// ===== Auto login =====
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    showFeed();
  }
});
</script>
</body>
</html>

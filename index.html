<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DICE TOK | Creator Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #010101;
            --white: #ffffff;
            --accent: #fe2c55;
            --dark-gray: #121212;
            --gray: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden; }

        /* --- СКРЫТЫЕ СЕКЦИИ --- */
        .page { display: none; height: calc(100vh - 60px); width: 100%; overflow-y: auto; }
        .page.active { display: block; }

        /* --- ЛЕНТА (FEED) --- */
        #feedPage { overflow-y: scroll; snap-type: y mandatory; scrollbar-width: none; height: 100vh; }
        .video-card { height: 100vh; width: 100%; snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .empty-state {
            height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: var(--gray);
            text-align: center; padding: 20px;
        }

        /* --- ОВЕРЛЕЙ ВИДЕО --- */
        .video-ui {
            position: absolute; bottom: 80px; left: 0; width: 100%;
            padding: 20px; display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none;
        }
        .video-ui * { pointer-events: auto; }
        .side-bar { display: flex; flex-direction: column; gap: 20px; align-items: center; }

        /* --- МОДАЛКА ЗАГРУЗКИ --- */
        #uploadModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black); z-index: 200; display: none; padding: 20px;
        }
        .upload-header { display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 18px; }
        .upload-form input, .upload-form textarea {
            width: 100%; background: #222; border: none; color: white;
            padding: 15px; border-radius: 8px; margin-bottom: 15px; outline: none;
        }
        .btn-publish {
            background: var(--accent); color: white; width: 100%; padding: 15px;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* --- ПРОФИЛЬ --- */
        .profile-header { padding: 40px 20px; text-align: center; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 3/4; background: #333; position: relative; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* --- НАВИГАЦИЯ --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--black); border-top: 0.5px solid #333;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: var(--gray); text-align: center; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: white; }
        .create-btn { 
            background: linear-gradient(90deg, #25f4ee 0%, #fe2c55 100%);
            width: 45px; height: 30px; border-radius: 8px; color: black;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="feedPage" class="page active"></div>

    <div id="profilePage" class="page">
        <div class="profile-header">
            <div class="profile-avatar">D</div>
            <h2 id="profName">@dice_user</h2>
            <p style="color:var(--gray)">0 Лайков • 0 Подписок</p>
        </div>
        <div class="video-grid" id="myVideosGrid"></div>
    </div>

    <div id="uploadModal">
        <div class="upload-header">
            <span onclick="toggleUpload(false)">Отмена</span>
            <span style="font-weight:bold">Новое видео</span>
            <span></span>
        </div>
        <div class="upload-form">
            <label style="display:block; margin-bottom:10px; color:var(--gray)">Выберите файл видео:</label>
            <input type="file" id="videoFile" accept="video/*">
            <textarea id="videoDesc" placeholder="Напишите описание..." rows="4"></textarea>
            <button class="btn-publish" onclick="publishVideo()">Опубликовать</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('feed')"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="showPage('discover')"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="nav-item" onclick="toggleUpload(true)"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
        <div class="nav-item"><i class="fa-solid fa-message"></i></div>
        <div class="nav-item" onclick="showPage('profile')"><i class="fa-solid fa-user"></i></div>
    </nav>

<script>
    let db = JSON.parse(localStorage.getItem('dice_tok_db')) || [];

    // --- ЛОГИКА СТРАНИЦ ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        const target = document.getElementById(pageId + 'Page');
        if(target) target.classList.add('active');
        
        if(pageId === 'feed') renderFeed();
        if(pageId === 'profile') renderProfile();
    }

    // --- РЕНДЕР ЛЕНТЫ ---
    function renderFeed() {
        const feed = document.getElementById('feedPage');
        if (db.length === 0) {
            feed.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-clapperboard" style="font-size: 50px; margin-bottom: 15px;"></i>
                    <p>Тут пока пусто.<br>Будь первым, кто выложит видео!</p>
                </div>`;
            return;
        }

        feed.innerHTML = db.map(vid => `
            <div class="video-card">
                <video loop src="${vid.src}" playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="video-ui">
                    <div style="flex:1">
                        <div style="font-weight:bold; margin-bottom:10px">@You</div>
                        <div style="font-size:14px">${vid.desc}</div>
                    </div>
                    <div class="side-bar">
                        <div class="action-item"><i class="fa-solid fa-heart"></i><br><small>0</small></div>
                        <div class="action-item"><i class="fa-solid fa-comment"></i><br><small>0</small></div>
                        <div class="action-item"><i class="fa-solid fa-share"></i></div>
                    </div>
                </div>
            </div>
        `).join('');

        // Авто-плей для первого видео
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                const v = e.target.querySelector('video');
                if(e.isIntersecting) v.play(); else v.pause();
            });
        }, {threshold: 0.6});
        document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
    }

    // --- РЕНДЕР ПРОФИЛЯ ---
    function renderProfile() {
        const grid = document.getElementById('myVideosGrid');
        grid.innerHTML = db.map(vid => `
            <div class="grid-item">
                <video src="${vid.src}"></video>
            </div>
        `).join('');
    }

    // --- ЗАГРУЗКА ---
    function toggleUpload(show) {
        document.getElementById('uploadModal').style.display = show ? 'block' : 'none';
    }

    function publishVideo() {
        const fileInput = document.getElementById('videoFile');
        const descInput = document.getElementById('videoDesc');

        if(fileInput.files.length === 0) return alert('Выберите видео!');

        const reader = new FileReader();
        reader.onload = function(e) {
            const newVideo = {
                id: Date.now(),
                src: e.target.result,
                desc: descInput.value || "Без описания",
                likes: 0
            };
            db.unshift(newVideo);
            localStorage.setItem('dice_tok_db', JSON.stringify(db));
            
            // Сброс и возврат
            fileInput.value = '';
            descInput.value = '';
            toggleUpload(false);
            showPage('feed');
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    // Инициализация
    showPage('feed');
</script>
</body>
</html>

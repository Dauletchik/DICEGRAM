<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GTA стиль - свободное перемещение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            position: relative;
            border: 4px solid #2c3e2f;
            border-radius: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #1e2a1e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            cursor: none;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .controls-info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            font-family: monospace;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div class="hud" id="coordDisplay">ПОЗИЦИЯ: 0, 0</div>
        <div class="controls-info">W/A/S/D — ДВИЖЕНИЕ | ОБХОДИ ПРЕПЯТСТВИЯ</div>
    </div>
</div>

<script>
    (function(){
        // ----- КАНВАС И КОНТЕКСТ -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ----- РАЗМЕРЫ КАРТЫ (большой открытый мир) -----
        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 3000;

        // ----- ИГРОК -----
        const PLAYER_SIZE = 28;       // размер персонажа (квадрат)
        let player = {
            x: WORLD_WIDTH/2,
            y: WORLD_HEIGHT/2,
            speed: 4.8
        };

        // ----- ФЛАГИ ДВИЖЕНИЯ (клавиши) -----
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };

        // ----- ПРЕПЯТСТВИЯ (стены, здания, деревья) в стиле городского ландшафта -----
        // каждый объект: {x, y, w, h, color}
        const obstacles = [];

        // Функция добавления препятствия (для удобства)
        function addObstacle(x, y, w, h, color = '#3a4a3a') {
            obstacles.push({ x, y, w, h, color });
        }

        // --- ГЕНЕРАЦИЯ ИНТЕРЕСНОЙ КАРТЫ (как мини-GTA мир) ---
        // 1. Границы карты - невидимые стены, но для красоты добавим визуальные края
        //    но лучше добавить реальные препятствия по краям, чтобы игрок не уходил в бесконечность
        //    Сделаем "водную" зону или просто невидимую стену. Я сделаю стену по периметру через препятствия.
        
        // РАМКА по краям (толстые стены)
        const borderThick = 40;
        addObstacle(0, 0, WORLD_WIDTH, borderThick, '#2c2e2a'); // верх
        addObstacle(0, WORLD_HEIGHT - borderThick, WORLD_WIDTH, borderThick, '#2c2e2a'); // низ
        addObstacle(0, 0, borderThick, WORLD_HEIGHT, '#2c2e2a'); // лево
        addObstacle(WORLD_WIDTH - borderThick, 0, borderThick, WORLD_HEIGHT, '#2c2e2a'); // право

        // --- КВАРТАЛЫ / ДОМА (различные здания) ---
        // Район 1 (левый верх)
        addObstacle(200, 150, 120, 100, '#5a4a3a');
        addObstacle(360, 140, 90, 130, '#6a5a4a');
        addObstacle(520, 180, 110, 80, '#4e6a3e');
        addObstacle(700, 120, 140, 110, '#3e6a6a');
        addObstacle(900, 200, 80, 90, '#7a5a4a');
        
        // Район 2 (центр)
        addObstacle(1100, 500, 130, 100, '#5a6e4a');
        addObstacle(1300, 450, 100, 140, '#4a5a6e');
        addObstacle(1500, 550, 115, 95, '#6e5a4a');
        addObstacle(1700, 400, 95, 120, '#3a6a5a');
        addObstacle(1900, 480, 140, 85, '#7a6a4a');
        
        // Район 3 (юг)
        addObstacle(500, 2200, 180, 100, '#5e5a4a');
        addObstacle(750, 2400, 110, 130, '#4e5a6e');
        addObstacle(1000, 2300, 130, 90, '#6a5e4a');
        addObstacle(1250, 2500, 100, 120, '#4a6e5a');
        addObstacle(1500, 2350, 160, 110, '#5a4e6e');
        
        // Район 4 (восток)
        addObstacle(2400, 800, 120, 140, '#6a5a4e');
        addObstacle(2600, 950, 90, 100, '#4e6a5a');
        addObstacle(2300, 1100, 140, 85, '#5a6a4e');
        addObstacle(2500, 1250, 110, 130, '#6e5a4a');
        addObstacle(2700, 1400, 100, 120, '#4a5e6e');
        
        // Добавим деревья/парковки (маленькие объекты)
        for(let i=0; i<70; i++){
            let randX = 200 + Math.random() * (WORLD_WIDTH - 400);
            let randY = 200 + Math.random() * (WORLD_HEIGHT - 400);
            // проверка чтобы не перекрывать основные здания слишком часто
            let tooClose = false;
            for(let obs of obstacles){
                const dx = obs.x + obs.w/2 - randX;
                const dy = obs.y + obs.h/2 - randY;
                if(Math.abs(dx) < (obs.w/2 + 15) && Math.abs(dy) < (obs.h/2 + 15)){
                    tooClose = true;
                    break;
                }
            }
            if(!tooClose){
                let size = 12 + Math.random() * 14;
                addObstacle(randX, randY, size, size, '#3f754a');
            }
        }
        
        // Несколько длинных заборов или дорожных блоков
        addObstacle(1800, 1800, 250, 25, '#6a5a4a');
        addObstacle(2200, 1900, 30, 200, '#5a5a4a');
        addObstacle(800, 1700, 30, 180, '#5a5a4a');
        addObstacle(2800, 2200, 100, 30, '#7a6a5a');
        
        // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ КОЛЛИЗИИ (AABB) -----
        function collisionRect(r1, r2) {
            return !(r2.x > r1.x + r1.w ||
                r2.x + r2.w < r1.x ||
                r2.y > r1.y + r1.h ||
                r2.y + r2.h < r1.y);
        }

        // Проверка столкновения игрока с препятствиями (игрок - квадрат)
        function isCollidingWithObstacles(playerRect, ignoreObstacle = null) {
            for(let obs of obstacles) {
                if(ignoreObstacle === obs) continue;
                if(collisionRect(playerRect, {x: obs.x, y: obs.y, w: obs.w, h: obs.h})) {
                    return obs;
                }
            }
            return false;
        }

        // Движение с обработкой коллизий (по осям отдельно)
        function tryMove(deltaX, deltaY) {
            // Движение по X
            if(deltaX !== 0) {
                let newX = player.x + deltaX;
                let playerRect = { x: newX, y: player.y, w: PLAYER_SIZE, h: PLAYER_SIZE };
                if(!isCollidingWithObstacles(playerRect)) {
                    player.x = newX;
                } else {
                    // дополнительная попытка: шаг поменьше (для плавности)
                    let step = Math.sign(deltaX) * Math.min(Math.abs(deltaX), 3);
                    newX = player.x + step;
                    playerRect.x = newX;
                    if(!isCollidingWithObstacles(playerRect)) {
                        player.x = newX;
                    }
                }
            }
            // Движение по Y
            if(deltaY !== 0) {
                let newY = player.y + deltaY;
                let playerRect = { x: player.x, y: newY, w: PLAYER_SIZE, h: PLAYER_SIZE };
                if(!isCollidingWithObstacles(playerRect)) {
                    player.y = newY;
                } else {
                    let step = Math.sign(deltaY) * Math.min(Math.abs(deltaY), 3);
                    newY = player.y + step;
                    playerRect.y = newY;
                    if(!isCollidingWithObstacles(playerRect)) {
                        player.y = newY;
                    }
                }
            }
        }

        // --- ОБНОВЛЕНИЕ ДВИЖЕНИЯ НА ОСНОВЕ НАЖАТЫХ КЛАВИШ ---
        function updateMovement() {
            let moveX = 0, moveY = 0;
            if(keys.w || keys.ArrowUp) moveY -= 1;
            if(keys.s || keys.ArrowDown) moveY += 1;
            if(keys.a || keys.ArrowLeft) moveX -= 1;
            if(keys.d || keys.ArrowRight) moveX += 1;
            
            if(moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX = moveX / len;
                moveY = moveY / len;
                const deltaX = moveX * player.speed;
                const deltaY = moveY * player.speed;
                tryMove(deltaX, deltaY);
            }
        }

        // --- КАМЕРА (следит за игроком, с ограничениями) ---
        let camera = { x: 0, y: 0 };
        function updateCamera() {
            // Центрируем камеру на игроке
            let targetCamX = player.x + PLAYER_SIZE/2 - canvas.width/2;
            let targetCamY = player.y + PLAYER_SIZE/2 - canvas.height/2;
            
            // Ограничения, чтобы камера не выходила за мир
            targetCamX = Math.min(Math.max(targetCamX, 0), WORLD_WIDTH - canvas.width);
            targetCamY = Math.min(Math.max(targetCamY, 0), WORLD_HEIGHT - canvas.height);
            
            // Плавное следование (легкий эффект, для комфорта)
            camera.x += (targetCamX - camera.x) * 0.12;
            camera.y += (targetCamY - camera.y) * 0.12;
            
            // финальная привязка к границам
            camera.x = Math.min(Math.max(camera.x, 0), WORLD_WIDTH - canvas.width);
            camera.y = Math.min(Math.max(camera.y, 0), WORLD_HEIGHT - canvas.height);
        }
        
        // ---- ОТРИСОВКА ВСЕГО МИРА (с учётом камеры) ----
        function draw() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Рисуем фон (асфальт/газон)
            ctx.fillStyle = '#2b3a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Сетка "дорог" для атмосферы (линии относительно камеры)
            ctx.beginPath();
            ctx.strokeStyle = '#6a7a5a';
            ctx.lineWidth = 1.5;
            const startXGrid = Math.floor(camera.x / 60) * 60;
            const startYGrid = Math.floor(camera.y / 60) * 60;
            for(let x = startXGrid; x < camera.x + canvas.width + 60; x += 60){
                ctx.beginPath();
                ctx.moveTo(x - camera.x, 0);
                ctx.lineTo(x - camera.x, canvas.height);
                ctx.stroke();
            }
            for(let y = startYGrid; y < camera.y + canvas.height + 60; y += 60){
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }
            
            // 2. Рисуем все препятствия (здания, деревья, стены)
            for(let obs of obstacles) {
                const screenX = obs.x - camera.x;
                const screenY = obs.y - camera.y;
                // проверка видимости (оптимизация)
                if(screenX + obs.w > 0 && screenX < canvas.width && screenY + obs.h > 0 && screenY < canvas.height) {
                    // тень для объёма
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.shadowBlur = 8;
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(screenX, screenY, obs.w, obs.h);
                    // обводка
                    ctx.strokeStyle = '#1e2a1a';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(screenX, screenY, obs.w, obs.h);
                    // детали: окна на больших зданиях
                    if(obs.w > 50 && obs.h > 50){
                        ctx.fillStyle = '#cab97a';
                        ctx.shadowBlur = 2;
                        for(let i = 0; i < 3; i++){
                            let wx = screenX + 12 + i*20;
                            let wy = screenY + 15;
                            if(wx + 10 < screenX+obs.w) {
                                ctx.fillRect(wx, wy, 8, 12);
                                ctx.fillRect(wx, wy+30, 8, 12);
                            }
                        }
                    }
                }
            }
            ctx.shadowBlur = 0;
            
            // 3. Рисуем персонажа (стильный "герой" с тенью)
            const playerScreenX = player.x - camera.x;
            const playerScreenY = player.y - camera.y;
            
            // Градиент для игрока
            const grad = ctx.createLinearGradient(playerScreenX, playerScreenY, playerScreenX+PLAYER_SIZE, playerScreenY+PLAYER_SIZE);
            grad.addColorStop(0, '#e34d3a');
            grad.addColorStop(1, '#b52e1a');
            ctx.fillStyle = grad;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "black";
            ctx.fillRect(playerScreenX, playerScreenY, PLAYER_SIZE, PLAYER_SIZE);
            // лицо/стиль
            ctx.fillStyle = '#fff6d0';
            ctx.fillRect(playerScreenX + 6, playerScreenY + 7, 5, 5);
            ctx.fillRect(playerScreenX + PLAYER_SIZE-11, playerScreenY + 7, 5, 5);
            ctx.fillStyle = '#1f1f1f';
            ctx.fillRect(playerScreenX + 7, playerScreenY + 18, PLAYER_SIZE-14, 4);
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.arc(playerScreenX + PLAYER_SIZE/2, playerScreenY+PLAYER_SIZE-6, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.arc(playerScreenX + PLAYER_SIZE/2-3, playerScreenY+PLAYER_SIZE-7, 1.5, 0, Math.PI*2);
            ctx.arc(playerScreenX + PLAYER_SIZE/2+3, playerScreenY+PLAYER_SIZE-7, 1.5, 0, Math.PI*2);
            ctx.fill();
            
            // восстанавливаем тень
            ctx.shadowBlur = 0;
            
            // 4. Рисуем "туман" войны? нет, но добавим индикатор направления (маленький компас)
            ctx.font = "bold 14 monospace";
            ctx.fillStyle = "#fff5cc";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡ СВОБОДНЫЙ РЕЖИМ", canvas.width-140, 30);
            
            // обновляем HUD координаты
            document.getElementById('coordDisplay').innerHTML = `🚗 X:${Math.floor(player.x)} Y:${Math.floor(player.y)} | скорость: ${player.speed}`;
        }
        
        // ---- ЦИКЛ АНИМАЦИИ (Game Loop) ----
        function gameLoop() {
            updateMovement();    // обработка ввода
            updateCamera();      // камера следует
            draw();              // рендер
            requestAnimationFrame(gameLoop);
        }
        
        // --- УПРАВЛЕНИЕ КЛАВИАТУРОЙ ---
        function handleKeyDown(e) {
            const key = e.key;
            if(keys.hasOwnProperty(key)) {
                keys[key] = true;
                e.preventDefault();
            }
            // Доп: можно регулировать скорость (shift ускорение)
            if(key === 'Shift') {
                player.speed = 8.5;
                e.preventDefault();
            }
            if(key === 'Control') {
                player.speed = 2.2;
                e.preventDefault();
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            if(keys.hasOwnProperty(key)) {
                keys[key] = false;
                e.preventDefault();
            }
            if(key === 'Shift') {
                player.speed = 4.8;
                e.preventDefault();
            }
            if(key === 'Control') {
                player.speed = 4.8;
                e.preventDefault();
            }
        }
        
        // блокировка контекстного меню на канвасе
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        // начальная позиция камеры
        camera.x = player.x + PLAYER_SIZE/2 - canvas.width/2;
        camera.y = player.y + PLAYER_SIZE/2 - canvas.height/2;
        // ограничим стартовую камеру
        camera.x = Math.min(Math.max(camera.x, 0), WORLD_WIDTH - canvas.width);
        camera.y = Math.min(Math.max(camera.y, 0), WORLD_HEIGHT - canvas.height);
        
        // Запуск игры
        gameLoop();
        
        // небольшая инструкция в консоль
        console.log('Игра запущена! Используй W/A/S/D для движения, SHIFT - ускорение, CTRL - замедление');
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DauletGram Web</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0e1621; color: white; }
        .header { background: #17212b; padding: 15px; font-weight: bold; border-bottom: 1px solid #000; position: sticky; top: 0; }
        .chat-area { height: calc(100vh - 120px); overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; margin: 5px 0; font-size: 14px; }
        .sent { background: #2b5278; align-self: flex-end; }
        .received { background: #182533; align-self: flex-start; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #17212b; padding: 10px; display: flex; box-sizing: border-box; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; }
        button { background: none; border: none; color: #5288c1; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">DauletGram</div>

<div class="chat-area" id="chat">
    <div class="msg received">Привет! Это твой мессенджер.</div>
    <div class="msg sent">Работает на GitHub Pages!</div>
</div>

<div class="input-area">
    <input type="text" id="text" placeholder="Написать сообщение...">
    <button onclick="send()">ОТПРАВИТЬ</button>
</div>

<script>
    function send() {
        let input = document.getElementById('text');
        if (input.value.trim() == "") return;
        
        let chat = document.getElementById('chat');
        let msg = document.createElement('div');
        msg.className = "msg sent";
        msg.innerText = input.value;
        chat.appendChild(msg);
        
        chat.scrollTop = chat.scrollHeight; // Прокрутка вниз
        input.value = "";
    }
</script>

</body>
</html>

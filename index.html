<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js">
    </script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --active-tab: #0284c7;
            --border-color: #334155;
            --msg-out: #0369a1;
            --msg-in: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--border-color);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Главный контейнер приложения */
        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Хедер */
        header {
            height: 60px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 18px;
            font-weight: bold;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        /* Основной контент экранов */
        .screen {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Список чатов */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .chat-item:active {
            background-color: var(--border-color);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--accent-color);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            object-fit: cover;
        }

        .chat-details {
            flex: 1;
        }

        .chat-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .verified-badge {
            color: #38bdf8;
            font-size: 14px;
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        /* Окно чата (Внутри экрана чатов) */
        #chat-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 500;
            display: none;
            flex-direction: column;
        }

        #chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            background-color: var(--msg-out);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background-color: var(--msg-in);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .mention-link {
            color: #38bdf8;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }

        /* Поле ввода сообщений */
        .chat-input-area {
            padding: 10px 16px;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* Экран Профиля */
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--border-color);
            margin-bottom: 16px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .profile-username {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* Заглушки для пустых окон */
        .placeholder-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Нижний Навигатор (Bottom Navigation) */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            height: 100%;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 8px;">Соединение с сервером...</p>
        <p style="color: var(--text-secondary); font-size: 13px; max-width: 280px;">Пожалуйста, подождите. Идет авторизация в сети DICEGRAM.</p>
    </div>

    <div id="app-container">

        <header id="main-header">
            <span id="header-title">Чаты</span>
        </header>

        <div id="screen-chats" class="screen active">
            <div id="chats-list">
                <div class="chat-item" onclick="openChat('0', 'DAUPRO SUPORT', true)">
                    <div class="chat-avatar" style="background: linear-gradient(135deg, #0284c7, #0369a1);">DS</div>
                    <div class="chat-details">
                        <div class="chat-title-row">
                            <div class="chat-name">
                                DAUPRO SUPORT
                                <span class="verified-badge">●</span>
                            </div>
                        </div>
                        <div class="chat-preview" id="preview-0">Нажмите сюда для связи с разработчиком</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="chat-room">
            <header>
                <button class="back-btn" style="display: block;" onclick="closeChat()">Назад</button>
                <span id="chat-room-title">Чат</span>
                <div style="width: 45px;"></div>
            </header>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="message-field" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>

        <div id="screen-contacts" class="screen">
            <div class="placeholder-screen">Список контактов пуст</div>
        </div>

        <div id="screen-settings" class="screen">
            <div class="placeholder-screen">Настройки DICEGRAM v1.0.0</div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="profile-container">
                <img id="user-avatar" class="profile-avatar" src="https://via.placeholder.com/100/334155/ffffff?text=U" alt="Avatar">
                <div id="user-name" class="profile-name">Имя Фамилия</div>
                <div id="user-username" class="profile-username">@username</div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchTab('chats', this)">
                <div class="nav-icon">💬</div>
                <div>Чаты</div>
            </div>
            <div class="nav-item" onclick="switchTab('contacts', this)">
                <div class="nav-icon">👥</div>
                <div>Контакты</div>
            </div>
            <div class="nav-item" onclick="switchTab('settings', this)">
                <div class="nav-icon">⚙️</div>
                <div>Настройки</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile', this)">
                <div class="nav-icon">👤</div>
                <div>Профиль</div>
            </div>
        </nav>

    </div>

    <script>
        // Расширение интерфейса Telegram WebApp на весь экран
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 🔽🔽🔽 ВЫБЕРИТЕ ОДИН ИЗ ДВУХ ВАРИАНТОВ 🔽🔽🔽
        // const SERVER_URL = "https://dauletchik.github.io/DICEGRAM"; // GitHub Pages вариант
        const SERVER_URL = "https://a38182-6d28.j.jrnm.app"; // Ваш основной сервер
        // 🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼🔼

        // Подключение к WebSocket шлюзу хостинга
        const socket = io(SERVER_URL, {
            transports: ["websocket"],
            secure: true
        });

        let currentChatId = null;
        let myTelegramId = null;
        let dynamicChats = {};

        // Получение структуры данных из Telegram WebApp API
        const tgUser = tg.initDataUnsafe?.user || {
            id: 123456789,
            first_name: "Локальный",
            last_name: "Тест",
            username: "daupro",
            photo_url: ""
        };

        myTelegramId = String(tgUser.id);

        // Инициализация интерфейса профиля
        document.getElementById('user-name').innerText = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim() || "Пользователь DICEGRAM";
        document.getElementById('user-username').innerText = tgUser.username ? `@${tgUser.username}` : '';
        if (tgUser.photo_url) {
            document.getElementById('user-avatar').src = tgUser.photo_url;
        }

        // Взаимодействие со Socket.IO бэкендом
        socket.on('connect', () => {
            console.log("Успешный коннект к Socket.IO!");

            // Запуск процедуры авторизации на сервере
            socket.emit('auth', tgUser, (response) => {
                if (response && response.status === 'ok') {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                }
            });
        });

        socket.on('disconnect', () => {
            console.log("Соединение разорвано");
            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        });

        // Слушатель входящих сообщений
        socket.on('new_message', (msg) => {
            const chatPartner = msg.sender_id === myTelegramId ? msg.receiver_id : msg.sender_id;

            if (chatPartner !== "0" && !dynamicChats[chatPartner]) {
                createChatRow(chatPartner, "Новый контакт", `@id${chatPartner}`);
            }

            const previewEl = document.getElementById(`preview-${chatPartner}`);
            if (previewEl) {
                previewEl.innerText = msg.text;
            }

            if (currentChatId === chatPartner) {
                renderSingleMessage(msg);
                scrollToBottom();
            }
        });

        // Навигация между вкладками приложения
        function switchTab(tabName, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(`screen-${tabName}`).classList.add('active');
            element.classList.add('active');

            const headerTitle = document.getElementById('header-title');
            if (tabName === 'chats') headerTitle.innerText = "Чаты";
            if (tabName === 'contacts') headerTitle.innerText = "Контакты";
            if (tabName === 'settings') headerTitle.innerText = "Настройки";
            if (tabName === 'profile') headerTitle.innerText = "Профиль";
        }

        // Логика чатов
        function openChat(chatId, chatName, isVerified = false) {
            currentChatId = chatId;
            document.getElementById('chat-room-title').innerText = chatName;
            document.getElementById('chat-room').style.display = 'flex';
            document.getElementById('chat-messages').innerHTML = '';

            socket.emit('get_chat_history', { with_id: chatId }, (history) => {
                if (history && Array.isArray(history)) {
                    history.forEach(msg => renderSingleMessage(msg));
                    scrollToBottom();
                }
            });
        }

        function closeChat() {
            document.getElementById('chat-room').style.display = 'none';
            currentChatId = null;
        }

        function renderSingleMessage(msg) {
            const container = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.classList.add('message');

            if (msg.sender_id === myTelegramId) {
                msgEl.classList.add('sent');
                msgEl.innerHTML = formatMessageText(msg.text);
            } else {
                msgEl.classList.add('received');
                msgEl.innerHTML = formatMessageText(msg.text);
            }

            container.appendChild(msgEl);
        }

        function formatMessageText(text) {
            const mentionRegex = /(@[a-zA-Z0-9_]{3,32})/g;
            return text.replace(mentionRegex, function(match) {
                return `<span class="mention-link" onclick="handleMentionClick('${match}')">${match}</span>`;
            });
        }

        function handleMentionClick(username) {
            console.log("Поиск пользователя по юзернейму:", username);
            socket.emit('find_user', { username: username }, (response) => {
                if (response && response.status === 'found') {
                    const user = response.user;

                    if (user.telegram_id === myTelegramId) {
                        alert("Это вы сами!");
                        return;
                    }

                    if (!dynamicChats[user.telegram_id]) {
                        createChatRow(user.telegram_id, user.first_name, user.username);
                    }

                    openChat(user.telegram_id, user.first_name, false);
                } else {
                    alert(`Пользователь ${username} не зарегистрирован в сети DICEGRAM.`);
                }
            });
        }

        function createChatRow(tgId, firstName, username) {
            dynamicChats[tgId] = { first_name: firstName, username: username };

            const chatsList = document.getElementById('chats-list');
            const rowHTML = `
                <div class="chat-item" onclick="openChat('${tgId}', '${firstName}', false)">
                    <div class="chat-avatar" style="background: linear-gradient(135deg, #64748b, #475569);">${firstName.substring(0,2).toUpperCase()}</div>
                    <div class="chat-details">
                        <div class="chat-title-row">
                            <div class="chat-name">${firstName}</div>
                        </div>
                        <div class="chat-preview" id="preview-${tgId}">Нет сообщений</div>
                    </div>
                </div>
            `;
            chatsList.insertAdjacentHTML('beforeend', rowHTML);
        }

        function sendMessage() {
            const input = document.getElementById('message-field');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            socket.emit('send_message', { receiver_id: currentChatId, text: text }, (response) => {
                if (response && response.status === 'ok') {
                    renderSingleMessage(response.message);
                    const previewEl = document.getElementById(`preview-${currentChatId}`);
                    if (previewEl) previewEl.innerText = text;
                    scrollToBottom();
                }
            });

            input.value = '';
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('message-field').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

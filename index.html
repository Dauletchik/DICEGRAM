<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        :root {
            --tg-bg-color: #0e1621;
            --tg-surface-color: #17212b;
            --tg-text-color: #f5f5f5;
            --tg-text-secondary: #7f91a4;
            --tg-accent-color: #5288c1;
            --tg-border-color: #101924;
            --tg-msg-out: #2b5278;
            --tg-msg-in: #182533;
            --tg-verified: #2f8cc9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            overflow: hidden;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3.5px solid rgba(127, 145, 164, 0.2);
            border-top: 3.5px solid var(--tg-accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Главный контейнер приложения */
        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Шапка Telegram */
        header {
            height: 56px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .header-content-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-main-title {
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .connection-status {
            font-size: 12px;
            color: var(--tg-text-secondary);
            font-weight: normal;
            margin-top: 2px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--tg-accent-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Основные экраны */
        .screen {
            flex: 1;
            display: none;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Элемент списка чатов */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid var(--tg-border-color);
            cursor: pointer;
            background-color: var(--tg-surface-color);
        }

        .chat-item:active {
            background-color: #202b36;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5085b1, #366187);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #ffffff;
        }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tg-verify-icon {
            width: 15px;
            height: 15px;
            fill: var(--tg-verified);
        }

        .chat-preview {
            font-size: 13.5px;
            color: var(--tg-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75vw;
        }

        /* ПОЛНОЭКРАННОЕ ОКНО ОТКРЫТОГО ЧАТА */
        #chat-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            z-index: 2000; /* Перекрывает всё, включая нижнее меню */
            display: none;
            flex-direction: column;
        }

        #chat-messages {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: radial-gradient(rgba(23, 33, 43, 0.3) 15%, transparent 16%);
            background-size: 16px 16px;
        }

        /* Облачка сообщений (Бабблы) */
        .message {
            max-width: 75%;
            padding: 9px 13px;
            border-radius: 14px;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.sent {
            background-color: var(--tg-msg-out);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            color: #ffffff;
        }

        .message.received {
            background-color: var(--tg-msg-in);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            color: #f5f5f5;
        }

        /* Стилизация приветственного сообщения поддержки */
        .message.system-welcome {
            background-color: var(--tg-msg-in);
            border: 1px solid rgba(82, 136, 193, 0.15);
            max-width: 85%;
            align-self: center;
            border-radius: 14px;
            color: #e2e8f0;
            white-space: pre-line;
            font-size: 14px;
            text-shadow: none;
        }

        .mention-link {
            color: #6fb1e4;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        
        .mention-link:hover {
            text-decoration: underline;
        }

        /* Поле ввода сообщений в самом низу экрана чата */
        .chat-input-area {
            padding: 10px 14px;
            background-color: var(--tg-surface-color);
            border-top: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            background-color: var(--tg-bg-color);
            border: 1px solid var(--tg-border-color);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--tg-text-color);
            font-size: 15px;
            outline: none;
        }

        .chat-input:focus {
            border-color: rgba(82, 136, 193, 0.4);
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--tg-accent-color);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:active {
            opacity: 0.7;
        }

        /* Контейнеры пустых окон */
        .placeholder-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--tg-text-secondary);
            font-size: 15px;
        }

        /* Профиль */
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: var(--tg-border-color);
            margin-bottom: 12px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .profile-username {
            font-size: 14px;
            color: var(--tg-text-secondary);
        }

        /* Нижний Навигатор главного меню */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: var(--tg-surface-color);
            border-top: 1px solid var(--tg-border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tg-text-secondary);
            font-size: 11px;
            cursor: pointer;
            height: 100%;
            gap: 2px;
        }

        .nav-item.active {
            color: var(--tg-accent-color);
        }

        .nav-icon {
            font-size: 22px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 6px;">Соединение с сервером...</p>
        <p style="color: var(--tg-text-secondary); font-size: 13px; max-width: 280px;">Пожалуйста, подождите. Идет авторизация в сети DICEGRAM.</p>
    </div>

    <div id="app-container">
        
        <header id="main-header">
            <div class="header-content-left">
                <span id="header-title" class="header-main-title">Чаты</span>
                <span id="global-status" class="connection-status">Обновление...</span>
            </div>
        </header>

        <div id="screen-chats" class="screen active">
            <div id="chats-list">
                <div class="chat-item" onclick="openChat('0', 'DICEGRAM SUPPORT', true)">
                    <div class="chat-avatar" style="background: linear-gradient(135deg, #2a9d8f, #264653);">DS</div>
                    <div class="chat-details">
                        <div class="chat-title-row">
                            <div class="chat-name">
                                DICEGRAM SUPPORT
                                <svg class="tg-verify-icon" viewBox="0 0 24 24">
                                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                                </svg>
                            </div>
                        </div>
                        <div class="chat-preview" id="preview-0">Нажмите сюда для связи с разработчиком</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="chat-room">
            <header>
                <button class="back-btn" onclick="closeChat()">
                    <span>❮</span> Назад
                </button>
                <span id="chat-room-title" class="header-main-title">Чат</span>
                <div style="width: 50px;"></div>
            </header>
            
            <div id="chat-messages"></div>
            
            <div class="chat-input-area">
                <input type="text" id="message-field" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div id="screen-contacts" class="screen">
            <div class="placeholder-screen">Список контактов пуст</div>
        </div>

        <div id="screen-settings" class="screen">
            <div class="placeholder-screen">Настройки DICEGRAM v1.2.0</div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="profile-container">
                <img id="user-avatar" class="profile-avatar" src="https://via.placeholder.com/100/17212b/ffffff?text=U" alt="Avatar">
                <div id="user-name" class="profile-name">Имя Фамилия</div>
                <div id="user-username" class="profile-username">@username</div>
            </div>
        </div>

        <nav id="bottom-navigation">
            <div class="nav-item active" onclick="switchTab('chats', this)">
                <div class="nav-icon">💬</div>
                <div>Чаты</div>
            </div>
            <div class="nav-item" onclick="switchTab('contacts', this)">
                <div class="nav-icon">👥</div>
                <div>Контакты</div>
            </div>
            <div class="nav-item" onclick="switchTab('settings', this)">
                <div class="nav-icon">⚙️</div>
                <div>Настройки</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile', this)">
                <div class="nav-icon">👤</div>
                <div>Профиль</div>
            </div>
        </nav>

    </div>

    <script>
        // Интеграция среды Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const SERVER_URL = "https://a38182-6d28.j.jrnm.app";

        const socket = io(SERVER_URL, {
            transports: ["websocket"],
            secure: true
        });

        let currentChatId = null;
        let myTelegramId = null;
        let dynamicChats = {};

        // Безопасный парсинг данных пользователя из TG API с фоллбеком для обычного браузера
        const tgUser = tg.initDataUnsafe?.user || {
            id: 123456789,
            first_name: "Локальный",
            last_name: "Пользователь",
            username: "тест_юзер",
            photo_url: ""
        };

        myTelegramId = String(tgUser.id);

        // Наполнение вкладки профиля
        document.getElementById('user-name').innerText = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim();
        document.getElementById('user-username').innerText = tgUser.username ? `@${tgUser.username}` : '';
        if (tgUser.photo_url) {
            document.getElementById('user-avatar').src = tgUser.photo_url;
        }

        // Логика состояния сокет-соединения в шапке
        socket.on('connect', () => {
            console.log("Успешное подключение к ноде Socket.IO.");
            document.getElementById('global-status').style.display = 'none';

            // Авторизация сессии
            socket.emit('auth', tgUser, (response) => {
                if (response && response.status === 'ok') {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                }
            });
        });

        socket.on('disconnect', () => {
            console.log("Соединение разорвано шлюзом.");
            const statusEl = document.getElementById('global-status');
            statusEl.style.display = 'block';
            statusEl.innerText = "Соединение...";
        });

        // Слушатель входящего трафика сообщений
        socket.on('new_message', (msg) => {
            const chatPartner = msg.sender_id === myTelegramId ? msg.receiver_id : msg.sender_id;

            if (chatPartner !== "0" && !dynamicChats[chatPartner]) {
                createChatRow(chatPartner, "Новый контакт", `@id${chatPartner}`);
            }

            const previewEl = document.getElementById(`preview-${chatPartner}`);
            if (previewEl) {
                previewEl.innerText = msg.text;
            }

            if (currentChatId === chatPartner) {
                renderSingleMessage(msg);
                scrollToBottom();
            }
        });

        // Переключение между 4-мя вкладками меню
        function switchTab(tabName, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(`screen-${tabName}`).classList.add('active');
            element.classList.add('active');

            const headerTitle = document.getElementById('header-title');
            if (tabName === 'chats') headerTitle.innerText = "Чаты";
            if (tabName === 'contacts') headerTitle.innerText = "Контакты";
            if (tabName === 'settings') headerTitle.innerText = "Настройки";
            if (tabName === 'profile') headerTitle.innerText = "Профиль";
        }

        // Логика открытия чата с полной блокировкой нижнего меню
        function openChat(chatId, chatName, isVerified = false) {
            currentChatId = chatId;
            document.getElementById('chat-room-title').innerText = chatName;
            
            // Скрываем нижнее меню навигации, чтобы освободить место под input переписки
            document.getElementById('bottom-navigation').style.display = 'none';
            document.getElementById('chat-room').style.display = 'flex';
            
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = '';

            // Генерация стартового облачка-приветствия (только для саппорта при первом заходе)
            if (chatId === "0" && !localStorage.getItem(`welcome_shown_${myTelegramId}`)) {
                renderSystemWelcomeMessage();
                localStorage.setItem(`welcome_shown_${myTelegramId}`, "true");
            }

            // Загрузка сохраненной истории из бэкенда SQLite
            socket.emit('get_chat_history', { with_id: chatId }, (history) => {
                if (history && Array.isArray(history)) {
                    history.forEach(msg => renderSingleMessage(msg));
                    scrollToBottom();
                }
            });
        }

        // Возврат к списку чатов и активация меню
        function closeChat() {
            document.getElementById('chat-room').style.display = 'none';
            // Возвращаем нижнее меню обратно на экран
            document.getElementById('bottom-navigation').style.display = 'flex';
            currentChatId = null;
        }

        // Отрисовка приветственного блока на основе данных WebApp
        function renderSystemWelcomeMessage() {
            const container = document.getElementById('chat-messages');
            const welcomeEl = document.createElement('div');
            welcomeEl.classList.add('message', 'system-welcome');
            
            welcomeEl.innerText = `🤖 Вы успешно зарегистрировали аккаунт в DICEGRAM!
👤 Ваш никнейм: ${tgUser.first_name} ${tgUser.last_name || ''}
🏷️ Ваш юзернейм: @${tgUser.username || 'тест_юзер'}
🆔 Ваш ID: ${myTelegramId}`;
            
            container.appendChild(welcomeEl);
        }

        function renderSingleMessage(msg) {
            const container = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.classList.add('message');

            if (msg.sender_id === myTelegramId) {
                msgEl.classList.add('sent'); // Синий/зеленый баббл справа
            } else {
                msgEl.classList.add('received'); // Серый баббл слева
            }
            
            msgEl.innerHTML = formatMessageText(msg.text);
            container.appendChild(msgEl);
        }

        // Подсветка регулярным выражением @username в синие кликабельные элементы
        function formatMessageText(text) {
            const mentionRegex = /(@[a-zA-Z0-9_]{3,32})/g;
            return text.replace(mentionRegex, function(match) {
                return `<span class="mention-link" onclick="handleMentionClick('${match}')">${match}</span>`;
            });
        }

        // Обработчик нажатия на подсвеченный юзернейм
        function handleMentionClick(username) {
            console.log("Поиск совпадений для:", username);
            socket.emit('find_user', { username: username }, (response) => {
                if (response && response.status === 'found') {
                    const user = response.user;

                    if (user.telegram_id === myTelegramId) {
                        alert("Это ваш собственный юзернейм!");
                        return;
                    }

                    if (!dynamicChats[user.telegram_id]) {
                        createChatRow(user.telegram_id, user.first_name, user.username);
                    }

                    openChat(user.telegram_id, user.first_name, false);
                } else {
                    alert(`Пользователь ${username} не зарегистрирован в системе DICEGRAM.`);
                }
            });
        }

        function createChatRow(tgId, firstName, username) {
            dynamicChats[tgId] = { first_name: firstName, username: username };

            const chatsList = document.getElementById('chats-list');
            const rowHTML = `
                <div class="chat-item" onclick="openChat('${tgId}', '${firstName}', false)">
                    <div class="chat-avatar">${firstName.substring(0,2).toUpperCase()}</div>
                    <div class="chat-details">
                        <div class="chat-title-row">
                            <div class="chat-name">${firstName}</div>
                        </div>
                        <div class="chat-preview" id="preview-${tgId}">Нет сообщений</div>
                    </div>
                </div>
            `;
            chatsList.insertAdjacentHTML('beforeend', rowHTML);
        }

        // Отправка текстового сообщения на бэкенд
        function sendMessage() {
            const input = document.getElementById('message-field');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            socket.emit('send_message', { receiver_id: currentChatId, text: text }, (response) => {
                if (response && response.status === 'ok') {
                    renderSingleMessage(response.message);
                    const previewEl = document.getElementById(`preview-${currentChatId}`);
                    if (previewEl) previewEl.innerText = text;
                    scrollToBottom();
                }
            });

            input.value = '';
            input.focus();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        // Слушатель отправки по кнопке Enter
        document.getElementById('message-field').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

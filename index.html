<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #17212b;
            --bg-secondary: #0e1621;
            --bg-chat: #0e1621;
            --bg-message-out: #2b5278;
            --bg-message-in: #182533;
            --text-primary: #f5f5f5;
            --text-secondary: #708499;
            --accent: #5288c1;
            --accent-hover: #6ba1d6;
            --border: #101921;
            --input-bg: #242f3d;
            --online: #4dcd5e;
            --danger: #e53935;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== AUTH SCREEN ===== */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-secondary);
        }

        .auth-container {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 48px 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .auth-logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), #7c4dff);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .auth-container h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .auth-container p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .auth-input:focus {
            border-color: var(--accent);
        }

        .auth-input::placeholder {
            color: var(--text-secondary);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
        }

        .auth-toggle {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-toggle span {
            color: var(--accent);
            cursor: pointer;
        }

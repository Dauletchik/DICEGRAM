<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Free Fire Shooter | KREE KIRE</title>
    <!-- Google Fonts: агрессивный экшн-стиль -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* легкий игровой стиль */
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Orbitron', 'Rajdhani', 'Bangers', sans-serif;
            /* ФОН: замените URL на нужную картинку пустыни */
            background: url('https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1600') no-repeat center center;
            background-size: cover;
            position: relative;
            color: white;
        }

        /* затемнение для читаемости текста, как в free fire */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.65) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* главный контейнер GRID - по краям экрана */
        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
            padding: 20px 25px 25px 25px;
        }

        /* ========= ВЕРХНЯЯ ПАНЕЛЬ (Header) ========= */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px 8px 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 100%;
        }

        /* левый блок: имя + уровень */
        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 18px 5px 15px;
            border-radius: 40px;
            border-left: 3px solid #ffcc00;
        }
        .player-name {
            font-family: 'Bangers', cursive;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #FFE484;
            text-shadow: 3px 3px 0 #b45f06, 0 0 8px #ff9900;
            margin-right: 5px;
        }
        .level-icon {
            background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            border: 2px solid #FFD966;
            color: #FFD966;
            box-shadow: 0 0 6px gold;
            font-family: 'Orbitron', monospace;
        }

        /* правый блок ресурсы */
        .resources {
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 6px 20px;
            border-radius: 50px;
        }
        .gold, .diamonds {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 1.3rem;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 1px 1px 0 black;
        }
        .gold i, .diamonds i {
            font-size: 1.6rem;
        }
        .gold i { color: #FFD966; }
        .diamonds i { color: #4afff5; text-shadow: 0 0 3px cyan;}

        /* ========= ОСНОВНАЯ СЕТКА (боковое меню + правая часть) ========= */
        .middle-area {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin: 20px 0;
            gap: 20px;
        }

        /* ЛЕВОЕ МЕНЮ (Sidebar) */
        .sidebar {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px 12px;
            width: 240px;
            border: 1px solid rgba(255, 200, 50, 0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(20, 20, 30, 0.7);
            margin: 12px 0;
            padding: 12px 20px;
            border-radius: 50px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #f0f0f0;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .nav-btn i {
            width: 28px;
            font-size: 1.5rem;
            color: #ffcc44;
        }
        .nav-btn:hover {
            background: rgba(255, 200, 70, 0.25);
            transform: scale(1.02) translateX(6px);
            border-color: #ffcc44;
            box-shadow: 0 0 12px rgba(255, 204, 0, 0.5);
            color: #ffdd88;
        }

        /* ПРАВАЯ ЧАСТЬ: друзья онлайн + режимы */
        .right-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            width: 240px;
        }
        .friends-online {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 15px 18px;
            width: 100%;
            text-align: right;
            border-right: 3px solid #ffaa33;
        }
        .friends-title {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffcc77;
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .friend-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            font-size: 1rem;
            font-weight: 500;
        }
        .friend-item i {
            font-size: 1.3rem;
            color: #5eff6e;
        }
        .friend-name {
            font-family: 'Rajdhani', monospace;
        }
        .mode-buttons {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .mode-btn {
            background: rgba(10, 10, 20, 0.8);
            padding: 10px;
            text-align: center;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255, 200, 100, 0.3);
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
        }
        .mode-btn:hover {
            background: #ffaa2a;
            color: black;
            transform: scale(1.02);
            box-shadow: 0 0 10px gold;
        }

        /* ========= НИЖНЯЯ ПАНЕЛЬ (Footer) ========= */
        .footer-menu {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 30px;
            margin-top: 10px;
            border-top: 1px solid #ffcc44;
            border-bottom: 1px solid #ffcc44;
        }
        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #ddd;
            padding: 6px 18px;
            border-radius: 40px;
        }
        .footer-btn i {
            font-size: 1.7rem;
            color: #ffcc55;
        }
        .footer-btn span {
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        .footer-btn:hover {
            background: rgba(255, 204, 85, 0.3);
            transform: translateY(-4px);
            color: #ffdd99;
        }

        /* БОЛЬШАЯ КНОПКА СТАРТ (правый нижний угол абсолютно) */
        .start-btn-wrapper {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 15;
        }
        .start-button {
            background: radial-gradient(circle at 30% 20%, #FFD966, #F0A500);
            border: none;
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            padding: 18px 42px;
            border-radius: 80px;
            color: #1f2a0e;
            text-shadow: 2px 2px 0 #FFE484;
            letter-spacing: 3px;
            box-shadow: 0 15px 0 #a05e15, 0 8px 25px black;
            cursor: pointer;
            transition: all 0.07s linear;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .start-button:active {
            transform: translateY(4px);
            box-shadow: 0 8px 0 #a05e15;
        }
        .start-button:hover {
            transform: scale(1.02) translateY(-2px);
            background: radial-gradient(circle at 30% 20%, #FFE28C, #ffbb2e);
            box-shadow: 0 12px 0 #a05e15, 0 10px 30px gold;
        }

        /* адаптивность небольшая */
        @media (max-width: 800px) {
            .player-name { font-size: 1.3rem; }
            .sidebar { width: 180px; }
            .nav-btn { padding: 8px 12px; font-size: 0.9rem; }
            .right-panel { width: 180px; }
            .start-button { font-size: 1.6rem; padding: 12px 28px; }
        }

        /* всплывающее уведомление (имитация старта) */
        .toast-msg {
            position: fixed;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(20px);
            color: #ffd966;
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            padding: 12px 28px;
            border-radius: 60px;
            border: 2px solid gold;
            z-index: 200;
            pointer-events: none;
            animation: fadeUp 1.2s forwards;
            white-space: nowrap;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px);}
            20% { opacity: 1; transform: translateX(-50%) translateY(0px);}
            80% { opacity: 1; transform: translateX(-50%) translateY(0px);}
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); visibility: hidden;}
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- Верхняя панель Header: крупно KREE KIRE слева -->
    <div class="top-bar">
        <div class="player-info">
            <div class="player-name">KREE KIRE</div>
            <div class="level-icon">69</div>
        </div>
        <div class="resources">
            <div class="gold"><i class="fas fa-coins"></i> 12,450</div>
            <div class="diamonds"><i class="fas fa-gem"></i> 890</div>
        </div>
    </div>

    <!-- средняя секция: левое меню + правая панель -->
    <div class="middle-area">
        <!-- левый сайдбар (Магазин, Джекпот, Booyah Пропуск, Миссии, События) -->
        <div class="sidebar">
            <div class="nav-btn" data-action="shop"><i class="fas fa-store"></i> <span>Магазин</span></div>
            <div class="nav-btn" data-action="jackpot"><i class="fas fa-trophy"></i> <span>Джекпот</span></div>
            <div class="nav-btn" data-action="booyah"><i class="fas fa-ticket-alt"></i> <span>Booyah Пропуск</span></div>
            <div class="nav-btn" data-action="missions"><i class="fas fa-tasks"></i> <span>Миссии</span></div>
            <div class="nav-btn" data-action="events"><i class="fas fa-calendar-alt"></i> <span>События</span></div>
        </div>

        <!-- Правая часть: иконки друзей онлайн и кнопки режимов -->
        <div class="right-panel">
            <div class="friends-online">
                <div class="friends-title"><span>ДРУЗЬЯ ОНЛАЙН</span> <i class="fas fa-user-friends"></i></div>
                <div class="friend-list">
                    <div class="friend-item"><span class="friend-name">GHOST_47</span> <i class="fas fa-circle" style="font-size: 0.7rem; color:#3eff5e;"></i></div>
                    <div class="friend-item"><span class="friend-name">ViperX</span> <i class="fas fa-circle" style="font-size: 0.7rem; color:#3eff5e;"></i></div>
                    <div class="friend-item"><span class="friend-name">KILLER_BEAN</span> <i class="fas fa-circle" style="font-size: 0.7rem; color:#3eff5e;"></i></div>
                    <div class="friend-item"><span class="friend-name">DIABLO_FF</span> <i class="fas fa-circle" style="font-size: 0.7rem; color:#3eff5e;"></i></div>
                </div>
            </div>
            <div class="mode-buttons">
                <div class="mode-btn">КЛАССИЧЕСКИЙ <i class="fas fa-gamepad"></i></div>
                <div class="mode-btn">БОЕВОЙ РОЯЛЬ  <i class="fas fa-skull"></i></div>
                <div class="mode-btn">КОМАНДНЫЙ БОЙ</div>
                <div class="mode-btn">КЛОНОВОЕ ПОЛЕ</div>
            </div>
        </div>
    </div>

    <!-- Нижняя панель (Footer): Склад, Оружие, Пресет, Лаба -->
    <div class="footer-menu">
        <div class="footer-btn" data-footer="inventory"><i class="fas fa-box"></i><span>Склад</span></div>
        <div class="footer-btn" data-footer="weapon"><i class="fas fa-gun"></i><span>Оружие</span></div>
        <div class="footer-btn" data-footer="preset"><i class="fas fa-layer-group"></i><span>Пресет</span></div>
        <div class="footer-btn" data-footer="lab"><i class="fas fa-flask"></i><span>Лаба</span></div>
    </div>
</div>

<!-- Отдельная большая кнопка СТАРТ в правом нижнем углу -->
<div class="start-btn-wrapper">
    <button class="start-button" id="bigStartBtn"><i class="fas fa-play"></i> СТАРТ</button>
</div>

<script>
    // Имитация клика по кнопке СТАРТ + всплывающие уведомления для меню (игровой стиль)
    function showNotification(message) {
        // удалить предыдущий тост, если есть
        const existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            if(toast) toast.remove();
        }, 1200);
    }

    // Эмуляция старта матча
    const startBtn = document.getElementById('bigStartBtn');
    startBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showNotification('🔫 BOOYAH! ВЫЛЕТАЕМ НА ОСТРОВ 🔫');
        // дополнительно можно добавить вибрацию если нужно, но главное имитация
        console.log("MATCH START - KREE KIRE ГОТОВ К БИТВЕ!");
    });

    // Обработчики для бокового меню (вывод сообщения - как в free fire, переход в раздел демо)
    const sideBtns = document.querySelectorAll('.nav-btn');
    sideBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const textSpan = btn.querySelector('span')?.innerText || btn.innerText;
            showNotification(`📌 ${textSpan} : скоро в игре!`);
        });
    });

    // для кнопок режимов
    const modeButtons = document.querySelectorAll('.mode-btn');
    modeButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const modeText = btn.innerText.trim();
            showNotification(`🎮 РЕЖИМ "${modeText}" | ПОИСК ИГРОКОВ...`);
        });
    });

    // для нижних кнопок (Склад, Оружие, Пресет, Лаба)
    const footerActions = document.querySelectorAll('.footer-btn');
    footerActions.forEach(btn => {
        btn.addEventListener('click', () => {
            const spanText = btn.querySelector('span')?.innerText || "раздел";
            showNotification(`⚙️ ${spanText} : Экипировка KREE KIRE`);
        });
    });

    // Дополнительно: кнопка друзей онлайн (клик по имени друга)
    const friendsItems = document.querySelectorAll('.friend-item');
    friendsItems.forEach(friend => {
        friend.addEventListener('click', () => {
            const name = friend.querySelector('.friend-name')?.innerText || "игрок";
            showNotification(`💬 Пригласить ${name} в отряд?`);
        });
    });

    // Эффект лёгкой адаптации под изменение размера, но главное сохранить позиционирование
    // Также имитация уровня + ресурсов (статично, но круто)
    // Если кликнуть на золото/алмазы - небольшой фидбек
    const goldDiv = document.querySelector('.gold');
    const diamondDiv = document.querySelector('.diamonds');
    if(goldDiv) {
        goldDiv.addEventListener('click', () => showNotification('💰 + 500 золота (ежедневный бонус)'));
    }
    if(diamondDiv) {
        diamondDiv.addEventListener('click', () => showNotification('💎 МАГАЗИН АЛМАЗОВ | ПОПОЛНЕНИЕ'));
    }
    // Анимация нажатия на уровень
    const levelIconDiv = document.querySelector('.level-icon');
    if(levelIconDiv) {
        levelIconDiv.addEventListener('click', () => showNotification('🏆 УРОВЕНЬ 69 | СЛЕДУЮЩИЙ РАНГ'));
    }

    // Добавим эффект изменения курсора и небольшие звукоподобные ощущения (только визуал)
    console.log("Free Fire Clone | KREE KIRE | Готов к бою!");
</script>

<!-- дополнительный комментарий: фон можно поменять в теге body background url -->
<!-- Вставьте свой URL пустыни вместо текущего образца -->
</body>

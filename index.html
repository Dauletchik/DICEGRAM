<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM — мессенджер с душой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f16;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Главный контейнер — адаптив и мобильная клавиатура не ломает */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            background: #0f1722;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
        }

        /* Навигация + рабочая область (flex для планшетов/пк) */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 0;  /* важно для скроллов */
            overflow: hidden;
        }

        /* Сайдбар — адаптив */
        .sidebar {
            width: 300px;
            background: #111a24;
            border-right: 1px solid #242f3a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s;
        }

        .sidebar-header {
            padding: 20px 18px 12px;
            background: #0e1620;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .user-panel {
            background: #1a2a34;
            border-radius: 28px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }

        .user-tag {
            font-weight: 600;
            color: #cddcec;
            font-size: 15px;
        }

        .user-tag span {
            color: #FFB347;
            font-weight: bold;
        }

        .logout-btn {
            background: #2a3e4a;
            border: none;
            color: #ffaa66;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .search-area {
            padding: 16px 16px 12px;
        }

        .search-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #1f2e38;
            border-radius: 40px;
            padding: 4px 8px 4px 18px;
            border: 1px solid #2f4555;
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .search-wrapper button {
            background: #ffb347;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .dialogs-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 20px;
        }

        .dialog-item {
            background: #14222c;
            border-radius: 20px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #293e4a;
        }

        .dialog-item.active {
            background: #2a414f;
            border-left: 4px solid #ffb347;
        }

        .dialog-name {
            font-weight: bold;
            color: #ffd58c;
            font-size: 16px;
        }

        .dialog-preview {
            font-size: 12px;
            color: #90a9bc;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Чат область */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0c141f;
            min-height: 0;
        }

        .chat-header {
            padding: 18px 24px;
            background: #0e1620;
            border-bottom: 1px solid #1f2e38;
        }

        .chat-header h3 {
            color: #FFD966;
            font-size: 22px;
        }

        .chat-header p {
            color: #7d98ae;
            font-size: 13px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            font-size: 15px;
        }

        .outgoing {
            background: #FFB347;
            color: #1f2a2e;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .incoming {
            background: #1e2f3c;
            color: #f0f4fa;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .input-row {
            padding: 16px 20px 22px;
            background: #0e1620;
            border-top: 1px solid #1e2d38;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            background: #1f2e3a;
            border: none;
            padding: 14px 18px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .input-row button {
            background: #ffb347;
            border: none;
            padding: 0 24px;
            height: 50px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Регистрация */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 10, 18, 0.96);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .auth-card {
            background: #14222e;
            max-width: 400px;
            width: 100%;
            padding: 40px 28px;
            border-radius: 48px;
            text-align: center;
            border: 1px solid #ffb34755;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
        }

        .auth-card h1 {
            font-size: 52px;
            background: linear-gradient(135deg, #FFE0A3, #FFAA44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-card input {
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            background: #1e303e;
            border: 1px solid #3b5b6e;
            color: white;
            font-size: 18px;
            text-align: center;
            margin: 20px 0 10px;
        }

        .error-auth {
            color: #ff8a7a;
            font-size: 14px;
            min-height: 40px;
        }

        .auth-card button {
            background: #ffb347;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .toast-bot {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 360px;
            background: #1f2e3a;
            border-left: 6px solid #ffb347;
            padding: 14px 18px;
            border-radius: 28px;
            color: #f0f0f0;
            font-size: 14px;
            z-index: 2100;
            box-shadow: 0 8px 20px black;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 680px) {
            .sidebar {
                width: 260px;
            }
            .message {
                max-width: 90%;
            }
            .input-row button {
                padding: 0 18px;
            }
        }

        @media (max-width: 550px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 1px solid #242f3a;
            }
            .chat-area {
                height: 60%;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appRoot"></div>

<script>
    // ======================== ХРАНИЛИЩЕ ========================
    let DB = {
        users: [],      // { username, regDate }
        messages: []    // { from, to, text, timestamp }
    };

    function loadStorage() {
        const u = localStorage.getItem('DICEGRAM_users');
        const m = localStorage.getItem('DICEGRAM_messages');
        if (u) DB.users = JSON.parse(u);
        if (m) DB.messages = JSON.parse(m);
        if (!Array.isArray(DB.users)) DB.users = [];
        if (!Array.isArray(DB.messages)) DB.messages = [];
    }

    function saveUsers() { localStorage.setItem('DICEGRAM_users', JSON.stringify(DB.users)); }
    function saveMessages() { localStorage.setItem('DICEGRAM_messages', JSON.stringify(DB.messages)); }

    // проверка существования (регистронезависимая)
    function userExists(username) {
        return DB.users.some(u => u.username.toLowerCase() === username.toLowerCase());
    }

    // регистрация
    function registerNewUser(username) {
        const clean = username.trim();
        if (!clean) return { ok: false, err: "Напиши юзернейм!" };
        if (userExists(clean)) return { ok: false, err: "уже существует такой юзернейм 😢" };
        const newUser = { username: clean, regDate: Date.now() };
        DB.users.push(newUser);
        saveUsers();
        localStorage.setItem('DICEGRAM_currentUser', clean);
        // Бот DICEGRAM | официальное сообщение
        const botMsg = {
            from: "DICEGRAM_official_bot",
            to: clean,
            text: `🎉 Вы успешно зарегистрировали аккаунт в DICEGRAM со юзером @${clean}. Добро пожаловать! ✨ Теперь общайся с друзьями.`,
            timestamp: new Date().toISOString()
        };
        DB.messages.push(botMsg);
        saveMessages();
        showBotToast(`🤖 DICEGRAM | официальное бот: Привет, @${clean}! Ты в игре.`);
        return { ok: true };
    }

    function getCurrentUser() { return localStorage.getItem('DICEGRAM_currentUser'); }
    function logout() { localStorage.removeItem('DICEGRAM_currentUser'); renderApp(); }

    function showBotToast(text) {
        let toast = document.querySelector('.toast-bot');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-bot';
            document.body.appendChild(toast);
        }
        toast.innerText = text;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    // отправить сообщение
    function sendMessageTo(fromUser, toUser, text) {
        if (!text.trim()) return false;
        const msg = {
            from: fromUser,
            to: toUser,
            text: text.trim(),
            timestamp: new Date().toISOString()
        };
        DB.messages.push(msg);
        saveMessages();
        return true;
    }

    // получить диалоги (уникальные собеседники, с которыми переписывались + все остальные зарегистрированные, кроме себя)
    function getDialogs(currentUser) {
        const allUsers = DB.users.map(u => u.username).filter(u => u !== currentUser);
        const msgsFromTo = DB.messages.filter(m => m.from === currentUser || m.to === currentUser);
        const interlocutors = new Set();
        msgsFromTo.forEach(m => {
            if (m.from === currentUser) interlocutors.add(m.to);
            if (m.to === currentUser) interlocutors.add(m.from);
        });
        allUsers.forEach(u => interlocutors.add(u));
        // убираем бота из диалогов? нет, оставляем, но это круто
        let dialogsArr = Array.from(interlocutors).filter(name => name !== currentUser);
        // сортируем по последнему сообщению
        dialogsArr.sort((a,b) => {
            const lastA = DB.messages.filter(m => (m.from === currentUser && m.to === a) || (m.from === a && m.to === currentUser)).sort((x,y)=> new Date(y.timestamp) - new Date(x.timestamp))[0];
            const lastB = DB.messages.filter(m => (m.from === currentUser && m.to === b) || (m.from === b && m.to === currentUser)).sort((x,y)=> new Date(y.timestamp) - new Date(x.timestamp))[0];
            if(!lastA && !lastB) return 0;
            if(!lastA) return 1;
            if(!lastB) return -1;
            return new Date(lastB.timestamp) - new Date(lastA.timestamp);
        });
        return dialogsArr;
    }

    function getMessagesBetween(userA, userB) {
        return DB.messages.filter(m => 
            (m.from === userA && m.to === userB) || (m.from === userB && m.to === userA)
        ).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    }

    function getLastPreview(current, interlocutor) {
        const relevant = DB.messages.filter(m => 
            (m.from === current && m.to === interlocutor) || (m.from === interlocutor && m.to === current)
        ).sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
        if (relevant.length === 0) return "💬 Напишите сообщение...";
        const last = relevant[0];
        const prefix = last.from === current ? "Вы: " : `@${last.from}: `;
        let preview = last.text.length > 40 ? last.text.slice(0,37)+"..." : last.text;
        return prefix + preview;
    }

    // глобальная переменная активного чата
    let activeChat = null;

    function renderApp() {
        const current = getCurrentUser();
        const root = document.getElementById('appRoot');
        if (!current) {
            // Экран регистрации с красивым вводом
            root.innerHTML = `
                <div class="auth-overlay">
                    <div class="auth-card">
                        <h1>🎲 DICEGRAM</h1>
                        <p style="color:#cdddee; margin:8px 0;">твой личный мессенджер</p>
                        <input type="text" id="regUsernameInput" placeholder="Напишите ваш юзернейм" autocomplete="off">
                        <div class="error-auth" id="regErrorMsg"></div>
                        <button id="doRegisterBtn">🚀 Начать историю</button>
                        <div style="margin-top:20px; font-size:13px; color:#ffbb77;">красиво будет написан ✨</div>
                    </div>
                </div>
            `;
            const regInput = document.getElementById('regUsernameInput');
            const regBtn = document.getElementById('doRegisterBtn');
            const errSpan = document.getElementById('regErrorMsg');
            const attemptReg = () => {
                const username = regInput.value.trim();
                const res = registerNewUser(username);
                if (res.ok) {
                    renderApp();
                } else {
                    errSpan.innerText = res.err;
                }
            };
            regBtn.addEventListener('click', attemptReg);
            regInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptReg(); });
            return;
        }

        // ========= ОСНОВНОЙ ИНТЕРФЕЙС ==========
        const dialogsList = getDialogs(current);
        // если активный чат не существует или удален, установим первый
        if (activeChat && !dialogsList.includes(activeChat) && activeChat !== current) {
            activeChat = dialogsList.length ? dialogsList[0] : null;
        }
        if (!activeChat && dialogsList.length) activeChat = dialogsList[0];
        
        const messages = activeChat ? getMessagesBetween(current, activeChat) : [];
        
        // HTML разметка с умным поиском @username
        root.innerHTML = `
            <div class="main-layout">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="logo">DICEGRAM</div>
                        <div class="user-panel">
                            <div class="user-tag">👤 <span>@${escapeHtml(current)}</span></div>
                            <button class="logout-btn" id="logoutSideBtn">🚪 Выйти</button>
                        </div>
                    </div>
                    <div class="search-area">
                        <div class="search-wrapper">
                            <input type="text" id="globalSearchInput" placeholder="🔍 Найти @username..." autocomplete="off">
                            <button id="searchUserBtn">Найти</button>
                        </div>
                        <div id="searchFeedback" style="font-size:12px; margin-top:6px; color:#ffaa77; padding-left:8px;"></div>
                    </div>
                    <div class="dialogs-list" id="dialogsContainer">
                        ${dialogsList.map(d => `
                            <div class="dialog-item ${activeChat === d ? 'active' : ''}" data-dialog-user="${escapeHtml(d)}">
                                <div class="dialog-name">@${escapeHtml(d)}</div>
                                <div class="dialog-preview">${escapeHtml(getLastPreview(current, d))}</div>
                            </div>
                        `).join('')}
                        ${dialogsList.length === 0 ? '<div style="padding:20px;text-align:center;color:#7d9ab0;">🌟 Найди друга через поиск и начни общение</div>' : ''}
                    </div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <h3>${activeChat ? `💬 @${escapeHtml(activeChat)}` : '✨ DICEGRAM'}</h3>
                        <p>${activeChat ? 'личные сообщения • только вы двое' : 'выберите диалог или найдите пользователя'}</p>
                    </div>
                    <div class="messages-area" id="messagesArea">
                        ${messages.map(msg => {
                            const isOut = msg.from === current;
                            return `
                                <div class="message ${isOut ? 'outgoing' : 'incoming'}">
                                    <div>${escapeHtml(msg.text)}</div>
                                    <div class="msg-time">${isOut ? 'Вы' : '@'+escapeHtml(msg.from)} • ${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                </div>
                            `;
                        }).join('')}
                        ${messages.length === 0 && activeChat ? '<div style="text-align:center; color:#67859b; margin-top:30px;">💬 Напишите первое сообщение...</div>' : ''}
                    </div>
                    <div class="input-row">
                        <input type="text" id="messageCompose" placeholder="Сообщение..." ${!activeChat ? 'disabled' : ''} autocomplete="off">
                        <button id="sendMessageBtn" ${!activeChat ? 'disabled' : ''}>➤ Отправить</button>
                    </div>
                </div>
            </div>
        `;

        // Логаут
        document.getElementById('logoutSideBtn')?.addEventListener('click', () => logout());

        // Клик по диалогам
        document.querySelectorAll('.dialog-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const username = el.getAttribute('data-dialog-user');
                if (username && username !== current) {
                    activeChat = username;
                    renderApp();
                }
            });
        });

        // ========= ПОИСК ПОЛЬЗОВАТЕЛЯ с проверкой существования =========
        const searchInput = document.getElementById('globalSearchInput');
        const searchBtn = document.getElementById('searchUserBtn');
        const feedbackSpan = document.getElementById('searchFeedback');
        
        const performSearch = () => {
            let raw = searchInput.value.trim();
            if (raw.startsWith('@')) raw = raw.slice(1);
            if (raw === "") {
                feedbackSpan.innerText = "✏️ Введите юзернейм для поиска";
                return;
            }
            const foundUser = DB.users.find(u => u.username.toLowerCase() === raw.toLowerCase());
            if (!foundUser) {
                feedbackSpan.innerText = `❌ Пользователь @${raw} не зарегистрирован в DICEGRAM`;
                return;
            }
            if (foundUser.username === current) {
                feedbackSpan.innerText = "😄 Это вы! Напишите себе? Лучше напишите другому.";
                return;
            }
            // Если пользователь существует - открываем чат с ним
            activeChat = foundUser.username;
            feedbackSpan.innerText = `✅ Открыт чат с @${foundUser.username}`;
            searchInput.value = "";
            renderApp();
            setTimeout(() => {
                if(feedbackSpan) feedbackSpan.innerText = "";
            }, 2000);
        };
        
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // ========= ОТПРАВКА СООБЩЕНИЙ (клавиатура не ломает, скролл вниз) =========
        const msgField = document.getElementById('messageCompose');
        const sendBtn = document.getElementById('sendMessageBtn');
        
        const sendMsg = () => {
            if (!activeChat) return;
            const text = msgField.value;
            if (!text.trim()) return;
            sendMessageTo(current, activeChat, text);
            msgField.value = '';
            // обновляем чат и скроллим
            renderApp();
            scrollChatToBottom();
            // сохраняем фокус в поле ввода после рендера (для удобства)
            setTimeout(() => {
                const newInput = document.getElementById('messageCompose');
                if (newInput) newInput.focus();
            }, 50);
        };
        
        if (sendBtn) sendBtn.addEventListener('click', sendMsg);
        if (msgField) {
            msgField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMsg();
                }
            });
            // автофокус при открытом чате
            msgField.focus();
        }
        
        scrollChatToBottom();
    }
    
    function scrollChatToBottom() {
        setTimeout(() => {
            const container = document.getElementById('messagesArea');
            if (container) container.scrollTop = container.scrollHeight;
        }, 30);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Инициализация БД с демо-юзером и ботом, но чтобы регистрация была чистой, добавляем пару фейковых
    function initDemoData() {
        if (DB.users.length === 0) {
            DB.users.push({ username: "Alex", regDate: Date.now() });
            DB.users.push({ username: "Jessica", regDate: Date.now() });
            DB.users.push({ username: "DICEGRAM_official_bot", regDate: 1 });
            saveUsers();
            // приветственное сообщение от бота Алексу для примера
            if (DB.messages.length === 0) {
                DB.messages.push({ from: "DICEGRAM_official_bot", to: "Alex", text: "Привет! Это официальный бот DICEGRAM. Здесь безопасно и уютно 💙", timestamp: new Date().toISOString() });
                saveMessages();
            }
        }
    }
    
    // Глобальная обработка изменения размера viewport (чтобы клавиатура не ломала)
    function handleResize() {
        // просто форсируем скролл активного чата при изменении (для мобильных клавиатур)
        const msgArea = document.getElementById('messagesArea');
        if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
    }
    
    // Старт приложения
    loadStorage();
    initDemoData();
    renderApp();
    window.addEventListener('resize', () => {
        setTimeout(() => {
            const area = document.getElementById('messagesArea');
            if (area) area.scrollTop = area.scrollHeight;
        }, 100);
    });
    window.addEventListener('load', () => {
        // дополнительно фикс для клавиатуры на мобильных устройствах: при фокусе поле ввода поднимается, но мы перерисовываем скролл
        document.body.addEventListener('focusin', (e) => {
            if (e.target && (e.target.id === 'messageCompose' || e.target.id === 'globalSearchInput' || e.target.id === 'regUsernameInput')) {
                setTimeout(() => {
                    const msgCont = document.getElementById('messagesArea');
                    if (msgCont) msgCont.scrollTop = msgCont.scrollHeight;
                }, 300);
            }
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- Общие и системные стили Telegram --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Шапка приложения (Header) --- */
        .tg-header {
            background-color: #ffffff;
            padding: 12px 16px 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header-title {
            font-size: 21px;
            font-weight: 700;
            color: #2481cc;
            letter-spacing: -0.2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #4f5459;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #53575c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* --- Вкладки (Tabs) --- */
        .tg-tabs {
            display: flex;
            background-color: #ffffff;
            padding: 6px 16px 10px 16px;
            gap: 10px;
            border-bottom: 1px solid #f0f0f2;
        }

        .tg-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: #f0f5fa;
            color: #2481cc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .tab-badge {
            background-color: #2481cc;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* --- Контейнер для экранов --- */
        .screen-container {
            flex: 1;
            overflow-y: auto;
            background-color: #ffffff;
            position: relative;
        }

        .app-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        .app-screen.active {
            display: block;
        }

        /* --- Список чатов --- */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-bottom: 0.5px solid #f4f4f6;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .chat-item:active {
            background-color: #f2f2f5;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .avatar-support { 
            background: linear-gradient(135deg, #2abee2, #1d74e7); 
        }

        .chat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .chat-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-name-container {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Синяя галочка верификации */
        .verified-badge {
            width: 15px;
            height: 15px;
            background-color: #2481cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 9px;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 12px;
            color: #707579;
            white-space: nowrap;
        }

        .chat-row-bottom {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .chat-message {
            font-size: 14px;
            color: #707579;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .chat-meta-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-width: 20px;
        }

        .unread-badge {
            background-color: #2481cc;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            margin-top: 2px;
        }

        /* --- Стили для страниц-заглушек --- */
        .placeholder-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #707579;
            font-size: 16px;
            font-weight: 500;
            background-color: #f4f4f6;
            text-align: center;
            padding: 20px;
        }

        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        /* --- Нижняя панель навигации (Bottom Navigation) --- */
        .bottom-nav {
            background-color: #ffffff;
            border-top: 1px solid #e5e5e7;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px)) 0;
            position: relative;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #707579;
            text-decoration: none;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: 500;
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: #2481cc;
        }

        .nav-icon-wrapper {
            position: relative;
            font-size: 22px;
            margin-bottom: 2px;
            line-height: 1;
        }

        .nav-badge {
            position: absolute;
            top: -4px;
            right: -10px;
            background-color: #2481cc;
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 8px;
            min-width: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="tg-header">
        <div class="header-left">
            <div class="header-title">Telegram</div>
        </div>
        <div class="header-actions">
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">⋮</button>
        </div>
    </div>

    <div class="tg-tabs" id="tabs-bar">
        <div class="tg-tab">
            <span>Все чаты</span>
            <span class="tab-badge" id="total-unread-badge">1</span>
        </div>
    </div>

    <div class="screen-container">
        
        <div id="screen-chats" class="app-screen active">
            <div class="chat-item" id="ui_daupro_support">
                <div class="chat-avatar avatar-support">DS</div>
                <div class="chat-info">
                    <div class="chat-row-top">
                        <div class="chat-name-container">
                            <span class="chat-name">DAUPRO SUPORT</span>
                            <div class="verified-badge">✓</div>
                        </div>
                        <span class="chat-time" id="time_daupro_support">13:07</span>
                    </div>
                    <div class="chat-row-bottom">
                        <span class="chat-message" id="msg_daupro_support">Добро пожаловать в DICEGRAM!</span>
                        <div class="chat-meta-right">
                            <div class="unread-badge" id="badge_daupro_support">1</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-contacts" class="app-screen">
            <div class="placeholder-screen">
                <div class="placeholder-icon">👤</div>
                <div>Страница Контакты</div>
            </div>
        </div>

        <div id="screen-settings" class="app-screen">
            <div class="placeholder-screen">
                <div class="placeholder-icon">⚙️</div>
                <div>Страница Настройки</div>
            </div>
        </div>

        <div id="screen-profile" class="app-screen">
            <div class="placeholder-screen">
                <div class="placeholder-icon">🖼️</div>
                <div>Страница Профиль</div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('chats')">
            <div class="nav-icon-wrapper">
                💬
                <div class="nav-badge" id="bottom-chats-badge">1</div>
            </div>
            <span>Чаты</span>
        </button>
        
        <button class="nav-item" onclick="switchScreen('contacts')">
            <div class="nav-icon-wrapper">👤</div>
            <span>Контакты</span>
        </button>
        
        <button class="nav-item" onclick="switchScreen('settings')">
            <div class="nav-icon-wrapper">⚙️</div>
            <span>Настройки</span>
        </button>
        
        <button class="nav-item" onclick="switchScreen('profile')">
            <div class="nav-icon-wrapper">🖼️</div>
            <span>Профиль</span>
        </button>
    </div>

    <script>
        // Инициализация Telegram Mini App
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            if (tg.headerColor) tg.setHeaderColor('#ffffff');
        }

        // Загрузка состояния чата из localStorage (сохранение истории при перезапусках)
        function loadSupportChatState() {
            const stored = localStorage.getItem("daupro_stored_chat");
            if (stored) {
                const data = JSON.parse(stored);
                document.getElementById('msg_daupro_support').innerText = data.msg;
                document.getElementById('time_daupro_support').innerText = data.time;
            }
        }

        // Логика переключения экранов и подсветки кнопок
        function switchScreen(screenName) {
            // 1. Скрываем все экраны
            const screens = document.querySelectorAll('.app-screen');
            screens.forEach(screen => screen.classList.remove('active'));

            // 2. Снимаем активный класс со всех кнопок навигации
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            // 3. Скрываем/показываем верхнюю панель вкладок (в TG вкладки есть только на экране чатов)
            const tabsBar = document.getElementById('tabs-bar');
            if (screenName === 'chats') {
                tabsBar.style.display = 'flex';
            } else {
                tabsBar.style.display = 'none';
            }

            // 4. Активируем нужный экран и кнопку
            document.getElementById(`screen-${screenName}`).classList.add('active');
            event.currentTarget.classList.add('active');

            // Тактильный отклик (вибрация) при клике внутри Telegram
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // --- 4. СВЯЗЬ И ОБНОВЛЕНИЯ (WebSocket) ---
        const wsHost = "wss://jrnm.app"; 
        let socket;

        function connectWebSocket() {
            socket = new WebSocket(wsHost);

            socket.onopen = function() {
                console.log("WebSocket подключен к хосту " + wsHost);
            };

            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Обрабатываем обновление, если цель — наш единственный чат daupro_support
                    if (data && data.target === "daupro_support") {
                        const msgElement = document.getElementById('msg_daupro_support');
                        const timeElement = document.getElementById('time_daupro_support');
                        
                        if (msgElement && data.message) {
                            msgElement.innerText = data.message;
                        }
                        if (timeElement && data.time) {
                            timeElement.innerText = data.time;
                        }

                        // Сохраняем новые данные в localStorage
                        localStorage.setItem("daupro_stored_chat", JSON.stringify({
                            msg: data.message || "Добро пожаловать в DICEGRAM!",
                            time: data.time || "13:07"
                        }));

                        // Вибрация смартфона при получении нового сообщения по сокету
                        if (tg && tg.HapticFeedback) {
                            tg.HapticFeedback.notificationOccurred('success');
                        }
                    }
                } catch (err) {
                    console.log("Получены сырые данные сокета:", event.data);
                }
            };

            socket.onclose = function() {
                console.log("Соединение разорвано. Переподключение через 5 секунд...");
                setTimeout(connectWebSocket, 5000);
            };

            socket.onerror = function(error) {
                console.error("Ошибка сокета: ", error);
            };
        }

        // Старт при загрузке
        window.onload = function() {
            loadSupportChatState();
            connectWebSocket();
        };
    </script>
</body>
</html>

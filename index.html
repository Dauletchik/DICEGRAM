<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DICE TOK | Full Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #010101;
            --white: #ffffff;
            --accent: #fe2c55; /* TikTok Red */
            --cyan: #25f4ee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'ProximaNova', sans-serif; }
        
        body { background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden; }

        /* --- ЛЕНТА (REELS CONTAINER) --- */
        .feed-container {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            snap-type: y mandatory; /* Магия свайпа как в ТТ */
            scrollbar-width: none;
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .video-card {
            height: 100vh;
            width: 100%;
            snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- ИНТЕРФЕЙС ПОВЕРХ ВИДЕО --- */
        .ui-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 80px; /* Место для меню */
        }

        .video-info { flex: 1; margin-right: 50px; }
        .author-name { font-weight: bold; font-size: 18px; margin-bottom: 8px; display: block; }
        .video-desc { font-size: 14px; line-height: 1.3; margin-bottom: 10px; }
        .music-info { font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .music-info i { animation: rotate 3s linear infinite; }

        /* Боковые кнопки */
        .side-bar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-item { text-align: center; cursor: pointer; }
        .action-item i { font-size: 32px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-item span { font-size: 12px; font-weight: 600; }
        .action-item .fa-heart.active { color: var(--accent); }

        .author-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid white; margin-bottom: 10px;
            position: relative;
        }
        .follow-btn {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--accent); border-radius: 50%; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }

        /* --- НИЖНЕЕ МЕНЮ --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--black); border-top: 0.5px solid #333;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; color: #888; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 20px; }

        .create-btn {
            background: linear-gradient(90deg, var(--cyan) 0%, var(--accent) 100%);
            width: 45px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; color: black;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="feed-container" id="feed">
        </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Главная</span></div>
        <div class="nav-item"><i class="fa-solid fa-compass"></i><span>Интересное</span></div>
        <div class="nav-item"><div class="create-btn"><i class="fa-solid fa-plus"></i></div></div>
        <div class="nav-item"><i class="fa-solid fa-message"></i><span>Входящие</span></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i><span>Профиль</span></div>
    </nav>

<script>
    // Массив с данными (в реальности это прилетит с сервера)
    const videoData = [
        {
            id: 1,
            author: "@dice_dev",
            desc: "Создаю клон TikTok на чистом JS! #coding #dicegram #web",
            music: "Dice Records - Original Audio",
            url: "https://v16-webapp-prime.tiktok.com/video/example1.mp4", // Нужна прямая ссылка на видео
            likes: "12.5K",
            comments: "432"
        },
        {
            id: 2,
            author: "@vibe_russia",
            desc: "Обнова на сервере! Залетай в игру #crmp #blackrussia",
            music: "Vibe Russia Theme",
            url: "https://www.w3schools.com/html/mov_bbb.mp4", 
            likes: "45K",
            comments: "1.2K"
        }
    ];

    const feed = document.getElementById('feed');

    // Функция создания карточки видео
    function createVideoCard(data) {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <video loop src="${data.url}" playsinline onclick="togglePlay(this)"></video>
            <div class="ui-overlay">
                <div class="video-info">
                    <span class="author-name">${data.author}</span>
                    <p class="video-desc">${data.desc}</p>
                    <div class="music-info">
                        <i class="fa-solid fa-music"></i>
                        <span>${data.music}</span>
                    </div>
                </div>
                <div class="side-bar">
                    <div class="author-avatar">
                        <div class="follow-btn"><i class="fa-solid fa-plus"></i></div>
                    </div>
                    <div class="action-item" onclick="toggleLike(this)">
                        <i class="fa-solid fa-heart"></i>
                        <span>${data.likes}</span>
                    </div>
                    <div class="action-item">
                        <i class="fa-solid fa-comment-dots"></i>
                        <span>${data.comments}</span>
                    </div>
                    <div class="action-item">
                        <i class="fa-solid fa-share"></i>
                        <span>Поделиться</span>
                    </div>
                </div>
            </div>
        `;
        return card;
    }

    // Рендер ленты
    videoData.forEach(item => {
        feed.appendChild(createVideoCard(item));
    });

    // Логика воспроизведения при скролле (Intersection Observer)
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (entry.isIntersecting) {
                video.play();
            } else {
                video.pause();
                video.currentTime = 0;
            }
        });
    }, { threshold: 0.7 });

    document.querySelectorAll('.video-card').forEach(card => observer.observe(card));

    // Функции взаимодействия
    function togglePlay(v) {
        if (v.paused) v.play();
        else v.pause();
    }

    function toggleLike(el) {
        const icon = el.querySelector('i');
        icon.classList.toggle('active');
        // Добавь анимацию "взрыва" лайка
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Онлайн Бутылочка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1e1e24;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 20px 10px;
            overflow: hidden;
        }
        
        /* Верхняя панель */
        .header-container {
            text-align: center;
            width: 100%;
        }
        .header-container h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .counter {
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Игровое поле и круглый стол */
        .game-zone {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto 0;
        }
        .purple-table {
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #8e44ad, #6c3483);
            border-radius: 50%;
            border: 6px solid #512562;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* Бутылочка строго по центру */
        .bottle-container {
            position: absolute;
            width: 40px;
            height: 120px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Плавное замедление вращения */
            transition: transform 4s cubic-bezier(0.25, 1, 0.2, 1);
        }
        .bottle-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.4));
        }

        /* Позиционирование игроков вокруг стола */
        .player-seat {
            position: absolute;
            width: 70px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .avatar-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #34495e;
            border: 3px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s, border-color 0.3s;
        }
        .player-seat.targeted .avatar-circle {
            border-color: #e74c3c;
            transform: scale(1.15);
            box-shadow: 0 0 15px #e74c3c;
        }
        .player-name {
            font-size: 12px;
            margin-top: 4px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 8px;
            max-width: 75px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Точные координаты мест (радиус орбиты ~125px от центра) */
        #seat-0 { transform: translate(0px, -125px); }    /* Ты (0°) */
        #seat-1 { transform: translate(110px, -65px); }   /* Mira_doll (60°) */
        #seat-2 { transform: translate(110px, 65px); }    /* Behruz (120°) */
        #seat-3 { transform: translate(0px, 125px); }     /* ZAHID (180°) */
        #seat-4 { transform: translate(-110px, 65px); }   /* Alina (240°) */
        #seat-5 { transform: translate(-110px, -65px); }  /* Дмитрий (300°) */

        /* Кнопка внизу */
        .action-button {
            width: 90%;
            max-width: 320px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            color: #ffffff;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            transition: background 0.2s, transform 0.1s;
        }
        .action-button:active {
            transform: scale(0.96);
        }
        .action-button:disabled {
            background: #7f8c8d;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Поп-ап (Модалка) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-card {
            background: #2c3e50;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            width: 85%;
            max-width: 300px;
            border: 2px solid #ff4757;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-card {
            transform: scale(1);
        }
        .modal-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #34495e;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 3px solid #ff4757;
        }
        .modal-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .modal-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .m-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .m-btn-yes { background: #2ecc71; color: white; }
        .m-btn-no { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Онлайн Бутылочка</h1>
        <div class="counter">Поцелуи: <span id="kiss-value">0</span> 😘</div>
    </div>

    <div class="game-zone">
        <div class="purple-table"></div>
        
        <div class="bottle-container" id="game-bottle">
            <svg class="bottle-svg" viewBox="0 0 100 300" xmlns="http://www.w3.org/2000/svg">
                <path d="M40,20 L60,20 L60,70 L40,70 Z" fill="#2d5a27" stroke="#1e3c1a" stroke-width="3"/>
                <path d="M40,70 C20,100 20,120 20,150 L20,260 C20,275 30,285 50,285 C70,285 80,275 80,260 L80,150 C80,120 80,100 60,70 Z" fill="#387330" stroke="#1e3c1a" stroke-width="4"/>
                <rect x="25" y="140" width="50" height="50" rx="5" fill="#e74c3c"/>
                <circle cx="50" cy="165" r="12" fill="#ffffff"/>
            </svg>
        </div>
        
        <div class="player-seat" id="seat-0"><div class="avatar-circle">👑</div><div class="player-name" id="user-my-name">Ты</div></div>
        <div class="player-seat" id="seat-1"><div class="avatar-circle">💃</div><div class="player-name">Mira_doll</div></div>
        <div class="player-seat" id="seat-2"><div class="avatar-circle">😎</div><div class="player-name">Behruz</div></div>
        <div class="player-seat" id="seat-3"><div class="avatar-circle">💬</div><div class="player-name">ZAHID</div></div>
        <div class="player-seat" id="seat-4"><div class="avatar-circle">🦄</div><div class="player-name">Alina</div></div>
        <div class="player-seat" id="seat-5"><div class="avatar-circle">🔥</div><div class="player-name">Дмитрий</div></div>
    </div>

    <button class="action-button" id="spin-action-btn" onclick="executeSpin()">КРУТИТЬ!</button>

    <div class="modal-overlay" id="kiss-popup">
        <div class="modal-card">
            <div class="modal-avatar" id="pop-avatar">💃</div>
            <h3 id="pop-text">Бутылочка указала на игрока. Поцеловать?</h3>
            <div class="modal-buttons">
                <button class="m-btn m-btn-yes" onclick="handleKissChoice(true)">Да ❤️</button>
                <button class="m-btn m-btn-no" onclick="handleKissChoice(false)">Нет 💔</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            const telegramUser = tg.initDataUnsafe?.user;
            if (telegramUser) {
                document.getElementById('user-my-name').innerText = telegramUser.first_name;
            }
        }

        // Конфигурация участников стола и их точных углов остановки
        const tablePlayers = [
            { id: 0, name: "Ты", avatar: "👑", angle: 0 },
            { id: 1, name: "Mira_doll", avatar: "💃", angle: 60 },
            { id: 2, name: "Behruz", avatar: "😎", angle: 120 },
            { id: 3, name: "ZAHID", avatar: "💬", angle: 180 },
            { id: 4, name: "Alina", avatar: "🦄", angle: 240 },
            { id: 5, name: "Дмитрий", avatar: "🔥", angle: 300 }
        ];

        let currentDeg = 0;
        let kissCount = parseInt(localStorage.getItem('saved_kisses')) || 0;
        document.getElementById('kiss-value').innerText = kissCount;
        
        let lastTargetId = null;

        function executeSpin() {
            const spinBtn = document.getElementById('spin-action-btn');
            spinBtn.disabled = true;

            // Сбрасываем выделение предыдущего игрока
            if (lastTargetId !== null) {
                document.getElementById(`seat${lastTargetId}`).classList.remove('targeted');
            }

            // Выбираем случайного игрока из массива (исключая индекс 0 — самого себя)
            const luckyIndex = Math.floor(Math.random() * 5) + 1;
            const chosenPlayer = tablePlayers[luckyIndex];
            lastTargetId = chosenPlayer.id;

            // Накапливаем угол вращения, добавляя 5 полных кругов (1800°) ради плавного заноса
            const extraSpins = 1800;
            currentDeg += extraSpins + chosenPlayer.angle - (currentDeg % 360);

            const bottle = document.getElementById('game-bottle');
            bottle.style.transform = `rotate(${currentDeg}deg)`;

            // Срабатывание по завершении css transition анимации (4000мс)
            setTimeout(() => {
                document.getElementById(`seat-${chosenPlayer.id}`).classList.add('targeted');
                openModal(chosenPlayer);
            }, 4000);
        }

        function openModal(player) {
            document.getElementById('pop-avatar').innerText = player.avatar;
            document.getElementById('pop-text').innerText = `Бутылочка указала на ${player.name}.\nПоцеловать?`;
            
            const modal = document.getElementById('kiss-popup');
            modal.style.display = 'flex';
            setTimeout(() => modal.add('show'), 10);
        }

        function handleKissChoice(isKissed) {
            const modal = document.getElementById('kiss-popup');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
            
            document.getElementById('spin-action-btn').disabled = false;

            if (isKissed) {
                kissCount++;
                localStorage.setItem('saved_kisses', kissCount);
                document.getElementById('kiss-value').innerText = kissCount;
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }
        }
    </script>
</body>
</html>

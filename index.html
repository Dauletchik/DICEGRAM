<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0e1621;
            --bg-secondary: #17212b;
            --bg-surface: #1f2b36;
            --bg-input: #2b3b4a;
            --text-primary: #f5f5f5;
            --text-secondary: #7f8c8d;
            --text-muted: #4a5b6b;
            --accent: #64b5f6;
            --accent-dark: #1e88e5;
            --border-color: #101921;
            --message-out: #2b5278;
            --message-in: #182533;
            --shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--bg-surface);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: var(--bg-primary);
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            min-height: 56px;
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-back {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            display: none;
        }

        /* Screens */
        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 65px;
            background: var(--bg-primary);
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Chats List */
        .chat-list {
            flex: 1;
            background: var(--bg-primary);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s;
            background: var(--bg-primary);
        }

        .chat-item:active {
            background: var(--bg-surface);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .chat-avatar .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            background: #4caf50;
        }

        .chat-avatar .online-dot.offline {
            background: #78909c;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-name .verified {
            color: var(--accent);
            font-size: 14px;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .chat-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-preview-text {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .chat-unread {
            background: var(--accent);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            flex-shrink: 0;
        }

        /* Chat Room */
        #chat-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        #chat-room .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        #chat-room .header-back {
            display: block;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--bg-primary);
            padding-bottom: 8px;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            margin-bottom: 2px;
        }

        .message.sent {
            background: var(--message-out);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: var(--text-primary);
        }

        .message.received {
            background: var(--message-in);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message .timestamp {
            font-size: 10px;
            color: var(--text-secondary);
            margin-left: 8px;
            opacity: 0.7;
        }

        .message .mention {
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
        }

        .chat-input-area {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            background: var(--bg-input);
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .send-btn:active {
            background: var(--accent-dark);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
            transition: transform 0.3s ease;
        }

        .bottom-nav.hidden {
            transform: translateY(100%);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 10px;
            cursor: pointer;
            height: 100%;
            transition: color 0.15s;
            background: none;
            border: none;
            padding: 0;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-label {
            font-size: 11px;
        }

        /* Profile */
        .profile-container {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-primary);
            flex: 1;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bg-surface);
            margin-bottom: 16px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .profile-username {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .profile-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .placeholder-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface);
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <div style="font-weight: 500; font-size: 16px; margin-bottom: 8px; color: var(--text-primary);">
        Подключение к DICEGRAM
    </div>
    <div style="color: var(--text-secondary); font-size: 13px;">
        Пожалуйста, подождите...
    </div>
</div>

<div id="app">
    <div class="header" id="main-header">
        <span class="header-title" id="header-title">Чаты</span>
    </div>

    <!-- Chats Screen -->
    <div class="screen active" id="screen-chats">
        <div class="chat-list" id="chats-list"></div>
    </div>

    <!-- Contacts Screen -->
    <div class="screen" id="screen-contacts">
        <div class="placeholder-screen">👥 Список контактов пуст</div>
    </div>

    <!-- Settings Screen -->
    <div class="screen" id="screen-settings">
        <div class="placeholder-screen">⚙️ Настройки DICEGRAM v2.0</div>
    </div>

    <!-- Profile Screen -->
    <div class="screen" id="screen-profile">
        <div class="profile-container">
            <img id="profile-avatar" class="profile-avatar" src="" alt="Avatar">
            <div id="profile-name" class="profile-name">Загрузка...</div>
            <div id="profile-username" class="profile-username">@загрузка</div>
            <div id="profile-status" class="profile-status">● В сети</div>
        </div>
    </div>

    <!-- Chat Room -->
    <div id="chat-room">
        <div class="header">
            <button class="header-back" onclick="closeChat()">← Назад</button>
            <span class="header-title" id="chat-room-title">Чат</span>
            <div style="width: 60px;"></div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="message-field" class="chat-input" placeholder="Сообщение..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-item active" onclick="switchTab('chats', this)">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Чаты</span>
        </button>
        <button class="nav-item" onclick="switchTab('contacts', this)">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Контакты</span>
        </button>
        <button class="nav-item" onclick="switchTab('settings', this)">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Настройки</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile', this)">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профиль</span>
        </button>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const SERVER_URL = "https://a38182-6d28.j.jrnm.app";
    // Альтернативный URL: https://dauletchik.github.io/DICEGRAM

    const socket = io(SERVER_URL, {
        transports: ['websocket'],
        secure: true,
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });

    let currentChatId = null;
    let myTelegramId = null;
    let chatUsers = {};
    let isChatOpen = false;

    const tgUser = tg.initDataUnsafe?.user || {
        id: 123456789,
        first_name: 'Тест',
        last_name: 'Пользователь',
        username: 'testuser',
        photo_url: ''
    };

    myTelegramId = String(tgUser.id);

    // Profile init
    document.getElementById('profile-name').textContent = 
        `${tgUser.first_name} ${tgUser.last_name || ''}`.trim() || 'Пользователь';
    document.getElementById('profile-username').textContent = 
        tgUser.username ? `@${tgUser.username}` : '@не указан';
    if (tgUser.photo_url) {
        document.getElementById('profile-avatar').src = tgUser.photo_url;
    }

    // Socket events
    socket.on('connect', () => {
        console.log('🔗 Connected to server');
        socket.emit('auth', tgUser);
    });

    socket.on('auth_success', (data) => {
        console.log('✅ Auth success');
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
    });

    socket.on('auth_error', (data) => {
        console.error('❌ Auth error:', data);
        document.querySelector('#loading-screen .loader').style.display = 'none';
        document.querySelector('#loading-screen div:last-child').textContent = 
            '❌ Ошибка подключения. Попробуйте перезапустить приложение.';
    });

    socket.on('load_chats', (data) => {
        console.log('📥 Loading chats:', data.chats.length);
        renderChats(data.chats);
    });

    socket.on('new_message', (msg) => {
        console.log('📨 New message:', msg);
        
        if (currentChatId === msg.sender_id || currentChatId === msg.receiver_id) {
            renderMessage(msg);
            scrollToBottom();
        }
        
        // Update chat preview
        const chatId = msg.sender_id === myTelegramId ? msg.receiver_id : msg.sender_id;
        updateChatPreview(chatId, msg.text);
    });

    socket.on('user_status', (data) => {
        console.log('🟢 Status update:', data);
        updateUserStatus(data.user_id, data.is_online);
    });

    socket.on('chat_history', (data) => {
        if (data.messages && data.messages.length > 0) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            data.messages.forEach(msg => renderMessage(msg));
            scrollToBottom();
        }
    });

    socket.on('found_user', (data) => {
        if (data.status === 'found') {
            const user = data.user;
            if (user.telegram_id === myTelegramId) {
                alert('Это вы сами!');
                return;
            }
            
            if (!chatUsers[user.telegram_id]) {
                addChatToList(user);
            }
            openChat(user.telegram_id, user.first_name);
        } else {
            alert('Пользователь не найден в сети DICEGRAM');
        }
    });

    socket.on('disconnect', () => {
        console.log('🔌 Disconnected from server');
        document.getElementById('loading-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    });

    // Functions
    function renderChats(chats) {
        const container = document.getElementById('chats-list');
        container.innerHTML = '';
        
        chats.forEach(chat => {
            chatUsers[chat.contact_id] = {
                first_name: chat.first_name,
                last_name: chat.last_name,
                username: chat.username,
                is_online: chat.is_online
            };
            addChatToList(chat);
        });
    }

    function addChatToList(chat) {
        const container = document.getElementById('chats-list');
        const isSupport = chat.contact_id === '0';
        const name = isSupport ? 'DAUPRO SUPORT' : 
            `${chat.first_name || 'Пользователь'} ${chat.last_name || ''}`.trim();
        const initials = isSupport ? 'DS' : 
            (chat.first_name ? chat.first_name.substring(0, 2).toUpperCase() : 'U');
        const avatarColor = isSupport ? 'linear-gradient(135deg, #0284c7, #0369a1)' : 
            'linear-gradient(135deg, #4a5b6b, #2b3b4a)';
        const online = chat.is_online || false;
        const lastMsg = chat.last_message || 'Нет сообщений';
        const time = chat.last_message_time ? formatTime(chat.last_message_time) : '';
        const unread = chat.unread_count || 0;

        const div = document.createElement('div');
        div.className = 'chat-item';
        div.id = `chat-${chat.contact_id}`;
        div.innerHTML = `
            <div class="chat-avatar" style="background: ${avatarColor};">
                ${initials}
                ${isSupport ? '' : `<span class="online-dot ${online ? '' : 'offline'}" id="status-${chat.contact_id}"></span>`}
            </div>
            <div class="chat-info">
                <div class="chat-header">
                    <div class="chat-name">
                        ${name}
                        ${isSupport ? '<span class="verified">●</span>' : ''}
                    </div>
                    <div class="chat-time">${time}</div>
                </div>
                <div class="chat-preview">
                    <div class="chat-preview-text" id="preview-${chat.contact_id}">${lastMsg}</div>
                    ${unread > 0 ? `<div class="chat-unread">${unread}</div>` : ''}
                </div>
            </div>
        `;
        div.onclick = () => openChat(chat.contact_id, name);
        container.appendChild(div);
    }

    function openChat(chatId, chatName) {
        currentChatId = chatId;
        isChatOpen = true;
        document.getElementById('bottom-nav').classList.add('hidden');
        document.getElementById('chat-room').style.display = 'flex';
        document.getElementById('chat-room-title').textContent = chatName;
        document.getElementById('chat-messages').innerHTML = '';
        
        socket.emit('get_chat_history', { with_id: chatId });
    }

    function closeChat() {
        isChatOpen = false;
        document.getElementById('bottom-nav').classList.remove('hidden');
        document.getElementById('chat-room').style.display = 'none';
        currentChatId = null;
    }

    function renderMessage(msg) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message ${msg.sender_id === myTelegramId ? 'sent' : 'received'}`;
        div.innerHTML = formatMessageText(msg.text);
        container.appendChild(div);
    }

    function formatMessageText(text) {
        return text.replace(/@([a-zA-Z0-9_]{3,32})/g, 
            '<span class="mention" onclick="handleMention(\'@$1\')">@$1</span>');
    }

    function handleMention(username) {
        socket.emit('find_user', { username: username });
    }

    function sendMessage() {
        const input = document.getElementById('message-field');
        const text = input.value.trim();
        if (!text || !currentChatId) return;

        socket.emit('send_message', { 
            receiver_id: currentChatId, 
            text: text 
        }, (response) => {
            if (response && response.status === 'ok') {
                renderMessage(response.message);
                updateChatPreview(currentChatId, text);
                scrollToBottom();
            }
        });

        input.value = '';
    }

    function updateChatPreview(chatId, text) {
        const preview = document.getElementById(`preview-${chatId}`);
        if (preview) preview.textContent = text;
    }

    function updateUserStatus(userId, isOnline) {
        const dot = document.getElementById(`status-${userId}`);
        if (dot) {
            dot.className = `online-dot ${isOnline ? '' : 'offline'}`;
        }
        
        if (chatUsers[userId]) {
            chatUsers[userId].is_online = isOnline;
        }
    }

    function formatTime(timestamp) {
        if (!timestamp) return '';
        try {
            const date = new Date(timestamp);
            const now = new Date();
            if (date.toDateString() === now.toDateString()) {
                return date.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
            }
            return date.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' });
        } catch {
            return '';
        }
    }

    function switchTab(tabName, element) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`screen-${tabName}`).classList.add('active');
        if (element) element.classList.add('active');
        
        const titles = {
            chats: 'Чаты',
            contacts: 'Контакты',
            settings: 'Настройки',
            profile: 'Профиль'
        };
        document.getElementById('header-title').textContent = titles[tabName] || 'DICEGRAM';
    }

    function scrollToBottom() {
        const container = document.getElementById('chat-messages');
        setTimeout(() => {
            container.scrollTop = container.scrollHeight;
        }, 50);
    }

    // Enter key send
    document.getElementById('message-field').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Initial load
    console.log('🚀 DICEGRAM Mini App initialized');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE MESSAGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --side-bar-bg: #ffffff;
            --accent-color: #0088cc; /* Telegram-like blue */
            --text-main: #000000;
            --text-muted: #666666;
            --message-out: #effdde;
            --message-in: #ffffff;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            background: #fff;
            display: flex;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 350px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: var(--side-bar-bg);
        }

        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            padding: 15px;
            cursor: pointer;
            transition: background 0.3s;
            align-items: center;
        }

        .chat-item:hover {
            background-color: #f5f5f5;
        }

        .chat-item.active {
            background-color: #e7f3ff;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ccc;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .last-message {
            font-size: 0.9em;
            color: var(--text-muted);
            text-overflow: ellipsis;
            overflow: hidden;
        }

        /* Основное окно чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Типовой фон мессенджера */
            background-color: #e5ddd5;
        }

        .chat-header {
            padding: 10px 20px;
            background: #fff;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background-color: var(--message-out);
            border-bottom-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background-color: var(--message-in);
            border-bottom-left-radius: 2px;
        }

        /* Поле ввода */
        .input-area {
            padding: 15px 20px;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 1em;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4em;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-icon:hover {
            color: var(--accent-color);
        }

        .btn-send {
            color: var(--accent-color);
        }

        /* Кастомизация скроллбара */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">DICE MESSAGE</div>
        <div class="chat-list">
            <div class="chat-item active">
                <div class="avatar" style="background: #f39c12;">JS</div>
                <div class="chat-info">
                    <div class="chat-name">JavaScript Бот</div>
                    <div class="last-message">Напиши мне что-нибудь!</div>
                </div>
            </div>
            <div class="chat-item">
                <div class="avatar" style="background: #3498db;">D</div>
                <div class="chat-info">
                    <div class="chat-name">Dice Support</div>
                    <div class="last-message">Ваша заявка принята в работу</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-chat">
        <header class="chat-header">
            <div class="avatar" style="background: #f39c12; width: 40px; height: 40px; font-size: 14px;">JS</div>
            <div class="chat-name">JavaScript Бот</div>
        </header>

        <div class="messages-area" id="messagesArea">
            <div class="message received">Привет! Я ваш помощник в DICE MESSAGE. Как я могу вам помочь?</div>
        </div>

        <div class="input-area">
            <button class="btn-icon"><i class="fa-solid fa-paperclip"></i></button>
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button class="btn-icon btn-send" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<script>
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Функция добавления сообщения в интерфейс
    function addMessage(text, type) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', type);
        messageDiv.textContent = text;
        messagesArea.appendChild(messageDiv);
        
        // Автоматическая прокрутка вниз
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // Логика отправки
    function handleSendMessage() {
        const text = messageInput.value.trim();
        if (text !== "") {
            addMessage(text, 'sent');
            messageInput.value = "";
            
            // Имитация ответа бота через 1.5 секунды
            setTimeout(() => {
                botReply(text);
            }, 1500);
        }
    }

    // Имитация "умного" ответа
    function botReply(userText) {
        const replies = [
            "Интересная мысль! Расскажите подробнее.",
            "Я получил ваше сообщение в DICE MESSAGE.",
            "Понял вас. Нужно время, чтобы это обдумать.",
            "DICE MESSAGE работает стабильно. Есть еще вопросы?",
            "Это звучит круто!"
        ];
        const randomReply = replies[Math.floor(Math.random() * replies.length)];
        addMessage(randomReply, 'received');
    }

    // Слушатели событий
    sendBtn.addEventListener('click', handleSendMessage);

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleSendMessage();
        }
    });

    // Фокус на поле ввода при загрузке
    window.onload = () => messageInput.focus();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GTA SAN ANDREAS STYLE - Открытый мир</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1a2a1a;
        }

        /* Джойстик для телефона */
        .joystick-container {
            position: fixed;
            bottom: 80px;
            left: 80px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(30,30,40,0.75);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 100;
            touch-action: none;
        }

        .joystick-base {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.6);
            transition: transform 0.05s linear;
            pointer-events: none;
        }

        /* Кнопки действий */
        .action-buttons {
            position: fixed;
            bottom: 80px;
            right: 80px;
            display: flex;
            gap: 25px;
            z-index: 100;
        }

        .action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(30,30,40,0.75);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }

        .action-btn:active {
            transform: scale(0.92);
            background: rgba(200,50,50,0.8);
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 12px;
            color: #0f0;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
        }

        .health-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 24px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #ff4444;
            z-index: 100;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            transition: width 0.2s;
        }

        .money {
            position: fixed;
            top: 60px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            color: gold;
            font-weight: bold;
            font-size: 18px;
            font-family: monospace;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .joystick-container { width: 120px; height: 120px; bottom: 50px; left: 50px; }
            .action-buttons { bottom: 50px; right: 50px; gap: 15px; }
            .action-btn { width: 60px; height: 60px; font-size: 24px; }
            .hud { font-size: 10px; }
            .health-bar { width: 150px; height: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud" id="locationName">LOS SANTOS</div>
    <div class="health-bar"><div class="health-fill" id="healthFill"></div></div>
    <div class="money" id="money">$ 12500</div>
    
    <!-- Джойстик для телефона -->
    <div class="joystick-container" id="joystickContainer">
        <div class="joystick-base" id="joystickBase"></div>
    </div>
    
    <div class="action-buttons">
        <div class="action-btn" id="actionBtn">🔫</div>
        <div class="action-btn" id="jumpBtn">🦵</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            let ctx = canvas.getContext('2d');
            
            // Размеры мира
            const WORLD_W = 4000;
            const WORLD_H = 4000;
            
            // Игрок
            let player = {
                x: WORLD_W/2,
                y: WORLD_H/2,
                size: 32,
                speed: 5.5,
                health: 100,
                maxHealth: 100,
                money: 12500,
                direction: 'down',
                animFrame: 0
            };
            
            // Управление
            let moveX = 0, moveY = 0;
            let touchActive = false;
            
            // Препятствия (здания, деревья, машины)
            let obstacles = [];
            
            // NPC
            let npcs = [];
            
            // Сборка предметов (деньги, аптечки)
            let pickups = [];
            
            // Камера
            let camera = { x: 0, y: 0 };
            
            // Текущая локация
            let currentZone = "LOS SANTOS";
            
            // Генерация мира в стиле GTA
            function generateWorld() {
                // Границы
                addObstacle(0, 0, WORLD_W, 50, '#2a2a2a');
                addObstacle(0, WORLD_H-50, WORLD_W, 50, '#2a2a2a');
                addObstacle(0, 0, 50, WORLD_H, '#2a2a2a');
                addObstacle(WORLD_W-50, 0, 50, WORLD_H, '#2a2a2a');
                
                // Здания (районы)
                // Downtown
                for(let i = 0; i < 45; i++) {
                    let x = 500 + Math.random() * 800;
                    let y = 500 + Math.random() * 800;
                    let w = 40 + Math.random() * 60;
                    let h = 40 + Math.random() * 60;
                    addObstacle(x, y, w, h, '#4a4a6a');
                }
                
                // Жилой район
                for(let i = 0; i < 60; i++) {
                    let x = 1600 + Math.random() * 1000;
                    let y = 1200 + Math.random() * 800;
                    let w = 35 + Math.random() * 45;
                    let h = 35 + Math.random() * 45;
                    addObstacle(x, y, w, h, '#5a5a4a');
                }
                
                // Промзона
                for(let i = 0; i < 40; i++) {
                    let x = 2800 + Math.random() * 900;
                    let y = 2500 + Math.random() * 1000;
                    let w = 60 + Math.random() * 80;
                    let h = 50 + Math.random() * 70;
                    addObstacle(x, y, w, h, '#6a4a3a');
                }
                
                // Деревья
                for(let i = 0; i < 200; i++) {
                    let x = 100 + Math.random() * (WORLD_W - 200);
                    let y = 100 + Math.random() * (WORLD_H - 200);
                    let ok = true;
                    for(let obs of obstacles) {
                        if(Math.abs(x - obs.x) < 50 && Math.abs(y - obs.y) < 50) {
                            ok = false;
                            break;
                        }
                    }
                    if(ok) addObstacle(x, y, 18, 18, '#2d6a2d');
                }
                
                // Машины (маленькие препятствия)
                for(let i = 0; i < 80; i++) {
                    let x = 200 + Math.random() * (WORLD_W - 400);
                    let y = 200 + Math.random() * (WORLD_H - 400);
                    addObstacle(x, y, 28, 14, '#8b4513');
                }
            }
            
            function addObstacle(x, y, w, h, color) {
                obstacles.push({ x, y, w, h, color });
            }
            
            // NPC генерация
            function generateNPCs() {
                for(let i = 0; i < 35; i++) {
                    npcs.push({
                        x: 200 + Math.random() * (WORLD_W - 400),
                        y: 200 + Math.random() * (WORLD_H - 400),
                        size: 28,
                        speed: 0.8,
                        dirX: (Math.random() - 0.5) * 2,
                        dirY: (Math.random() - 0.5) * 2,
                        color: `hsl(${Math.random() * 360}, 50%, 45%)`
                    });
                }
            }
            
            // Предметы для сбора
            function generatePickups() {
                for(let i = 0; i < 60; i++) {
                    pickups.push({
                        x: 100 + Math.random() * (WORLD_W - 200),
                        y: 100 + Math.random() * (WORLD_H - 200),
                        size: 12,
                        type: Math.random() > 0.7 ? 'health' : 'money',
                        value: Math.random() > 0.7 ? 25 : 100
                    });
                }
            }
            
            // Коллизии
            function checkCollision(rect) {
                for(let obs of obstacles) {
                    if(rect.x < obs.x + obs.w &&
                       rect.x + rect.w > obs.x &&
                       rect.y < obs.y + obs.h &&
                       rect.y + rect.h > obs.y) {
                        return true;
                    }
                }
                return false;
            }
            
            function movePlayer(dx, dy) {
                let newX = player.x + dx;
                let newY = player.y + dy;
                
                // Движение по X
                let playerRect = { x: newX, y: player.y, w: player.size, h: player.size };
                if(!checkCollision(playerRect)) {
                    player.x = newX;
                }
                
                // Движение по Y
                playerRect = { x: player.x, y: newY, w: player.size, h: player.size };
                if(!checkCollision(playerRect)) {
                    player.y = newY;
                }
                
                // Обновление направления для анимации
                if(dx > 0) player.direction = 'right';
                else if(dx < 0) player.direction = 'left';
                if(dy > 0) player.direction = 'down';
                else if(dy < 0) player.direction = 'up';
                
                // Анимация
                if(dx !== 0 || dy !== 0) player.animFrame = (player.animFrame + 0.3) % 4;
            }
            
            // Сбор предметов
            function collectPickups() {
                for(let i = 0; i < pickups.length; i++) {
                    let p = pickups[i];
                    if(Math.abs(player.x - p.x) < player.size/2 + p.size/2 &&
                       Math.abs(player.y - p.y) < player.size/2 + p.size/2) {
                        if(p.type === 'money') {
                            player.money += p.value;
                        } else if(p.type === 'health') {
                            player.health = Math.min(player.maxHealth, player.health + p.value);
                        }
                        pickups.splice(i,1);
                        i--;
                    }
                }
            }
            
            // Движение NPC
            function updateNPCs() {
                for(let npc of npcs) {
                    let newX = npc.x + npc.dirX * npc.speed;
                    let newY = npc.y + npc.dirY * npc.speed;
                    let npcRect = { x: newX, y: newY, w: npc.size, h: npc.size };
                    
                    if(!checkCollision(npcRect)) {
                        npc.x = newX;
                        npc.y = newY;
                    } else {
                        npc.dirX = (Math.random() - 0.5) * 2;
                        npc.dirY = (Math.random() - 0.5) * 2;
                    }
                    
                    // Границы
                    if(npc.x < 60 || npc.x > WORLD_W - npc.size - 60) npc.dirX *= -1;
                    if(npc.y < 60 || npc.y > WORLD_H - npc.size - 60) npc.dirY *= -1;
                }
            }
            
            // Обновление зон
            function updateZone() {
                if(player.x < 1500 && player.y < 1500) currentZone = "LOS SANTOS";
                else if(player.x > 2500 && player.y > 2500) currentZone = "SAN FIERRO";
                else if(player.x > 3000 || player.y > 3000) currentZone = "DESERT";
                else currentZone = "COUNTRYSIDE";
            }
            
            // Камера
            function updateCamera() {
                let targetX = player.x + player.size/2 - canvas.width/2;
                let targetY = player.y + player.size/2 - canvas.height/2;
                targetX = Math.min(Math.max(targetX, 0), WORLD_W - canvas.width);
                targetY = Math.min(Math.max(targetY, 0), WORLD_H - canvas.height);
                camera.x += (targetX - camera.x) * 0.1;
                camera.y += (targetY - camera.y) * 0.1;
            }
            
            // Отрисовка
            function draw() {
                if(!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Фон (трава/асфальт)
                let grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#2d5a2d');
                grad.addColorStop(1, '#3a6a3a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Дороги
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 6;
                for(let i = 0; i < 20; i++) {
                    ctx.beginPath();
                    ctx.moveTo(100 + i*200 - camera.x, 0);
                    ctx.lineTo(100 + i*200 - camera.x, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, 100 + i*200 - camera.y);
                    ctx.lineTo(canvas.width, 100 + i*200 - camera.y);
                    ctx.stroke();
                }
                
                // Препятствия
                for(let obs of obstacles) {
                    let screenX = obs.x - camera.x;
                    let screenY = obs.y - camera.y;
                    if(screenX + obs.w > 0 && screenX < canvas.width && screenY + obs.h > 0 && screenY < canvas.height) {
                        ctx.fillStyle = obs.color;
                        ctx.shadowBlur = 4;
                        ctx.fillRect(screenX, screenY, obs.w, obs.h);
                        ctx.strokeStyle = '#000';
                        ctx.strokeRect(screenX, screenY, obs.w, obs.h);
                    }
                }
                
                // Предметы
                for(let p of pickups) {
                    let screenX = p.x - camera.x;
                    let screenY = p.y - camera.y;
                    ctx.fillStyle = p.type === 'money' ? '#FFD700' : '#ff4444';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, p.size/2, 0, Math.PI*2);
                    ctx.fill();
                    if(p.type === 'money') {
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 12px monospace';
                        ctx.fillText('$', screenX-3, screenY+4);
                    }
                }
                
                // NPC
                for(let npc of npcs) {
                    let screenX = npc.x - camera.x;
                    let screenY = npc.y - camera.y;
                    ctx.fillStyle = npc.color;
                    ctx.fillRect(screenX, screenY, npc.size, npc.size);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(screenX+5, screenY+6, 6, 6);
                    ctx.fillRect(screenX+npc.size-11, screenY+6, 6, 6);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(screenX+7, screenY+18, npc.size-14, 3);
                }
                
                // Игрок (стиль CJ)
                let px = player.x - camera.x;
                let py = player.y - camera.y;
                ctx.fillStyle = '#c97e5a';
                ctx.shadowBlur = 8;
                ctx.fillRect(px, py, player.size, player.size);
                // Белая футболка
                ctx.fillStyle = '#eee';
                ctx.fillRect(px+4, py+8, player.size-8, 12);
                // Голова
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(px+6, py+2, 8, 8);
                ctx.fillRect(px+player.size-14, py+2, 8, 8);
                // Кепка
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(px+4, py, player.size-8, 6);
                // Оружие в руке
                if(moveX !== 0 || moveY !== 0) {
                    ctx.fillStyle = '#666';
                    ctx.fillRect(px+player.size-8, py+player.size-10, 12, 5);
                }
                
                ctx.shadowBlur = 0;
                
                // Эффекты здоровья
                if(player.health < 30) {
                    ctx.fillStyle = 'rgba(255,0,0,0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            // Обновление HUD
            function updateHUD() {
                document.getElementById('locationName').innerHTML = `📍 ${currentZone}`;
                document.getElementById('healthFill').style.width = `${(player.health/player.maxHealth)*100}%`;
                document.getElementById('money').innerHTML = `$${player.money}`;
            }
            
            // Джойстик для телефона
            const joystickContainer = document.getElementById('joystickContainer');
            const joystickBase = document.getElementById('joystickBase');
            let joystickActive = false;
            let joystickCenter = { x: 0, y: 0 };
            
            function handleTouchStart(e) {
                e.preventDefault();
                const rect = joystickContainer.getBoundingClientRect();
                const touch = e.touches[0];
                joystickCenter = {
                    x: rect.left + rect.width/2,
                    y: rect.top + rect.height/2
                };
                joystickActive = true;
                handleTouchMove(e);
            }
            
            function handleTouchMove(e) {
                if(!joystickActive) return;
                e.preventDefault();
                const touch = e.touches[0];
                let dx = touch.clientX - joystickCenter.x;
                let dy = touch.clientY - joystickCenter.y;
                let distance = Math.hypot(dx, dy);
                let maxDist = 50;
                if(distance > maxDist) {
                    dx = dx * maxDist / distance;
                    dy = dy * maxDist / distance;
                    distance = maxDist;
                }
                joystickBase.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                moveX = dx / maxDist;
                moveY = dy / maxDist;
            }
            
            function handleTouchEnd(e) {
                joystickActive = false;
                joystickBase.style.transform = 'translate(-50%, -50%)';
                moveX = 0;
                moveY = 0;
                e.preventDefault();
            }
            
            joystickContainer.addEventListener('touchstart', handleTouchStart);
            joystickContainer.addEventListener('touchmove', handleTouchMove);
            joystickContainer.addEventListener('touchend', handleTouchEnd);
            
            // Кнопки действий
            document.getElementById('actionBtn').addEventListener('click', () => {
                // Эффект выстрела
                player.speed = 7;
                setTimeout(() => player.speed = 5.5, 200);
            });
            
            document.getElementById('jumpBtn').addEventListener('click', () => {
                // Прыжок (ускорение)
                moveY = -1.5;
                setTimeout(() => { if(!joystickActive) moveY = 0; }, 150);
            });
            
            // Управление с клавиатуры (ПК)
            let keys = { w: false, s: false, a: false, d: false };
            window.addEventListener('keydown', (e) => {
                let k = e.key.toLowerCase();
                if(keys.hasOwnProperty(k)) keys[k] = true;
                if(k === 'arrowup') keys.w = true;
                if(k === 'arrowdown') keys.s = true;
                if(k === 'arrowleft') keys.a = true;
                if(k === 'arrowright') keys.d = true;
            });
            window.addEventListener('keyup', (e) => {
                let k = e.key.toLowerCase();
                if(keys.hasOwnProperty(k)) keys[k] = false;
                if(k === 'arrowup') keys.w = false;
                if(k === 'arrowdown') keys.s = false;
                if(k === 'arrowleft') keys.a = false;
                if(k === 'arrowright') keys.d = false;
            });
            
            function updateKeyboardMove() {
                if(joystickActive) return;
                let mx = 0, my = 0;
                if(keys.w) my = -1;
                if(keys.s) my = 1;
                if(keys.a) mx = -1;
                if(keys.d) mx = 1;
                let len = Math.hypot(mx, my);
                if(len > 0) {
                    mx /= len;
                    my /= len;
                }
                moveX = mx;
                moveY = my;
            }
            
            // Основной цикл
            function gameLoop() {
                updateKeyboardMove();
                
                if(moveX !== 0 || moveY !== 0) {
                    let len = Math.hypot(moveX, moveY);
                    let dx = moveX / len * player.speed;
                    let dy = moveY / len * player.speed;
                    movePlayer(dx, dy);
                }
                
                updateNPCs();
                collectPickups();
                updateZone();
                updateCamera();
                updateHUD();
                draw();
                
                requestAnimationFrame(gameLoop);
            }
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx = canvas.getContext('2d');
                updateCamera();
            }
            
            // Инициализация
            generateWorld();
            generateNPCs();
            generatePickups();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            gameLoop();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICEGRAM</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.center{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:14px;
}

input{
padding:12px;
border:none;
border-radius:10px;
width:220px;
}

.hidden{
display:none;
}

.header{
background:#1e293b;
padding:12px;
font-size:18px;
}

.search{
width:100%;
padding:10px;
border:none;
background:#0f172a;
color:white;
}

.chatlist{
height:90vh;
overflow:auto;
}

.chatitem{
display:flex;
align-items:center;
gap:10px;
padding:12px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.chatitem img{
width:40px;
height:40px;
border-radius:50%;
}

.chat{
display:flex;
flex-direction:column;
height:100vh;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:6px 0;
display:flex;
gap:6px;
}

.msg img{
width:30px;
height:30px;
border-radius:50%;
}

.time{
font-size:10px;
color:#aaa;
}

.inputbox{
display:flex;
padding:10px;
background:#1e293b;
}

.inputbox input{
flex:1;
margin-right:6px;
}

</style>
</head>

<body>

<div id="start" class="center">
<h2>DICEGRAM</h2>
<button onclick="openRegister()">Зарегистрироваться</button>
<button onclick="openLogin()">Войти</button>
</div>

<div id="register" class="center hidden">

<h3>Регистрация</h3>

<input id="reg_name" placeholder="Никнейм">

<input id="reg_user" placeholder="@username">

<input id="reg_pass" placeholder="Пароль">

<button onclick="register()">Создать аккаунт</button>

</div>

<div id="login" class="center hidden">

<h3>Вход</h3>

<input id="log_user" placeholder="@username">

<input id="log_pass" placeholder="Пароль">

<button onclick="login()">Войти</button>

</div>

<div id="main" class="hidden">

<div class="header">
<input id="search" class="search" placeholder="Поиск @username" oninput="searchUser()">
</div>

<div id="chatlist" class="chatlist"></div>

</div>

<div id="chatpage" class="chat hidden">

<div class="header" onclick="back()">← Назад</div>

<div id="messages" class="messages"></div>

<div class="inputbox">
<input id="msg">
<button onclick="sendMsg()">Отправить</button>
</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("dice_users"))||[]
let chats=JSON.parse(localStorage.getItem("dice_chats"))||{}
let me=null
let currentChat=null

function save(){
localStorage.setItem("dice_users",JSON.stringify(users))
localStorage.setItem("dice_chats",JSON.stringify(chats))
}

function openRegister(){
start.classList.add("hidden")
register.classList.remove("hidden")
}

function openLogin(){
start.classList.add("hidden")
login.classList.remove("hidden")
}

function register(){

let name=reg_name.value
let username=reg_user.value.replace("@","")
let pass=reg_pass.value

let passCheck=/^[a-zA-Z0-9]{6,18}$/

if(!passCheck.test(pass)){
alert("Пароль 6-18 латиница или цифры")
return
}

if(users.find(u=>u.username==username)){
alert("username занят")
return
}

let user={
id:Date.now(),
name:name,
username:username,
pass:pass,
avatar:"https://i.imgur.com/4M34hi2.png"
}

users.push(user)

if(!users.find(x=>x.bot)){
users.push({
id:1,
name:"DICEGRAM",
username:"dicegram",
bot:true,
avatar:"https://i.imgur.com/Q8QZQ9B.png"
})
}

save()

let chatId=[user.id,1].sort().join("_")

chats[chatId]=[
{
text:"Вы успешно зарегистрировали аккаунт @"+username,
time:new Date().toLocaleTimeString().slice(0,5),
avatar:"https://i.imgur.com/Q8QZQ9B.png"
}
]

save()

alert("Аккаунт создан")

}

function login(){

let username=log_user.value.replace("@","")
let pass=log_pass.value

let user=users.find(u=>u.username==username && u.pass==pass)

if(!user){
alert("Неверный логин")
return
}

me=user

login.classList.add("hidden")
main.classList.remove("hidden")

renderChats()

}

function renderChats(){

chatlist.innerHTML=""

users.forEach(u=>{

if(u.id==me.id)return

chatlist.innerHTML+=`
<div class="chatitem" onclick="openChat('${u.id}')">
<img src="${u.avatar}">
<div>
<div>${u.name}</div>
<div style="font-size:12px;color:gray">@${u.username}</div>
</div>
</div>
`

})

}

function openChat(id){

currentChat=id

main.classList.add("hidden")
chatpage.classList.remove("hidden")

renderMessages()

}

function renderMessages(){

let chatId=[me.id,currentChat].sort().join("_")

let m=chats[chatId]||[]

messages.innerHTML=""

m.forEach(x=>{

messages.innerHTML+=`
<div class="msg">
<img src="${x.avatar}">
<div>
<div>${x.text}</div>
<div class="time">${x.time}</div>
</div>
</div>
`

})

}

function sendMsg(){

let text=msg.value

if(!text)return

let chatId=[me.id,currentChat].sort().join("_")

if(!chats[chatId])chats[chatId]=[]

chats[chatId].push({
text:text,
time:new Date().toLocaleTimeString().slice(0,5),
avatar:me.avatar
})

save()

msg.value=""

renderMessages()

}

function back(){

chatpage.classList.add("hidden")
main.classList.remove("hidden")

}

function searchUser(){

let v=search.value.replace("@","")

let u=users.find(x=>x.username==v)

if(u && u.id!=me.id){

chatlist.innerHTML=`
<div class="chatitem" onclick="openChat('${u.id}')">
<img src="${u.avatar}">
<div>
<div>${u.name}</div>
<div>@${u.username}</div>
</div>
</div>
`

}else{

renderChats()

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICEGRAM</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
background:#1e293b;
padding:14px;
font-size:18px;
display:flex;
align-items:center;
}

.search{
width:100%;
padding:10px;
border:none;
outline:none;
background:#1e293b;
color:white;
}

.chatlist{
height:90vh;
overflow:auto;
}

.chatitem{
display:flex;
gap:10px;
padding:12px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.chatitem img{
width:45px;
height:45px;
border-radius:50%;
}

.chat{
display:flex;
flex-direction:column;
height:100vh;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:6px 0;
display:flex;
gap:8px;
align-items:flex-end;
}

.msg img{
width:30px;
height:30px;
border-radius:50%;
}

.time{
font-size:10px;
color:#aaa;
}

.input{
display:flex;
padding:10px;
background:#1e293b;
}

.input input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

.input button{
margin-left:6px;
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:10px;
}

input.reg{
padding:12px;
width:200px;
border:none;
border-radius:10px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="register" class="center">

<h2>DICEGRAM</h2>

<input id="name" class="reg" placeholder="Имя">

<input id="username" class="reg" placeholder="@username">

<button onclick="createAccount()">Далее</button>

</div>

<div id="main" class="hidden">

<div class="header">
<input id="search" class="search" placeholder="Поиск по @username" oninput="searchUser()">
</div>

<div id="chatlist" class="chatlist"></div>

</div>

<div id="chatpage" class="hidden chat">

<div class="header" onclick="back()">← Назад</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msg">
<button onclick="sendMsg()">➤</button>
</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("dice_users"))||[]
let chats=JSON.parse(localStorage.getItem("dice_chats"))||{}

let me=null
let currentChat=null

function save(){
localStorage.setItem("dice_users",JSON.stringify(users))
localStorage.setItem("dice_chats",JSON.stringify(chats))
}

function createAccount(){

let name=document.getElementById("name").value
let username=document.getElementById("username").value.replace("@","")

if(!name||!username)return alert("Введите имя и username")

if(users.find(u=>u.username==username))
return alert("username занят")

me={
id:Date.now(),
name:name,
username:username,
avatar:"https://i.imgur.com/4M34hi2.png"
}

users.push(me)

users.push({
id:1,
name:"DICEGRAM",
username:"dicegram",
avatar:"https://i.imgur.com/Q8QZQ9B.png",
bot:true
})

save()

let chatId=me.id+"_1"

chats[chatId]=[
{
text:"Вы успешно зарегистрировали аккаунт @"+username,
time:new Date().toLocaleTimeString().slice(0,5),
avatar:"https://i.imgur.com/Q8QZQ9B.png"
}
]

save()

document.getElementById("register").classList.add("hidden")
document.getElementById("main").classList.remove("hidden")

renderChats()

}

function renderChats(){

let list=document.getElementById("chatlist")

list.innerHTML=""

users.forEach(u=>{

if(u.id==me.id)return

list.innerHTML+=`
<div class="chatitem" onclick="openChat('${u.id}')">
<img src="${u.avatar}">
<div>
<div>${u.name}</div>
<div style="font-size:12px;color:#aaa">@${u.username}</div>
</div>
</div>
`

})

}

function openChat(id){

currentChat=id

document.getElementById("main").classList.add("hidden")
document.getElementById("chatpage").classList.remove("hidden")

renderMessages()

}

function renderMessages(){

let box=document.getElementById("messages")

box.innerHTML=""

let chatId=[me.id,currentChat].sort().join("_")

let m=chats[chatId]||[]

m.forEach(x=>{

box.innerHTML+=`
<div class="msg">
<img src="${x.avatar}">
<div>
<div>${x.text}</div>
<div class="time">${x.time}</div>
</div>
</div>
`

})

}

function sendMsg(){

let text=document.getElementById("msg").value

if(!text)return

let chatId=[me.id,currentChat].sort().join("_")

if(!chats[chatId])chats[chatId]=[]

chats[chatId].push({
text:text,
time:new Date().toLocaleTimeString().slice(0,5),
avatar:me.avatar
})

save()

document.getElementById("msg").value=""

renderMessages()

}

function back(){

document.getElementById("chatpage").classList.add("hidden")
document.getElementById("main").classList.remove("hidden")

}

function searchUser(){

let v=document.getElementById("search").value.replace("@","")

let u=users.find(x=>x.username==v)

if(u && u.id!=me.id){

document.getElementById("chatlist").innerHTML=`
<div class="chatitem" onclick="openChat('${u.id}')">
<img src="${u.avatar}">
<div>
<div>${u.name}</div>
<div>@${u.username}</div>
</div>
</div>
`

}else{

renderChats()

}

}

</script>

</body>
</html>

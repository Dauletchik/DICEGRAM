<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --blue: #5288c1; --text: #ffffff; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        
        h1 { color: var(--blue); margin-bottom: 30px; letter-spacing: 2px; }
        .btn { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn:active { transform: scale(0.98); }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: var(--panel); color: white; outline: none; box-sizing: border-box; font-size: 16px; }

        /* Интерфейс ТГ */
        .header { width: 100%; background: var(--panel); padding: 15px; font-weight: bold; border-bottom: 1px solid #000; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .chat-list { width: 100%; flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #0e1621; background: var(--panel); display: flex; align-items: center; cursor: pointer; }
        .avatar { width: 50px; height: 50px; background: var(--blue); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Окно чата */
        #chat-window { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; display: flex; flex-direction: column; }
        #chat-window.open { left: 0; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: url('https://i.pinimg.com/originals/f3/90/a6/f390a6e87f6208a1835368a071597560.png'); background-size: cover; }
        .msg { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .received { background: var(--panel); align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-box { padding: 10px; background: var(--panel); display: flex; align-items: center; }
        .input-box input { margin: 0; flex: 1; background: transparent; border: none; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen active">
        <h1>DICEGRAM</h1>
        <button class="btn" onclick="showScreen('reg-screen')">Зарегистрироваться</button>
        <button class="btn" style="background:#242f3d" onclick="showScreen('login-screen')">Войти</button>
    </div>

    <div id="reg-screen" class="screen">
        <h2>Регистрация</h2>
        <input type="tel" id="reg-phone" placeholder="Номер телефона (777...)">
        <button class="btn" id="reg-btn-check" onclick="checkUserExists()">Далее</button>
        <button class="btn" style="background:none; color:gray" onclick="showScreen('welcome-screen')">Назад</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2>Придумайте пароль</h2>
        <input type="password" id="reg-pass1" placeholder="Пароль">
        <input type="password" id="reg-pass2" placeholder="Повторите пароль">
        <button class="btn" onclick="goToNameScreen()">Далее</button>
    </div>

    <div id="name-screen" class="screen">
        <h2>Ваш профиль</h2>
        <input type="text" id="reg-name" placeholder="Ваше Имя">
        <input type="text" id="reg-nick" placeholder="Ник (латиница)">
        <button class="btn" onclick="finishRegistration()">Завершить</button>
    </div>

    <div id="login-screen" class="screen">
        <h2>Войти</h2>
        <input type="tel" id="login-phone" placeholder="Номер телефона">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button class="btn" onclick="loginProcess()">Войти</button>
        <button class="btn" style="background:none; color:gray" onclick="showScreen('welcome-screen')">Назад</button>
    </div>

    <div id="main-screen" class="screen" style="padding:0; justify-content: flex-start;">
        <div class="header">
            <span style="color: var(--blue)">DICEGRAM</span>
            <span onclick="logout()" style="color:#ff4444; font-size:12px; cursor:pointer">Выйти</span>
        </div>
        <div class="chat-list" id="chats"></div>
    </div>

    <div id="chat-window">
        <div class="header">
            <span onclick="closeChat()" style="cursor:pointer">⬅ Назад</span>
            <span id="chat-name">DICEGRAM Bot</span>
            <div style="width:20px"></div>
        </div>
        <div class="messages" id="msgs"></div>
        <div class="input-box">
            <input type="text" placeholder="Сообщение...">
            <span style="color:var(--blue); font-weight:bold; cursor:pointer">Отправить</span>
        </div>
    </div>

    <script>
        // === КОНФИГУРАЦИЯ (ВСТАВЬ СВОЮ ССЫЛКУ!) ===
        const firebaseConfig = {
            databaseURL: "ТВОЯ_ССЫЛКА_ТУТ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ШАГ 1 РЕГИСТРАЦИИ: Проверка номера
        function checkUserExists() {
            let phone = document.getElementById('reg-phone').value.replace(/\D/g, "");
            if (phone.length < 5) return alert("Введите номер!");

            db.ref('users/' + phone).once('value').then(snap => {
                if (snap.exists()) {
                    alert("Этот номер уже зарегистрирован! Нажми 'Войти'.");
                } else {
                    window.regData = { phone: phone };
                    showScreen('pass-screen');
                }
            });
        }

        // ШАГ 2 РЕГИСТРАЦИИ: Проверка пароля
        function goToNameScreen() {
            let p1 = document.getElementById('reg-pass1').value;
            let p2 = document.getElementById('reg-pass2').value;
            if (p1.length < 4) return alert("Пароль слишком короткий!");
            if (p1 !== p2) return alert("Пароли не совпадают!");
            window.regData.pass = p1;
            showScreen('name-screen');
        }

        // ШАГ 3 РЕГИСТРАЦИИ: Сохранение в базу
        function finishRegistration() {
            let name = document.getElementById('reg-name').value;
            let nick = document.getElementById('reg-nick').value;
            if (!name || !nick) return alert("Заполни данные!");

            db.ref('users/' + window.regData.phone).set({
                name: name,
                nick: nick.replace("@", ""),
                pass: window.regData.pass
            }).then(() => {
                localStorage.setItem('dice_user', window.regData.phone);
                enterApp("Вы успешно зарегистрировались в DICEGRAM! Добро пожаловать!");
            });
        }

        // ПРОЦЕСС ВХОДА
        function loginProcess() {
            let phone = document.getElementById('login-phone').value.replace(/\D/g, "");
            let pass = document.getElementById('login-pass').value;

            db.ref('users/' + phone).once('value').then(snap => {
                if (snap.exists() && snap.val().pass === pass) {
                    localStorage.setItem('dice_user', phone);
                    enterApp("Вы успешно вошли в аккаунт!");
                } else {
                    alert("Ошибка: Неверный номер или пароль!");
                }
            });
        }

        function enterApp(botText) {
            showScreen('main-screen');
            document.getElementById('chats').innerHTML = `
                <div class="chat-item" onclick="openChat('DICEGRAM Official', '${botText}')">
                    <div class="avatar">DG</div>
                    <div>
                        <div style="font-weight:bold">DICEGRAM Official</div>
                        <div style="font-size:13px; color:gray">Бот: ${botText}</div>
                    </div>
                </div>
            `;
        }

        function openChat(name, msg) {
            document.getElementById('chat-window').classList.add('open');
            document.getElementById('chat-name').innerText = name;
            document.getElementById('msgs').innerHTML = `<div class="msg received">${msg}</div>`;
        }

        function closeChat() { document.getElementById('chat-window').classList.remove('open'); }
        function logout() { localStorage.removeItem('dice_user'); location.reload(); }

        // АВТО-ВХОД ПРИ ЗАГРУЗКЕ
        window.onload = function() {
            let savedUser = localStorage.getItem('dice_user');
            if (savedUser) {
                db.ref('users/' + savedUser).once('value').then(snap => {
                    if (snap.exists()) enterApp("С возвращением!");
                });
            }
        };
    </script>
</body>
</html>

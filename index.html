<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE GRAM | Pro Desktop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0e1621;
            --bg-sidebar: #17212b;
            --bg-item-active: #2b5278;
            --bg-item-hover: #232e3c;
            --text-primary: #f5f5f5;
            --text-secondary: #708499;
            --accent: #5288c1;
            --msg-in: #182533;
            --msg-out: #2b5278;
            --status-online: #4ade80;
            --border: #0e1621;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- LAYOUT --- */
        .sidebar {
            width: 350px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 10;
        }

        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        /* --- SIDEBAR COMPONENTS --- */
        .sidebar-header {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-bar {
            flex: 1;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            background: #242f3d;
            border: 2px solid transparent;
            padding: 8px 12px 8px 35px;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: border 0.2s;
        }

        .search-bar input:focus { border-color: var(--accent); }
        .search-bar i { position: absolute; left: 12px; top: 10px; color: var(--text-secondary); }

        .chat-list { flex: 1; overflow-y: auto; }

        .chat-item {
            display: flex;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
            align-items: center;
            gap: 12px;
        }

        .chat-item:hover { background: var(--bg-item-hover); }
        .chat-item.active { background: var(--bg-item-active); }

        .avatar {
            width: 54px; height: 54px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: white; flex-shrink: 0;
            background-size: cover; background-position: center;
        }

        .chat-info { flex: 1; overflow: hidden; }
        .chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-time { font-size: 12px; color: var(--text-secondary); }
        .chat-msg { 
            font-size: 14px; color: var(--text-secondary); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        /* --- CHAT WINDOW COMPONENTS --- */
        .chat-header {
            height: 60px;
            background: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-meta { margin-left: 15px; }
        .status { font-size: 13px; color: var(--accent); }
        .typing { font-style: italic; color: var(--status-online); display: none; }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        /* --- MESSAGE BUBBLES --- */
        .msg-row { display: flex; width: 100%; margin-bottom: 2px; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }

        .bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            font-size: 14.5px;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }

        .sent .bubble { background: var(--msg-out); border-bottom-right-radius: 4px; }
        .received .bubble { background: var(--msg-in); border-bottom-left-radius: 4px; }

        .msg-meta {
            display: flex; align-items: center; justify-content: flex-end;
            gap: 4px; font-size: 11px; color: #a0acba; margin-top: 3px;
        }

        .check-mark { color: #40ebff; font-size: 10px; }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 10px 20px 15px;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-sidebar);
            border-radius: 22px;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 12px 0;
            outline: none;
            font-size: 15px;
        }

        .icon-btn { color: var(--text-secondary); cursor: pointer; font-size: 20px; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); }

        /* --- SETTINGS MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center;
            align-items: center; z-index: 1000;
        }

        .modal {
            background: var(--bg-sidebar);
            width: 400px; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal h2 { margin-bottom: 20px; color: var(--accent); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
        .form-group input { 
            width: 100%; padding: 10px; background: var(--bg-main); 
            border: 1px solid #333; border-radius: 5px; color: white; outline: none;
        }

        .btn-save {
            width: 100%; padding: 12px; background: var(--accent);
            border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* --- UTILS --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3d4b59; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Настройки профиля</h2>
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="set-name" placeholder="Введите имя">
            </div>
            <div class="form-group">
                <label>Имя пользователя (@username)</label>
                <input type="text" id="set-user" placeholder="@dice_gram">
            </div>
            <div class="form-group">
                <label>URL аватарки</label>
                <input type="text" id="set-avatar" placeholder="https://...">
            </div>
            <button class="btn-save" onclick="DiceEngine.saveSettings()">Сохранить изменения</button>
            <p onclick="DiceEngine.toggleModal()" style="text-align:center; margin-top:15px; cursor:pointer; font-size:14px; color:var(--text-secondary)">Закрыть</p>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-bars icon-btn" onclick="DiceEngine.toggleModal()"></i>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Поиск по @username...">
            </div>
        </div>
        <div class="chat-list" id="chatList">
            </div>
    </aside>

    <main class="chat-window">
        <header class="chat-header">
            <div class="avatar" id="h-avatar" style="width:42px; height:42px; font-size:14px;">?</div>
            <div class="header-meta">
                <div class="chat-name" id="h-name">Выберите чат</div>
                <div class="status" id="h-status"></div>
                <div class="typing" id="h-typing">печатает...</div>
            </div>
        </header>

        <div class="messages-container" id="msgBox">
            </div>

        <div class="input-area">
            <i class="fa-solid fa-paperclip icon-btn"></i>
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="Написать сообщение..." disabled autocomplete="off">
                <i class="fa-regular fa-face-smile icon-btn" style="font-size:18px"></i>
            </div>
            <i class="fa-solid fa-microphone icon-btn" id="actionIcon"></i>
        </div>
    </main>

<script>
    /**
     * DICE GRAM ENGINE v5.0
     * Модульная структура: State, UI, Logic
     */

    const DiceEngine = (() => {
        // --- СОСТОЯНИЕ (STATE) ---
        let state = {
            currentUser: JSON.parse(localStorage.getItem('dice_profile')) || { name: 'User', user: '@username', avatar: '' },
            activeChatId: null,
            chats: JSON.parse(localStorage.getItem('dice_data')) || [
                {
                    id: 'official_bot',
                    name: 'MESSAGE OFFICIAL',
                    user: '@dice_official',
                    color: '#f39c12',
                    isOnline: true,
                    history: [
                        { text: 'Добро пожаловать в DICE GRAM! Я ваш ассистент.', time: '12:00', type: 'received', status: 2 }
                    ]
                }
            ]
        };

        const botPhrases = [
            "Чистый код — это не то, что вы пишете, а то, как вы думаете.",
            "JavaScript — единственный язык, где [] + [] это пустая строка.",
            "Ошибка на строке 42? Попробуйте просто перезагрузить сервер.",
            "Программирование — это магия, превращающая кофе в код.",
            "DICE GRAM работает на чистом JS. Это ли не чудо?"
        ];

        // --- UI RENDERERS ---
        const renderChatList = () => {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            state.chats.forEach(chat => {
                const lastMsg = chat.history.length > 0 ? chat.history[chat.history.length - 1] : { text: 'Нет сообщений', time: '' };
                const isActive = state.activeChatId === chat.id;
                
                const item = document.createElement('div');
                item.className = `chat-item ${isActive ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar" style="background:${chat.color}; background-image:url('${chat.avatar || ''}')">${chat.avatar ? '' : chat.name[0]}</div>
                    <div class="chat-info">
                        <div class="chat-top">
                            <span class="chat-name">${chat.name}</span>
                            <span class="chat-time">${lastMsg.time}</span>
                        </div>
                        <div class="chat-msg">${lastMsg.text}</div>
                    </div>
                `;
                item.onclick = () => selectChat(chat.id);
                list.appendChild(item);
            });
        };

        const renderMessages = () => {
            const box = document.getElementById('msgBox');
            box.innerHTML = '';
            const chat = state.chats.find(c => c.id === state.activeChatId);
            if (!chat) return;

            chat.history.forEach(m => {
                const row = document.createElement('div');
                row.className = `msg-row ${m.type}`;
                
                const statusHtml = m.type === 'sent' ? `
                    <span class="check-mark">
                        <i class="fa-solid fa-check"></i>${m.status === 2 ? '<i class="fa-solid fa-check" style="margin-left:-4px"></i>' : ''}
                    </span>` : '';

                row.innerHTML = `
                    <div class="bubble">
                        ${m.text}
                        <div class="msg-meta">
                            <span>${m.time}</span>
                            ${statusHtml}
                        </div>
                    </div>
                `;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        };

        // --- CORE LOGIC ---
        const selectChat = (id) => {
            state.activeChatId = id;
            const chat = state.chats.find(c => c.id === id);
            
            document.getElementById('h-name').textContent = chat.name;
            document.getElementById('h-status').textContent = chat.isOnline ? 'в сети' : 'был недавно';
            document.getElementById('h-avatar').textContent = chat.avatar ? '' : chat.name[0];
            document.getElementById('h-avatar').style.background = chat.color;
            document.getElementById('h-avatar').style.backgroundImage = `url('${chat.avatar || ''}')`;
            
            document.getElementById('msgInput').disabled = false;
            document.getElementById('msgInput').focus();

            renderChatList();
            renderMessages();
        };

        const handleSend = () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !state.activeChatId) return;

            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const chat = state.chats.find(c => c.id === state.activeChatId);
            const msg = { text, time, type: 'sent', status: 1 };
            
            chat.history.push(msg);
            input.value = '';
            renderMessages();
            renderChatList();
            save();

            // Эффект прочтения
            setTimeout(() => { msg.status = 2; renderMessages(); }, 1000);

            // Бот логика
            if (state.activeChatId === 'official_bot') triggerBot();
        };

        const triggerBot = () => {
            const typ = document.getElementById('h-typing');
            const stat = document.getElementById('h-status');
            
            stat.style.display = 'none';
            typ.style.display = 'block';

            setTimeout(() => {
                const chat = state.chats.find(c => c.id === 'official_bot');
                const reply = botPhrases[Math.floor(Math.random() * botPhrases.length)];
                
                chat.history.push({
                    text: reply,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    type: 'received',
                    status: 2
                });

                typ.style.display = 'none';
                stat.style.display = 'block';
                
                if (state.activeChatId === 'official_bot') renderMessages();
                renderChatList();
                save();
            }, 2500);
        };

        const addNewContact = (username) => {
            const name = username.replace('@', '');
            const newChat = {
                id: Date.now().toString(),
                name: name.charAt(0).toUpperCase() + name.slice(1),
                user: username,
                color: '#' + Math.floor(Math.random()*16777215).toString(16),
                isOnline: false,
                history: []
            };
            state.chats.push(newChat);
            save();
            renderChatList();
            selectChat(newChat.id);
        };

        const save = () => localStorage.setItem('dice_data', JSON.stringify(state.chats));

        // --- PUBLIC API ---
        return {
            init: () => {
                renderChatList();
                // Подгрузка настроек в инпуты
                document.getElementById('set-name').value = state.currentUser.name;
                document.getElementById('set-user').value = state.currentUser.user;
                document.getElementById('set-avatar').value = state.currentUser.avatar;
            },
            toggleModal: () => {
                const m = document.getElementById('modalOverlay');
                m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            },
            saveSettings: () => {
                state.currentUser = {
                    name: document.getElementById('set-name').value,
                    user: document.getElementById('set-user').value,
                    avatar: document.getElementById('set-avatar').value
                };
                localStorage.setItem('dice_profile', JSON.stringify(state.currentUser));
                alert('Профиль сохранен!');
                DiceEngine.toggleModal();
            },
            handleSend,
            addNewContact
        };
    })();

    // --- EVENT LISTENERS ---
    document.getElementById('msgInput').onkeypress = (e) => {
        if (e.key === 'Enter') DiceEngine.handleSend();
    };

    document.getElementById('searchInput').onkeypress = (e) => {
        if (e.key === 'Enter' && e.target.value.startsWith('@')) {
            DiceEngine.addNewContact(e.target.value);
            e.target.value = '';
        }
    };

    document.getElementById('msgInput').oninput = (e) => {
        const icon = document.getElementById('actionIcon');
        if (e.target.value.length > 0) {
            icon.className = 'fa-solid fa-paper-plane icon-btn';
            icon.onclick = DiceEngine.handleSend;
        } else {
            icon.className = 'fa-solid fa-microphone icon-btn';
            icon.onclick = null;
        }
    };

    // Запуск приложения
    window.onload = DiceEngine.init;
</script>
</body>
</html>

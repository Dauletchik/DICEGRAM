<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM SAVED</title>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --blue: #5288c1; --text: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }

        /* Шапка */
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; }
        .menu-btn { cursor: pointer; font-size: 24px; }

        /* Центрирование входа */
        .auth-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        input { width: 100%; max-width: 280px; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: var(--panel); color: white; outline: none; }
        .btn { width: 100%; max-width: 280px; padding: 15px; background: var(--blue); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }

        /* Список чатов */
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #080d13; display: flex; align-items: center; }
        .avatar { width: 45px; height: 45px; background: var(--blue); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Боковое меню */
        #side-menu { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: var(--panel); transition: 0.3s; z-index: 300; padding: 20px; box-sizing: border-box; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #side-menu.open { left: 0; }
        .menu-item { padding: 15px 0; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 250; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="auth-center">
            <h1 style="color: var(--blue); font-size: 35px;">DICEGRAM</h1>
            <p id="auth-desc">У вас нет активного аккаунта</p>
            <input type="text" id="username" placeholder="@твой_ник">
            <button class="btn" onclick="createNewAccount()">Создать аккаунт</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="header">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <span style="font-weight: bold;">DICEGRAM</span>
            <div style="width: 24px;"></div> </div>
        <div class="chat-list" id="chat-list">
            </div>
    </div>

    <div id="side-menu">
        <h2 id="current-user-title" style="color: var(--blue);">@nick</h2>
        <div style="font-size: 12px; color: gray; margin-bottom: 10px;">ВАШИ АККАУНТЫ (МАКС 2)</div>
        <div id="acc-list"></div>
        
        <div id="add-acc-btn" class="menu-item" style="color: #4CAF50; margin-top: 10px;" onclick="goToAddAccount()">+ Добавить аккаунт</div>
        
        <div class="menu-item" style="color: red; margin-top: 40px; border: none;" onclick="fullReset()">Полный сброс</div>
        <div class="menu-item" onclick="toggleMenu()" style="border: none; color: gray;">Закрыть</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <script>
        // Загрузка данных
        let accounts = JSON.parse(localStorage.getItem('dg_data')) || [];
        let currentIdx = parseInt(localStorage.getItem('dg_active_idx')) || 0;

        window.onload = () => {
            // Если в памяти есть аккаунты, сразу открываем приложение
            if (accounts.length > 0) {
                renderApp();
            } else {
                showScreen('auth-screen');
            }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createNewAccount() {
            const nick = document.getElementById('username').value.trim().replace('@', '');
            if (nick.length < 3) return alert("Ник слишком короткий!");

            // Проверяем, нет ли уже такого ника на этом телефоне
            if (accounts.some(a => a.nick === nick)) {
                alert("Этот аккаунт уже создан на вашем устройстве!");
                return;
            }

            if (accounts.length >= 2) {
                alert("Лимит 2 аккаунта исчерпан!");
                return;
            }

            // Добавляем новый акк
            accounts.push({
                nick: nick,
                chats: ["DICEGRAM Bot", "Избранное"]
            });

            // Сохраняем и заходим
            currentIdx = accounts.length - 1;
            saveAndRefresh();
        }

        function renderApp() {
            showScreen('main-screen');
            const user = accounts[currentIdx];
            document.getElementById('current-user-title').innerText = "@" + user.nick;

            // Список чатов
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            user.chats.forEach(c => {
                list.innerHTML += `
                    <div class="chat-item">
                        <div class="avatar">${c[0]}</div>
                        <div><b>${c}</b><br><small style="color:gray">Аккаунт: ${user.nick}</small></div>
                    </div>
                `;
            });

            // Список аккаунтов в меню
            const accList = document.getElementById('acc-list');
            accList.innerHTML = "";
            accounts.forEach((acc, i) => {
                accList.innerHTML += `
                    <div class="menu-item" onclick="switchAccount(${i})">
                        @${acc.nick} ${i === currentIdx ? "✅" : ""}
                    </div>
                `;
            });

            // Кнопка "Добавить"
            document.getElementById('add-acc-btn').style.display = accounts.length >= 2 ? "none" : "flex";
        }

        function switchAccount(idx) {
            currentIdx = idx;
            saveAndRefresh();
            toggleMenu();
        }

        function goToAddAccount() {
            toggleMenu();
            document.getElementById('username').value = "";
            document.getElementById('auth-desc').innerText = "Добавление второго аккаунта";
            showScreen('auth-screen');
        }

        function saveAndRefresh() {
            localStorage.setItem('dg_data', JSON.stringify(accounts));
            localStorage.setItem('dg_active_idx', currentIdx);
            renderApp();
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function fullReset() {
            if (confirm("Это удалит все аккаунты на этом телефоне. Уверены?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #ws-lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2481cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .lock-status-title {
            font-size: 17px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 6px;
        }

        .lock-status-desc {
            font-size: 14px;
            color: #707579;
            line-height: 1.4;
        }

        .tg-header {
            background-color: #ffffff;
            padding: 12px 16px 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header-title-container {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 21px;
            font-weight: 700;
            color: #2481cc;
            letter-spacing: -0.2px;
        }

        .connection-status {
            font-size: 13px;
            color: #707579;
            font-weight: 400;
            margin-top: -2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #4f5459;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #53575c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .tg-tabs {
            display: flex;
            background-color: #ffffff;
            padding: 6px 16px 10px 16px;
            gap: 10px;
            border-bottom: 1px solid #f0f0f2;
        }

        .tg-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: #f0f5fa;
            color: #2481cc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .tab-badge {
            background-color: #2481cc;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            background-color: #ffffff;
            position: relative;
        }

        .app-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        .app-screen.active {
            display: block;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-bottom: 0.5px solid #f4f4f6;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .chat-item:active {
            background-color: #f2f2f5;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .avatar-support { background: linear-gradient(135deg, #2abee2, #1d74e7); }
        .avatar-user { background: linear-gradient(135deg, #af52de, #7a22b8); }

        .chat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .chat-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-name-container {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .verified-badge {
            width: 15px;
            height: 15px;
            background-color: #2481cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 9px;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 12px;
            color: #707579;
            white-space: nowrap;
        }

        .chat-row-bottom {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .chat-message {
            font-size: 14px;
            color: #707579;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .chat-meta-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-width: 20px;
        }

        .unread-badge {
            background-color: #2481cc;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            margin-top: 2px;
        }

        .chat-view-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #e7ebf0;
        }

        .chat-view-header {
            background-color: #ffffff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #dcdce0;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #2481cc;
            cursor: pointer;
        }

        .chat-view-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .msg-bubble.incoming {
            background-color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #000000;
        }

        .msg-bubble.outgoing {
            background-color: #effdde;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #000000;
        }

        .msg-time {
            font-size: 11px;
            color: #a3a3a3;
            float: right;
            margin-top: 4px;
            margin-left: 8px;
        }

        .mention-link {
            color: #2481cc;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .mention-link:active {
            text-decoration: underline;
        }

        .chat-view-input-bar {
            background-color: #ffffff;
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 0px)) 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #dcdce0;
        }

        .message-input {
            flex: 1;
            border: none;
            outline: none;
            background-color: #f4f4f6;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            color: #000000;
        }

        .send-msg-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #2481cc;
            cursor: pointer;
        }

        .profile-screen {
            background-color: #f4f4f6;
            height: 100%;
        }

        .profile-card {
            background-color: #ffffff;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid #e5e5e7;
        }

        .profile-avatar-big {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007aff, #00c6ff);
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
        }

        .profile-username {
            font-size: 14px;
            color: #707579;
        }

        .profile-section {
            background-color: #ffffff;
            margin-top: 12px;
            border-top: 1px solid #e5e5e7;
            border-bottom: 1px solid #e5e5e7;
        }

        .profile-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            font-size: 16px;
            border-bottom: 0.5px solid #f4f4f6;
        }

        .profile-list-item:last-child {
            border-bottom: none;
        }

        .profile-list-label {
            color: #000000;
        }

        .profile-list-value {
            color: #707579;
        }

        .placeholder-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #707579;
            font-size: 16px;
            font-weight: 500;
            background-color: #f4f4f6;
            text-align: center;
            padding: 20px;
        }

        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .bottom-nav {
            background-color: #ffffff;
            border-top: 1px solid #e5e5e7;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px)) 0;
            position: relative;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #707579;
            text-decoration: none;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: 500;
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: #2481cc;
        }

        .nav-icon-wrapper {
            position: relative;
            font-size: 22px;
            margin-bottom: 2px;
            line-height: 1;
        }

        .nav-badge {
            position: absolute;
            top: -4px;
            right: -10px;
            background-color: #2481cc;
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 8px;
            min-width: 16px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ws-lock-overlay">
        <div class="spinner"></div>
        <div class="lock-status-title" id="lock-title">Соединение с сервером...</div>
        <div class="lock-status-desc" id="lock-desc">Пожалуйста, подождите. Идет авторизация в сети DICEGRAM.</div>
    </div>

    <div class="tg-header" id="main-header">
        <div class="header-title-container">
            <div class="header-title" id="app-title-text">DICEGRAM</div>
            <div class="connection-status" id="conn-status-text" style="display: none;">Обновление...</div>
        </div>
        <div class="header-actions">
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">⋮</button>
        </div>
    </div>

    <div class="tg-tabs" id="tabs-bar">
        <div class="tg-tab">
            <span>Все чаты</span>
            <span class="tab-badge" id="total-unread-badge" style="display: none;">0</span>
        </div>
    </div>

    <div class="screen-container">
        
        <div id="screen-chats" class="app-screen active">
            <div class="chat-list" id="chats-render-box">
                </div>
        </div>

        <div id="screen-chat-view" class="app-screen">
            <div class="chat-view-container">
                <div class="chat-view-header">
                    <button class="back-btn" onclick="closeChatView()">←</button>
                    <div class="chat-avatar avatar-support" id="view-header-avatar" style="width: 40px; height: 40px; font-size: 14px;">DS</div>
                    <div class="chat-info">
                        <div class="chat-name-container">
                            <span class="chat-name" id="view-header-name">DAUPRO SUPORT</span>
                            <div class="verified-badge" id="view-header-verified">✓</div>
                        </div>
                        <span style="font-size: 12px; color: #707579;" id="view-header-status">бот</span>
                    </div>
                </div>
                
                <div class="chat-view-messages" id="chat-messages-box">
                    </div>

                <div class="chat-view-input-bar">
                    <input type="text" class="message-input" id="msg-input-field" placeholder="Сообщение" autocomplete="off">
                    <button class="send-msg-btn" onclick="sendUserMessage()">➔</button>
                </div>
            </div>
        </div>

        <div id="screen-contacts" class="app-screen">
            <div class="placeholder-screen">
                <div class="placeholder-icon">👤</div>
                <div>Страница Контакты</div>
            </div>
        </div>

        <div id="screen-settings" class="app-screen">
            <div class="placeholder-screen">
                <div class="placeholder-icon">⚙️</div>
                <div>Страница Настройки</div>
            </div>
        </div>

        <div id="screen-profile" class="app-screen">
            <div class="profile-screen">
                <div class="profile-card">
                    <div class="profile-avatar-big" id="prof-avatar-icon">U</div>
                    <div class="profile-name" id="prof-full-name">Пользователь</div>
                    <div class="profile-username" id="prof-username">@username</div>
                </div>
                
                <div class="profile-section">
                    <div class="profile-list-item">
                        <span class="profile-list-label">Идентификатор ID</span>
                        <span class="profile-list-value" id="prof-id">00000000</span>
                    </div>
                    <div class="profile-list-item">
                        <span class="profile-list-label">Язык аккаунта</span>
                        <span class="profile-list-value" id="prof-lang">ru</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav" id="main-bottom-navigation">
        <button class="nav-item active" onclick="switchScreen('chats')">
            <div class="nav-icon-wrapper">
                💬
                <div class="nav-badge" id="bottom-chats-badge">0</div>
            </div>
            <span>Чаты</span>
        </button>
        
        <button class="nav-item" onclick="switchScreen('contacts')">
            <div class="nav-icon-wrapper">👤</div>
            <span>Контакты</span>
        </button>
        
        <button class="nav-item" onclick="switchScreen('settings')">
            <div class="nav-icon-wrapper">⚙️</div>
            <span>Настройки</span>
        </button>
        
        <button class="nav-item" onclick="switchScreen('profile')">
            <div class="nav-icon-wrapper">🖼️</div>
            <span>Профиль</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            if (tg.headerColor) tg.setHeaderColor('#ffffff');
        }

        let myId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : 777;
        let myUsername = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.username : "guest_user";

        let activeChats = {
            "0_777": {
                id: "0_777",
                name: "DAUPRO SUPORT",
                avatarClass: "avatar-support",
                letter: "DS",
                msg: "Добро пожаловать в DICEGRAM!",
                time: "13:07",
                unread: 0,
                verified: true,
                is_bot: true
            }
        };

        let currentChatId = null;

        function setupUserProfile() {
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || "Пользователь";
                document.getElementById('prof-full-name').innerText = fullName;
                document.getElementById('prof-username').innerText = user.username ? `@${user.username}` : '@не указан';
                document.getElementById('prof-id').innerText = user.id;
                document.getElementById('prof-lang').innerText = user.language_code || "ru";
                document.getElementById('prof-avatar-icon').innerText = fullName.charAt(0).toUpperCase();
            }
        }

        function updateChatsListView() {
            const container = document.getElementById('chats-render-box');
            container.innerHTML = '';
            let totalUnread = 0;

            Object.values(activeChats).forEach(chat => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.onclick = () => openChatView(chat.id);
                
                const verifiedHTML = chat.verified ? `<div class="verified-badge">✓</div>` : '';
                const unreadHTML = chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : '';
                totalUnread += chat.unread;

                item.innerHTML = `
                    <div class="chat-avatar ${chat.avatarClass}">${chat.letter}</div>
                    <div class="chat-info">
                        <div class="chat-row-top">
                            <div class="chat-name-container">
                                <span class="chat-name">${chat.name}</span>
                                ${verifiedHTML}
                            </div>
                            <span class="chat-time">${chat.time}</span>
                        </div>
                        <div class="chat-row-bottom">
                            <span class="chat-message">${chat.msg}</span>
                            <div class="chat-meta-right">${unreadHTML}</div>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });

            const totalUnreadBadge = document.getElementById('total-unread-badge');
            const bottomChatsBadge = document.getElementById('bottom-chats-badge');
            if (totalUnread > 0) {
                totalUnreadBadge.innerText = totalUnread;
                totalUnreadBadge.style.display = 'block';
                bottomChatsBadge.innerText = totalUnread;
                bottomChatsBadge.style.display = 'block';
            } else {
                totalUnreadBadge.style.display = 'none';
                bottomChatsBadge.style.display = 'none';
            }
        }

        function switchScreen(screenName) {
            closeChatView();
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            const tabsBar = document.getElementById('tabs-bar');
            const mainHeader = document.getElementById('main-header');

            if (screenName === 'chats') {
                tabsBar.style.display = 'flex';
                mainHeader.style.display = 'flex';
            } else {
                tabsBar.style.display = 'none';
                mainHeader.style.display = screenName === 'profile' ? 'none' : 'flex';
            }

            document.getElementById(`screen-${screenName}`).classList.add('active');
            
            // Find and activate nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.textContent.toLowerCase().includes(screenName)) {
                    item.classList.add('active');
                }
            });

            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function formatMessageText(text) {
            const mentionRegex = /@([a-zA-Z0-9_]{4,32})/g;
            return text.replace(mentionRegex, (match, username) => {
                return `<span class="mention-link" onclick="handleUsernameClick('${username}', event)">${match}</span>`;
            });
        }

        function handleUsernameClick(username, event) {
            event.stopPropagation();
            if (username === myUsername) return; 

            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    action: "find_user",
                    username: username
                }));
            }
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function appendBubble(text, time, type) {
            const box = document.getElementById('chat-messages-box');
            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${type}`;
            bubble.innerHTML = `${formatMessageText(text)} <span class="msg-time">${time}</span>`;
            box.appendChild(bubble);
            box.scrollTop = box.scrollHeight;
        }

        function openChatView(chatId) {
            currentChatId = chatId;
            const chat = activeChats[chatId];
            if (chat) {
                chat.unread = 0;
                document.getElementById('view-header-name').innerText = chat.name;
                document.getElementById('view-header-status').innerText = chat.is_bot ? 'бот' : 'онлайн';
                document.getElementById('view-header-verified').style.display = chat.verified ? 'flex' : 'none';
                
                const avatarEl = document.getElementById('view-header-avatar');
                avatarEl.className = `chat-avatar ${chat.avatarClass}`;
                avatarEl.innerText = chat.letter;
            }

            document.getElementById('screen-chats').classList.remove('active');
            document.getElementById('screen-chat-view').classList.add('active');
            document.getElementById('tabs-bar').style.display = 'none';
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('main-bottom-navigation').style.display = 'none';

            document.getElementById('chat-messages-box').innerHTML = '';
            
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    action: "get_history",
                    chat_id: chatId
                }));
            }

            updateChatsListView();
        }

        function closeChatView() {
            currentChatId = null;
            document.getElementById('screen-chat-view').classList.remove('active');
            document.getElementById('screen-chats').classList.add('active');
            document.getElementById('tabs-bar').style.display = 'flex';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-bottom-navigation').style.display = 'flex';
            updateChatsListView();
        }

        function sendUserMessage() {
            const input = document.getElementById('msg-input-field');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            appendBubble(text, timeStr, 'outgoing');
            if (activeChats[currentChatId]) {
                activeChats[currentChatId].msg = text;
                activeChats[currentChatId].time = timeStr;
            }

            // Extract receiver_id from chat_id
            const parts = currentChatId.split('_');
            const receiverId = parts[0] === String(myId) ? parseInt(parts[1]) : parseInt(parts[0]);

            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    action: "send_msg",
                    receiver_id: receiverId,
                    message: text
                }));
            }

            input.value = '';
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        document.getElementById('msg-input-field').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendUserMessage();
        });

        // WebSocket connection
        const wsHost = "ws://a38182-6d28.j.jrnm.app:8765"; 
        let socket;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;

        function connectWebSocket() {
            const overlay = document.getElementById('ws-lock-overlay');
            document.getElementById('lock-title').innerText = "Соединение с сервером...";
            document.getElementById('lock-desc').innerText = "Пожалуйста, подождите. Идет авторизация в сети DICEGRAM.";
            overlay.style.display = 'flex';

            document.getElementById('conn-status-text').style.display = 'block';

            try {
                socket = new WebSocket(wsHost);

                socket.onopen = function() {
                    document.getElementById('conn-status-text').style.display = 'none';
                    overlay.style.display = 'none';
                    reconnectAttempts = 0;

                    const user = tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
                    socket.send(JSON.stringify({
                        action: "auth",
                        user_id: myId,
                        username: myUsername,
                        first_name: user ? user.first_name : '',
                        last_name: user ? user.last_name : ''
                    }));
                };

                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === "new_msg") {
                            const chatId = data.chat_id;
                            const senderId = data.sender_id;
                            const isFromMe = senderId === myId;
                            
                            if (!activeChats[chatId]) {
                                const senderName = data.sender_username ? `@${data.sender_username}` : `ID: ${senderId}`;
                                activeChats[chatId] = {
                                    id: chatId,
                                    name: senderName,
                                    avatarClass: "avatar-user",
                                    letter: senderName.charAt(0).toUpperCase(),
                                    msg: data.message,
                                    time: data.time,
                                    unread: 0,
                                    verified: false,
                                    is_bot: senderId === 0
                                };
                            }

                            if (!isFromMe) {
                                activeChats[chatId].msg = data.message;
                                activeChats[chatId].time = data.time;
                            }

                            if (currentChatId === chatId) {
                                appendBubble(data.message, data.time, isFromMe ? 'outgoing' : 'incoming');
                            } else if (!isFromMe) {
                                activeChats[chatId].unread += 1;
                            }
                            updateChatsListView();

                            if (tg && tg.HapticFeedback && !isFromMe) {
                                tg.HapticFeedback.notificationOccurred('success');
                            }
                        }

                        if (data.type === "user_found") {
                            const userId = data.user_id;
                            const chatId = createChatId(myId, userId);
                            if (!activeChats[chatId]) {
                                const name = data.username ? `@${data.username}` : `ID: ${userId}`;
                                activeChats[chatId] = {
                                    id: chatId,
                                    name: name,
                                    avatarClass: "avatar-user",
                                    letter: name.charAt(0).toUpperCase(),
                                    msg: "Чат успешно создан",
                                    time: "Только что",
                                    unread: 0,
                                    verified: false,
                                    is_bot: userId === 0
                                };
                                updateChatsListView();
                            }
                            openChatView(chatId);
                        }

                        if (data.type === "user_not_found") {
                            if (tg && tg.showPopup) {
                                tg.showPopup({
                                    title: "Пользователь не найден",
                                    message: `Пользователь @${data.username} не найден`,
                                    buttons: [{type: "close"}]
                                });
                            }
                        }

                        if (data.type === "history") {
                            const box = document.getElementById('chat-messages-box');
                            box.innerHTML = '';
                            
                            if (data.messages && data.messages.length > 0) {
                                data.messages.forEach(m => {
                                    const mType = m.sender_id === myId ? 'outgoing' : 'incoming';
                                    appendBubble(m.message, m.time, mType);
                                });
                            }
                        }

                        if (data.type === "auth_success") {
                            logger.info("Auth successful");
                        }

                    } catch (err) {
                        console.log("Error processing message:", err);
                    }
                };

                socket.onclose = function() {
                    document.getElementById('conn-status-text').style.display = 'block';
                    
                    document.getElementById('lock-title').innerText = "Сервер DICEGRAM временно недоступен";
                    document.getElementById('lock-desc').innerText = "Пожалуйста, запустите bot.py на вашем сервере или в Pydroid 3.";
                    overlay.style.display = 'flex';

                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        const delay = Math.min(1000 * reconnectAttempts, 10000);
                        setTimeout(connectWebSocket, delay);
                    }
                };

                socket.onerror = function() {
                    document.getElementById('conn-status-text').style.display = 'block';
                    overlay.style.display = 'flex';
                };

            } catch (e) {
                console.error("WebSocket connection error:", e);
                overlay.style.display = 'flex';
                setTimeout(connectWebSocket, 5000);
            }
        }

        function createChatId(user1, user2) {
            return `${Math.min(user1, user2)}_${Math.max(user1, user2)}`;
        }

        window.onload = function() {
            setupUserProfile();
            // Инициализируем чат с ботом
            const botChatId = createChatId(myId, 0);
            activeChats[botChatId] = {
                id: botChatId,
                name: "DAUPRO SUPORT",
                avatarClass: "avatar-support",
                letter: "DS",
                msg: "Загрузка...",
                time: "--:--",
                unread: 0,
                verified: true,
                is_bot: true
            };
            updateChatsListView();
            connectWebSocket();
        };
    </script>
</body>
</html>

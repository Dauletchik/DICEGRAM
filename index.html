<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICETOK Game Platform</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#0f172a;color:white;display:flex;flex-direction:column;align-items:center;}
h1{margin:20px;}
button{padding:12px 20px;margin:5px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold;cursor:pointer;}
#auth,#main,#profile,#games,#chat{display:flex;flex-direction:column;align-items:center;width:100%;}
#main,#profile,#games,#chat{display:none;}
#bottomNav{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:space-around;background:#1e293b;padding:10px 0;}
#gameCards{display:flex;flex-wrap:wrap;justify-content:center;width:100%;}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:10px;width:150px;text-align:center;}
input,textarea{padding:8px;margin:5px;border-radius:6px;border:none;width:90%;}
#messages{width:90%;max-width:400px;max-height:300px;overflow-y:auto;background:#1e293b;padding:10px;border-radius:10px;margin-bottom:10px;}
.message{margin:5px;padding:5px;border-radius:5px;background:#374151;}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="auth">
  <h1>DICETOK Games</h1>
  <button onclick="googleLogin()">Войти через Google</button>
</div>

<div id="main">
  <h2>Привет, <span id="userNameDisplay"></span></h2>
  <p>Уровень: <span id="userLevel">1</span> | Очки: <span id="userScore">0</span> | Монеты: <span id="userCoins">0</span></p>
</div>

<div id="games">
  <h2>Мини-Игры</h2>
  <div id="gameCards">
    <div class="card"><h3>Кликер</h3><button onclick="playClicker()">Играть</button></div>
    <div class="card"><h3>Викторина</h3><button onclick="playQuiz()">Играть</button></div>
    <div class="card"><h3>RPG Квест</h3><button onclick="playRPG()">Играть</button></div>
  </div>
</div>

<div id="chat">
  <h2>Мировой чат</h2>
  <div id="messages"></div>
  <input id="msgInput" placeholder="Написать сообщение">
  <button onclick="sendMessage()">Отправить</button>
</div>

<div id="bottomNav">
  <button onclick="showMainUI()">Главная</button>
  <button onclick="showGames()">Игры</button>
  <button onclick="showChat()">Чат</button>
</div>

<script>
// ===== Firebase Config =====
firebase.initializeApp({
  apiKey: "AIzaSyA8slPm58rciKbNbGAqA97VP2rWiENC9_k",
  authDomain: "flikyfloky-61eed.firebaseapp.com",
  projectId: "flikyfloky-61eed",
  storageBucket: "flikyfloky-61eed.firebasestorage.app",
  messagingSenderId: "167396726913",
  appId: "1:167396726913:web:dd012abf884a768c09d580",
  measurementId: "G-7YMLFXSKG3"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// ===== Google Login =====
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(result=>{
      currentUser = result.user;
      db.collection("users").doc(currentUser.uid).set({
        name: currentUser.displayName,
        email: currentUser.email,
        coins:0,
        score:0,
        level:1,
        created:Date.now()
      }, {merge:true});
      showMainUI();
    }).catch(e=>alert(e.message));
}

// ===== UI Functions =====
function showMainUI(){
  hideAll();
  document.getElementById("main").style.display="flex";
  document.getElementById("bottomNav").style.display="flex";
  loadStats();
}
function showGames(){
  hideAll();
  document.getElementById("games").style.display="flex";
  document.getElementById("bottomNav").style.display="flex";
}
function showChat(){
  hideAll();
  document.getElementById("chat").style.display="flex";
  document.getElementById("bottomNav").style.display="flex";
  loadChat();
}
function hideAll(){
  document.getElementById("main").style.display="none";
  document.getElementById("games").style.display="none";
  document.getElementById("chat").style.display="none";
}

// ===== Load Stats =====
function loadStats(){
  db.collection("users").doc(currentUser.uid).get().then(doc=>{
    const data = doc.data();
    document.getElementById("userNameDisplay").innerText = data.name;
    document.getElementById("userLevel").innerText = data.level;
    document.getElementById("userScore").innerText = data.score;
    document.getElementById("userCoins").innerText = data.coins;
  });
}

// ===== Chat =====
function loadChat(){
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML="";
  db.collection("chat").orderBy("timestamp","asc").onSnapshot(snapshot=>{
    messagesDiv.innerHTML="";
    snapshot.forEach(doc=>{
      const m = doc.data();
      const div = document.createElement("div");
      div.className="message";
      div.innerText = m.name+": "+m.text;
      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}
function sendMessage(){
  const text = document.getElementById("msgInput").value;
  if(!text) return;
  db.collection("chat").add({
    uid: currentUser.uid,
    name: currentUser.displayName,
    text:text,
    timestamp:Date.now()
  });
  document.getElementById("msgInput").value="";
}

// ===== Mini-Games =====
function playClicker(){
  let count = 0;
  const clicks = prompt("Кликер: сколько раз вы хотите кликнуть? (число)");
  if(clicks && !isNaN(clicks)){
    count = parseInt(clicks);
    const coinsEarned = count;
    alert("Вы заработали "+coinsEarned+" монет!");
    db.collection("users").doc(currentUser.uid).update({
      coins: firebase.firestore.FieldValue.increment(coinsEarned),
      score: firebase.firestore.FieldValue.increment(coinsEarned)
    });
    loadStats();
  }
}

function playQuiz(){
  const q = prompt("Вопрос: Сколько будет 2+2?");
  if(q=="4"){
    alert("Правильно! +10 очков");
    db.collection("users").doc(currentUser.uid).update({
      score: firebase.firestore.FieldValue.increment(10)
    });
    loadStats();
  } else alert("Неправильно!");
}

function playRPG(){
  const dmg = Math.floor(Math.random()*20)+1;
  alert("RPG Квест: Вы нанесли "+dmg+" урона и получили "+dmg+" очков!");
  db.collection("users").doc(currentUser.uid).update({
    score: firebase.firestore.FieldValue.increment(dmg)
  });
  loadStats();
}

// ===== Auto Login =====
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    showMainUI();
  }
});
</script>
</body>
</html>

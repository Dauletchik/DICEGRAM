<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        :root {
            --tg-bg-color: #0e1621;         /* Фон ночного ТГ */
            --tg-surface-color: #17212b;    /* Поверхности элементов */
            --tg-text-color: #f5f5f5;       /* Основной текст */
            --tg-text-secondary: #7f91a4;  /* Серый второстепенный */
            --tg-accent-color: #5288c1;     /* Синий линк */
            --tg-border-color: #101921;     /* Линии разделения */
            --tg-msg-out: #244b6f;          /* Баббл исходящего */
            --tg-msg-in: #182533;           /* Баббл входящего */
            --tg-verified: #2f8cc9;
            --tg-unread-badge: #4c82b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(127, 145, 164, 0.1);
            border-top: 3px solid var(--tg-accent-color);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        header {
            height: 54px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .header-main-title { font-size: 17px; font-weight: 600; }

        .screen { flex: 1; display: none; overflow-y: auto; padding-bottom: 60px; }
        .screen.active { display: flex; flex-direction: column; }

        /* СПИСОК ЧАТОВ TELEGRAM СТИЛЬ */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--tg-border-color);
            cursor: pointer;
            background-color: var(--tg-surface-color);
        }
        .chat-item:active { background-color: #202b36; }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5085b1, #366187);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            flex-shrink: 0;
        }

        .chat-details { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .chat-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .chat-preview { font-size: 13.5px; color: var(--tg-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px;}

        .chat-meta-column {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            flex-shrink: 0;
            height: 38px;
        }
        .chat-time-label { font-size: 11px; color: var(--tg-text-secondary); }
        .unread-badge {
            background-color: var(--tg-unread-badge);
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* ПОЛНОЭКРАННЫЙ СТИЛЬ ОКНА ОТКРЫТОГО ЧАТА */
        #chat-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .chat-header {
            height: 54px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            padding: 0 12px;
            flex-shrink: 0;
        }
        .back-btn {
            background: none; border: none; color: var(--tg-accent-color);
            font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; padding-right: 10px;
        }
        .header-user-info { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
        .header-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #5288c1, #2b5278);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; color: #ffffff; flex-shrink: 0;
        }
        .header-text-container { display: flex; flex-direction: column; min-width: 0; }
        .header-chat-title { font-size: 15.5px; font-weight: 600; color: var(--tg-text-color); display: flex; align-items: center; gap: 4px; }
        .header-chat-status { font-size: 12px; color: var(--tg-text-secondary); margin-top: 1px; }
        .header-chat-status.online { color: var(--tg-accent-color); }

        #chat-messages {
            flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
            background-image: radial-gradient(rgba(23, 33, 43, 0.25) 15%, transparent 16%); background-size: 16px 16px;
        }

        .message-wrapper { display: flex; width: 100%; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }

        .message {
            max-width: 75%; min-width: 70px; padding: 6px 10px 7px 10px; border-radius: 12px;
            font-size: 14.5px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; word-break: break-word;
        }
        .message.sent { background-color: var(--tg-msg-out); color: #ffffff; border-bottom-right-radius: 4px; }
        .message.received { background-color: var(--tg-msg-in); color: #f5f5f5; border-bottom-left-radius: 4px; }

        .message-meta { display: inline-flex; align-items: center; gap: 3px; float: right; margin: 3px -4px -4px 8px; align-self: flex-end; user-select: none; }
        .message-time { font-size: 10px; color: rgba(255, 255, 255, 0.5); }
        .message.received .message-time { color: var(--tg-text-secondary); }
        .status-ticks { display: flex; align-items: center; color: #4cd964; }
        .status-ticks svg { width: 12px; height: 12px; fill: currentColor; }

        /* Поле ввода сообщений */
        .chat-input-area {
            padding: 8px 12px; background-color: var(--tg-surface-color); border-top: 1px solid var(--tg-border-color);
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }
        .chat-input {
            flex: 1; background-color: var(--tg-bg-color); border: 1px solid var(--tg-border-color);
            border-radius: 19px; padding: 9px 15px; color: var(--tg-text-color); font-size: 15px; outline: none;
        }
        .send-btn {
            background: none; border: none; color: var(--tg-text-secondary); cursor: pointer;
            padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s ease;
        }
        .send-btn.active { color: var(--tg-accent-color); }

        .mention-link { color: #6fb1e4; text-decoration: none; cursor: pointer; font-weight: 500; }
        .tg-verify-icon { width: 14px; height: 14px; fill: var(--tg-verified); flex-shrink: 0; }

        /* Навигация главного меню */
        nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 56px;
            background-color: var(--tg-surface-color); border-top: 1px solid var(--tg-border-color);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--tg-text-secondary); font-size: 11px; cursor: pointer; height: 100%; gap: 2px; }
        .nav-item.active { color: var(--tg-accent-color); }
        .placeholder-screen { display: flex; justify-content: center; align-items: center; height: 100%; color: var(--tg-text-secondary); font-size: 15px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <div id="app-container">
        <header id="main-header">
            <span id="header-title" class="header-main-title">Чаты</span>
        </header>

        <div id="screen-chats" class="screen active">
            <div id="chats-list">
                </div>
        </div>

        <div id="chat-room">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">❮ Назад</button>
                <div class="header-user-info">
                    <div class="header-avatar" id="room-header-avatar">?</div>
                    <div class="header-text-container">
                        <span id="chat-room-title" class="header-chat-title">Чат</span>
                        <span id="chat-room-status" class="header-chat-status">обновление...</span>
                    </div>
                </div>
            </div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="message-field" class="chat-input" placeholder="Сообщение..." autocomplete="off" oninput="toggleSendButton(this)">
                <button id="send-btn-icon" class="send-btn" onclick="sendMessage()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div id="screen-contacts" class="screen"><div class="placeholder-screen">Список контактов пуст</div></div>
        <div id="screen-settings" class="screen"><div class="placeholder-screen">DICEGRAM v2.0 - База данных активна</div></div>

        <nav id="bottom-navigation">
            <div class="nav-item active" onclick="switchTab('chats', this)">
                <div style="font-size:20px;">💬</div><div>Чаты</div>
            </div>
            <div class="nav-item" onclick="switchTab('contacts', this)">
                <div style="font-size:20px;">👥</div><div>Контакты</div>
            </div>
            <div class="nav-item" onclick="switchTab('settings', this)">
                <div style="font-size:20px;">⚙️</div><div>Настройки</div>
            </div>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const SERVER_URL = "https://a38182-6d28.j.jrnm.app";
        const socket = io(SERVER_URL, { transports: ["websocket"], secure: true });

        let currentChatId = null;
        let myTelegramId = null;
        let activeChatsData = {}; // Локальный кэш структуры чатов из БД

        const tgUser = tg.initDataUnsafe?.user || {
            id: 123456789, first_name: "Локальный", last_name: "Тест", username: "test_dev"
        };
        myTelegramId = String(tgUser.id);

        socket.on('connect', () => {
            socket.emit('auth', tgUser, (response) => {
                if (response && response.status === 'ok') {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                }
            });
        });

        // Реалтайм-загрузка структуры чатов из базы данных SQLite
        socket.on('load_chats', (chats) => {
            const listContainer = document.getElementById('chats-list');
            listContainer.innerHTML = '';
            activeChatsData = {};

            chats.forEach(chat => {
                activeChatsData[chat.telegram_id] = chat;
                
                const timeStr = chat.timestamp ? new Date(chat.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                const unreadHtml = chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : '';
                const verifyHtml = chat.telegram_id === "0" ? `<svg class="tg-verify-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                
                const row = `
                    <div class="chat-item" id="chat-row-${chat.telegram_id}" onclick="openChat('${chat.telegram_id}', '${chat.first_name}', ${chat.telegram_id === '0'})">
                        <div class="chat-avatar">${chat.first_name.substring(0,2).toUpperCase()}</div>
                        <div class="chat-details">
                            <div class="chat-title-row">
                                <div class="chat-name">${chat.first_name} ${verifyHtml}</div>
                            </div>
                            <div class="chat-preview" id="preview-${chat.telegram_id}">${chat.last_msg || 'Нет сообщений'}</div>
                        </div>
                        <div class="chat-meta-column">
                            <span class="chat-time-label" id="time-${chat.telegram_id}">${timeStr}</span>
                            <div id="unread-container-${chat.telegram_id}">${unreadHtml}</div>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', row);
            });
        });

        // Реалтайм отслеживание изменений статусов пользователей (Online/Offline)
        socket.on('user_status_change', (data) => {
            if (activeChatsData[data.telegram_id]) {
                activeChatsData[data.telegram_id].status = data.status;
                activeChatsData[data.telegram_id].last_seen = data.last_seen;
            }
            if (currentChatId === data.telegram_id) {
                updateHeaderStatus(data.status, data.last_seen);
            }
        });

        socket.on('new_message', (msg) => {
            const partner = msg.sender_id === myTelegramId ? msg.receiver_id : msg.sender_id;
            
            // Если чат открыт — рендерим сообщение
            if (currentChatId === partner) {
                renderSingleMessage(msg);
                scrollToBottom();
                socket.emit('get_chat_history', { with_id: currentChatId }); // Сброс непрочитанных в БД
            }
        });

        function openChat(chatId, chatName, isVerified) {
            currentChatId = chatId;
            document.getElementById('bottom-navigation').style.display = 'none';
            document.getElementById('chat-room').style.display = 'flex';
            
            const titleEl = document.getElementById('chat-room-title');
            titleEl.innerText = chatName;
            if (isVerified) {
                titleEl.innerHTML = `${chatName} <svg class="tg-verify-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            }

            document.getElementById('room-header-avatar').innerText = chatName.substring(0,2).toUpperCase();
            
            // Установка статуса из кэша
            const cached = activeChatsData[chatId];
            if (cached) {
                updateHeaderStatus(cached.status, cached.last_seen);
            } else {
                updateHeaderStatus(chatId === '0' ? 'service' : 'offline', 'был(а) недавно');
            }

            // Очистка счетчика непрочитанных визуально
            const badge = document.getElementById(`unread-container-${chatId}`);
            if (badge) badge.innerHTML = '';

            // Запрос истории переписки
            socket.emit('get_chat_history', { with_id: chatId }, (history) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                if (history && Array.isArray(history)) {
                    history.forEach(msg => renderSingleMessage(msg));
                    scrollToBottom();
                }
            });
        }

        function updateHeaderStatus(status, lastSeen) {
            const statusEl = document.getElementById('chat-room-status');
            if (status === 'online') {
                statusEl.innerText = "в сети";
                statusEl.classList.add('online');
            } else if (status === 'service') {
                statusEl.innerText = "сервисный бот";
                statusEl.classList.remove('online');
            } else {
                statusEl.innerText = lastSeen || "был(а) недавно";
                statusEl.classList.remove('online');
            }
        }

        function closeChat() {
            document.getElementById('chat-room').style.display = 'none';
            document.getElementById('bottom-navigation').style.display = 'flex';
            currentChatId = null;
        }

        function renderSingleMessage(msg) {
            const container = document.getElementById('chat-messages');
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper');

            const msgEl = document.createElement('div');
            msgEl.classList.add('message');

            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let ticks = '';
            if (msg.sender_id === myTelegramId) {
                wrapper.classList.add('sent');
                msgEl.classList.add('sent');
                ticks = `<span class="status-ticks"><svg viewBox="0 0 24 24"><path d="M18 7l-1.41-1.41L10 12.17 7.41 9.59 6 11l4 4zm-4.24 0L12.35 5.59 6 11.94l1.41 1.41z"/></svg></span>`;
            } else {
                wrapper.classList.add('received');
                msgEl.classList.add('received');
            }

            msgEl.innerHTML = `
                <span>${formatText(msg.text)}</span>
                <div class="message-meta">
                    <span class="message-time">${timeStr}</span>
                    ${ticks}
                </div>
            `;
            wrapper.appendChild(msgEl);
            container.appendChild(wrapper);
        }

        function formatText(text) {
            return text.replace(/(@[a-zA-Z0-9_]{3,32})/g, `<span class="mention-link" onclick="handleMention('${text}')">$1</span>`);
        }

        function handleMention(username) {
            socket.emit('find_user', { username: username }, (res) => {
                if (res && res.status === 'found') {
                    openChat(res.user.telegram_id, res.user.first_name, false);
                } else {
                    alert("Пользователь не зарегистрирован в DICEGRAM.");
                }
            });
        }

        function toggleSendButton(input) {
            const btn = document.getElementById('send-btn-icon');
            if (input.value.trim().length > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function sendMessage() {
            const input = document.getElementById('message-field');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            socket.emit('send_message', { receiver_id: currentChatId, text: text }, (res) => {
                if (res && res.status === 'ok') {
                    renderSingleMessage(res.message);
                    scrollToBottom();
                }
            });
            input.value = '';
            document.getElementById('send-btn-icon').classList.remove('active');
            input.focus();
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`screen-${tab}`).classList.add('active');
            el.classList.add('active');
        }

        function scrollToBottom() {
            const c = document.getElementById('chat-messages');
            c.scrollTop = c.scrollHeight;
        }

        document.getElementById('message-field').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>

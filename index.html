<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICEGRAM</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
background:#1e293b;
padding:15px;
font-size:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.user{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#555;
}

.chat{
height:60vh;
overflow:auto;
}

.msg{
display:flex;
gap:8px;
margin:5px 0;
}

.msg img{
width:30px;
height:30px;
border-radius:50%;
}

.hidden{
display:none;
}

.profile{
text-align:center;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}
</style>
</head>

<body>

<div class="header">
DICEGRAM
<span onclick="openSettings()">⚙️</span>
</div>

<div class="container">

<div id="login">
<h3>Регистрация</h3>
<input id="name" placeholder="Имя">
<input id="avatar" placeholder="Ссылка на аватар">
<button onclick="register()">Создать аккаунт</button>
<div id="accounts"></div>
</div>

<div id="app" class="hidden">

<h3>Друзья</h3>
<div id="friends"></div>

<button onclick="openProfile()">Профиль</button>

</div>

<div id="chatPage" class="hidden">

<h3 id="chatName"></h3>

<div class="chat" id="chat"></div>

<input id="msgInput" placeholder="Сообщение">
<button onclick="sendMsg()">Отправить</button>

</div>

<div id="profilePage" class="hidden profile">

<img id="profileAvatar">
<h3 id="profileName"></h3>

<input id="newAvatar" placeholder="Новая аватарка">
<button onclick="changeAvatar()">Сменить аву</button>

<button onclick="back()">Назад</button>

</div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("dice_accounts")) || [];
let currentUser = null;
let chats = JSON.parse(localStorage.getItem("dice_chats")) || {};

function save(){
localStorage.setItem("dice_accounts",JSON.stringify(accounts));
localStorage.setItem("dice_chats",JSON.stringify(chats));
}

function register(){

if(accounts.length>=2){
alert("Можно только 2 аккаунта");
return;
}

let name=document.getElementById("name").value;
let avatar=document.getElementById("avatar").value;

let acc={
id:Date.now(),
name:name,
avatar:avatar,
friends:[]
};

accounts.push(acc);
save();
renderAccounts();

}

function renderAccounts(){

let div=document.getElementById("accounts");
div.innerHTML="";

accounts.forEach(a=>{
div.innerHTML+=`
<div class="user" onclick="login(${a.id})">
<img class="avatar" src="${a.avatar}">
${a.name}
</div>
`;
});

}

function login(id){

currentUser=accounts.find(a=>a.id==id);

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

renderFriends();

}

function renderFriends(){

let div=document.getElementById("friends");
div.innerHTML="";

accounts.forEach(a=>{

if(a.id!==currentUser.id){

div.innerHTML+=`
<div class="user" onclick="openChat(${a.id})">
<img class="avatar" src="${a.avatar}">
${a.name}
</div>
`;

}

});

}

let chatUser=null;

function openChat(id){

chatUser=accounts.find(a=>a.id==id);

document.getElementById("app").classList.add("hidden");
document.getElementById("chatPage").classList.remove("hidden");

document.getElementById("chatName").innerText=chatUser.name;

renderChat();

}

function renderChat(){

let chatId=[currentUser.id,chatUser.id].sort().join("_");

let messages=chats[chatId]||[];

let div=document.getElementById("chat");

div.innerHTML="";

messages.forEach(m=>{

div.innerHTML+=`
<div class="msg">
<img src="${m.avatar}">
<div>${m.text}</div>
</div>
`;

});

}

function sendMsg(){

let text=document.getElementById("msgInput").value;

let chatId=[currentUser.id,chatUser.id].sort().join("_");

if(!chats[chatId])chats[chatId]=[];

chats[chatId].push({
text:text,
avatar:currentUser.avatar
});

save();
renderChat();

document.getElementById("msgInput").value="";

}

function openProfile(){

document.getElementById("app").classList.add("hidden");
document.getElementById("profilePage").classList.remove("hidden");

document.getElementById("profileAvatar").src=currentUser.avatar;
document.getElementById("profileName").innerText=currentUser.name;

}

function changeAvatar(){

let newAva=document.getElementById("newAvatar").value;

currentUser.avatar=newAva;

save();

document.getElementById("profileAvatar").src=newAva;

}

function back(){

document.getElementById("profilePage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

}

function openSettings(){
alert("Настройки скоро будут");
}

renderAccounts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DICE MESSAGE — современный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #0a0c10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Основной контейнер как в десктопном приложении */
        .messenger {
            width: 1400px;
            max-width: 98vw;
            height: 95vh;
            max-height: 95vh;
            background: #111214;
            border-radius: 28px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }

        /* ===== SIDEBAR (список чатов) ===== */
        .sidebar {
            width: 320px;
            background: #0f1115;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar-header h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e6b422, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h2::before {
            content: "🎲";
            font-size: 1.8rem;
            background: none;
            -webkit-background-clip: unset;
            color: #e6b422;
        }

        .profile-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
            padding: 8px 4px;
        }

        .profile-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #2a2e3a, #1e2129);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-info .name {
            font-weight: 600;
            color: #f0f0f0;
        }

        .profile-info .status {
            font-size: 0.75rem;
            color: #6c8a5e;
        }

        /* список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 18px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .chat-item.active {
            background: rgba(230, 180, 34, 0.12);
            border-left: 3px solid #e6b422;
        }

        .chat-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.04);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background: #1f232c;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: #eef2ff;
            display: flex;
            justify-content: space-between;
        }

        .chat-lastmsg {
            font-size: 0.8rem;
            color: #8e93a5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.7rem;
            color: #5e647a;
        }

        /* ===== MAIN CHAT AREA ===== */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0b0d12;
            position: relative;
        }

        .chat-header {
            padding: 18px 24px;
            background: rgba(15, 17, 21, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            background: #2b2e3b;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .chat-header-info h3 {
            font-weight: 600;
            color: white;
            font-size: 1.2rem;
        }

        .chat-header-info p {
            font-size: 0.75rem;
            color: #7c8a6e;
        }

        /* сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        /* стили сообщений */
        .message {
            display: flex;
            max-width: 75%;
            animation: fadeSlideUp 0.2s ease-out;
        }

        .message.outgoing {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            max-width: 100%;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.1);
        }

        .outgoing .bubble {
            background: #e6b422;
            color: #121212;
            border-bottom-right-radius: 6px;
            font-weight: 500;
        }

        .incoming .bubble {
            background: #20242e;
            color: #eef2ff;
            border-bottom-left-radius: 6px;
        }

        .message-meta {
            font-size: 0.65rem;
            margin-top: 4px;
            margin-left: 12px;
            margin-right: 12px;
            color: #7e849b;
            display: flex;
            gap: 8px;
        }

        .outgoing .message-meta {
            justify-content: flex-end;
        }

        /* индикатор печати бота */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #20242e;
            width: fit-content;
            border-radius: 28px;
            margin-top: 8px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #b9c4e6;
            border-radius: 50%;
            display: inline-block;
            animation: typingWave 1.3s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingWave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* поле ввода */
        .input-area {
            padding: 16px 20px 24px;
            background: #0b0d12;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attach-btn {
            background: #1e2129;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #d4d9ff;
        }

        .attach-btn:hover {
            background: #2f3542;
            transform: scale(0.96);
        }

        .message-input {
            flex: 1;
            background: #1a1d26;
            border: none;
            border-radius: 32px;
            padding: 12px 18px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .message-input:focus {
            background: #222734;
            box-shadow: 0 0 0 2px rgba(230, 180, 34, 0.4);
        }

        .send-btn {
            background: #e6b422;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #121212;
            font-weight: bold;
        }

        .send-btn:hover {
            background: #f0c14b;
            transform: scale(0.96);
        }

        /* анимация сообщений */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* скролл */
        .messages-area::-webkit-scrollbar, .chats-list::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #3a3f4e;
            border-radius: 10px;
        }

        /* адаптив для мобильных */
        @media (max-width: 720px) {
            .sidebar {
                width: 80px;
                transition: width 0.2s;
            }
            .sidebar .chat-info, .sidebar .profile-info .status, .sidebar .profile-info .name {
                display: none;
            }
            .sidebar .chat-item {
                justify-content: center;
                padding: 12px 0;
            }
            .sidebar-header h2 span {
                display: none;
            }
            .sidebar-header h2::before {
                margin: 0 auto;
            }
            .profile-badge .profile-info {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="messenger">
    <!-- Боковая панель: список чатов -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><span>DICE MESSAGE</span></h2>
            <div class="profile-badge">
                <div class="profile-avatar">🎲</div>
                <div class="profile-info">
                    <div class="name">Алексей</div>
                    <div class="status">✧ онлайн</div>
                </div>
            </div>
        </div>
        <div class="chats-list" id="chatsList">
            <!-- Динамически отрисованные чаты (но можно статичные) -->
        </div>
    </div>

    <!-- Центральная область чата -->
    <div class="main-chat">
        <div class="chat-header">
            <div class="chat-header-avatar" id="currentChatAvatar">🎲</div>
            <div class="chat-header-info">
                <h3 id="currentChatName">Dice Assistant</h3>
                <p id="currentChatStatus">онлайн · обычно отвечает мгновенно</p>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <!-- Приветственное сообщение от бота -->
            <div class="message incoming">
                <div class="bubble">
                    🎲 Привет! Я DiceBot. Кидай любые сообщения — я отвечу с имитацией броска кубика или просто поддержу беседу.
                </div>
                <div class="message-meta">DiceBot • только что</div>
            </div>
        </div>
        <div class="input-area">
            <button class="attach-btn" id="attachBtn" title="Прикрепить файл (демо-уведомление)">📎</button>
            <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
    // ---------- ДАННЫЕ ЧАТОВ (имитация нескольких диалогов, но основной активный чат только один для упрощения,
    // однако сделаем полноценный UI с переключением, история сообщений для каждого чата ----------
    // Для демонстрации полноты — создадим три чата, но основной мессенджер будет вести диалог с ботом в каждом чате независимо.
    // Сохраняем сообщения по chatId.
    const chatsData = {
        chat1: {
            id: 'chat1',
            name: 'Dice Assistant',
            avatar: '🎲',
            lastMsg: 'Кидай кубик!',
            lastTime: 'сейчас',
            status: 'онлайн',
            messages: [
                { id: 'init1', text: '🎲 Привет! Я DiceBot. Кидай любые сообщения — я отвечу с имитацией броска кубика или просто поддержу беседу.', sender: 'bot', timestamp: new Date() }
            ]
        },
        chat2: {
            id: 'chat2',
            name: 'Игровой клуб',
            avatar: '🎯',
            lastMsg: 'Ждём твой ход!',
            lastTime: '10:42',
            status: 'был(а) недавно',
            messages: [
                { id: 'init2', text: 'Добро пожаловать в Игровой клуб! Бросай кости 🎲', sender: 'bot', timestamp: new Date() }
            ]
        },
        chat3: {
            id: 'chat3',
            name: 'Случайные мысли',
            avatar: '💭',
            lastMsg: 'Поделись идеей',
            lastTime: 'вчера',
            status: 'в сети',
            messages: [
                { id: 'init3', text: 'Здесь можно обсудить всё что угодно. Я всегда рядом ✨', sender: 'bot', timestamp: new Date() }
            ]
        }
    };

    let currentChatId = 'chat1';      // активный чат
    let botTimeout = null;             // таймер ответа бота
    let isBotTyping = false;           // флаг, чтобы не накладывать ответы

    // DOM элементы
    const messagesContainer = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const chatsListEl = document.getElementById('chatsList');
    const currentChatNameSpan = document.getElementById('currentChatName');
    const currentChatAvatarSpan = document.getElementById('currentChatAvatar');
    const currentChatStatusSpan = document.getElementById('currentChatStatus');

    // Функция рендера списка чатов (обновляет last message и время)
    function renderChatsList() {
        chatsListEl.innerHTML = '';
        for (const [id, chat] of Object.entries(chatsData)) {
            const lastMsg = chat.messages.length > 0 ? chat.messages[chat.messages.length - 1].text : 'Нет сообщений';
            const shortLastMsg = lastMsg.length > 28 ? lastMsg.slice(0, 28) + '...' : lastMsg;
            const lastTime = getLastMessageTime(chat.messages);
            const chatDiv = document.createElement('div');
            chatDiv.className = `chat-item ${currentChatId === id ? 'active' : ''}`;
            chatDiv.setAttribute('data-chat-id', id);
            chatDiv.innerHTML = `
                <div class="chat-avatar">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name)}</div>
                    <div class="chat-lastmsg">${escapeHtml(shortLastMsg)}</div>
                </div>
                <div class="chat-time">${lastTime}</div>
            `;
            chatDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                switchChat(id);
            });
            chatsListEl.appendChild(chatDiv);
        }
    }

    function getLastMessageTime(messagesArr) {
        if (!messagesArr.length) return '';
        const lastMsg = messagesArr[messagesArr.length-1];
        if (lastMsg.timestamp) {
            const date = new Date(lastMsg.timestamp);
            const hours = date.getHours().toString().padStart(2,'0');
            const minutes = date.getMinutes().toString().padStart(2,'0');
            return `${hours}:${minutes}`;
        }
        return '--:--';
    }

    // переключение чата с очисткой таймера бота
    function switchChat(newChatId) {
        if (currentChatId === newChatId) return;
        // сбросить ожидание бота при переключении
        if (botTimeout) {
            clearTimeout(botTimeout);
            botTimeout = null;
        }
        // убираем индикатор печати если был
        removeTypingIndicator();
        currentChatId = newChatId;
        // обновить заголовок
        const chat = chatsData[currentChatId];
        currentChatNameSpan.innerText = chat.name;
        currentChatAvatarSpan.innerText = chat.avatar;
        currentChatStatusSpan.innerText = chat.status;
        // перерисовать сообщения
        renderMessages();
        renderChatsList();
        scrollMessagesToBottom();
    }

    // отобразить сообщения текущего чата
    function renderMessages() {
        messagesContainer.innerHTML = '';
        const messages = chatsData[currentChatId].messages;
        messages.forEach(msg => {
            appendMessageElement(msg.text, msg.sender === 'user' ? 'outgoing' : 'incoming', msg.timestamp, false);
        });
        scrollMessagesToBottom();
    }

    // вспомогательная функция добавления элемента сообщения (без записи в массив, только отрисовка)
    function appendMessageElement(text, type, timestamp, scroll = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }) : new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        messageDiv.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="message-meta">${type === 'outgoing' ? 'Вы' : 'DiceBot'} • ${timeStr}</div>
        `;
        messagesContainer.appendChild(messageDiv);
        if (scroll) scrollMessagesToBottom();
    }

    // запись сообщения в историю текущего чата + отрисовка
    function addMessageToChat(chatId, text, sender, timestamp = new Date()) {
        const chat = chatsData[chatId];
        if (!chat) return;
        const newMsg = {
            id: Date.now() + Math.random() + sender,
            text: text,
            sender: sender,
            timestamp: timestamp
        };
        chat.messages.push(newMsg);
        // обновить lastMsg в UI чатов
        renderChatsList();
        if (chatId === currentChatId) {
            appendMessageElement(text, sender === 'user' ? 'outgoing' : 'incoming', timestamp, true);
        }
        // авто-скролл
        if (chatId === currentChatId) scrollMessagesToBottom();
    }

    // Удалить индикатор печати
    function removeTypingIndicator() {
        const existingIndicator = document.querySelector('.typing-indicator');
        if (existingIndicator) existingIndicator.remove();
        isBotTyping = false;
    }

    function showTypingIndicator() {
        if (!isBotTyping && currentChatId) {
            removeTypingIndicator();
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'typing-indicator incoming';
            indicatorDiv.id = 'botTypingIndicator';
            indicatorDiv.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicatorDiv);
            scrollMessagesToBottom();
            isBotTyping = true;
        }
    }

    // Имитация ответа бота (с интеллектуальными фразами, связанными с DICE)
    function generateBotReply(userMessage) {
        const lowerMsg = userMessage.toLowerCase();
        if (lowerMsg.includes('кубик') || lowerMsg.includes('бросок') || lowerMsg.includes('дайс') || lowerMsg.includes('dice')) {
            const diceRoll = Math.floor(Math.random() * 6) + 1;
            return `🎲 Выпало число ${diceRoll}! ${diceRoll === 6 ? 'Критический успех! 🔥' : diceRoll === 1 ? 'Ой, единица... Попробуйте еще раз 😅' : 'Отличный бросок!'}`;
        } else if (lowerMsg.includes('привет') || lowerMsg.includes('здравствуй')) {
            return `🎲 Привет-привет! Кидай кубик или задавай вопросы. Я всегда на связи ✨`;
        } else if (lowerMsg.includes('как дела')) {
            return `🎲 У меня всё отлично! Генерирую случайности и жду твоих сообщений 🎲`;
        } else if (lowerMsg.includes('помощь') || lowerMsg.includes('help')) {
            return `📌 Просто напиши что-нибудь, и я отвечу. Скажи "кубик" — и я сгенерирую число! Также можешь прикреплять файлы (демо-режим).`;
        } else {
            const funnyReplies = [
                `🎲 Интересно! А если бросить кубик? У тебя есть шанс 1/6 на удачу.`,
                `📩 Принято! (имитация обработки) Могу сгенерировать случайное число: ${Math.floor(Math.random()*100)+1}`,
                `🎯 Твое сообщение записано в "Ленту событий". Хочешь сыграть в кости?`,
                `✨ Ответ бота: твое сообщение — это новый бросок судьбы! Попробуй сказать "кубик"`,
                `💬 DiceBot получил данные. Продолжай общение, я всегда рядом. 🎲`
            ];
            return funnyReplies[Math.floor(Math.random() * funnyReplies.length)];
        }
    }

    // запуск ответа бота с задержкой
    function requestBotResponse(userText, chatId) {
        if (botTimeout) clearTimeout(botTimeout);
        // Удаляем старый индикатор печати, если был
        removeTypingIndicator();
        // Показываем что бот печатает
        if (chatId === currentChatId) {
            showTypingIndicator();
        }
        botTimeout = setTimeout(() => {
            // убедиться, что чат не переключился во время ожидания
            if (chatId === currentChatId) {
                removeTypingIndicator();
            }
            const replyText = generateBotReply(userText);
            addMessageToChat(chatId, replyText, 'bot', new Date());
            if (chatId === currentChatId) {
                scrollMessagesToBottom();
            }
            botTimeout = null;
            isBotTyping = false;
        }, 1200 + Math.random() * 800); // от 1.2 до 2 секунд имитация
    }

    // Отправка сообщения от пользователя
    function sendMessage() {
        const text = messageInput.value.trim();
        if (text === "") return;

        // предотвращаем множественные отправки во время ответа бота, но разрешаем цепочку
        if (botTimeout && isBotTyping) {
            // Не прерываем старый таймер, но даём отправить новое сообщение — мессенджеры так работают
            // Старый ответ всё равно выведется, но создаст новую цепочку.
        }
        // Добавляем сообщение пользователя
        addMessageToChat(currentChatId, text, 'user', new Date());
        messageInput.value = '';
        messageInput.focus();

        // Если в текущем чате уже есть таймер ответа бота, мы не должны его перезаписывать, а просто следующий ответ запустится после ответа на предыдущий?
        // Однако для полной имитации диалога: после каждого сообщения пользователя бот отвечает. Но если уже есть ожидающий ответ, очистим старый и начнем новый
        // чтобы избежать конфликта множества таймеров (лучше отменить предыдущий запрос бота, чтобы сообщения шли последовательно)
        if (botTimeout) {
            clearTimeout(botTimeout);
            botTimeout = null;
            removeTypingIndicator();
            isBotTyping = false;
        }
        // Запускаем ответ бота
        requestBotResponse(text, currentChatId);
    }

    // скролл вниз плавно
    function scrollMessagesToBottom() {
        setTimeout(() => {
            if (messagesContainer) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }, 30);
    }

    // обработчик для Enter + кнопки
    function onEnterHandler(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    // имитация прикрепления файла (уведомление)
    function handleAttach() {
        alert('📎 Функция прикрепления файлов в демо-режиме. Вы можете отправить сообщение, а бот ответит!');
        // дополнительно можно добавить всплывающее сообщение в чат от системы, но это не обязательно
        const mockSystem = '🔔 Система: функция вложений будет доступна в следующей версии.';
        // но добавим лучше в чат системное уведомление (необязательно)
        addMessageToChat(currentChatId, mockSystem, 'bot', new Date());
    }

    // безопасное экранирование
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // инициализация интерфейса
    function init() {
        renderChatsList();
        // установка активного чата по умолчанию
        const defaultChat = chatsData[currentChatId];
        currentChatNameSpan.innerText = defaultChat.name;
        currentChatAvatarSpan.innerText = defaultChat.avatar;
        currentChatStatusSpan.innerText = defaultChat.status;
        renderMessages();

        // события
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', onEnterHandler);
        attachBtn.addEventListener('click', handleAttach);
        messageInput.focus();
        scrollMessagesToBottom();
    }

    init();
</script>
</body>
</html>

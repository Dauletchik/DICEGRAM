<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --blue: #5288c1; --text: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }
        .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        h1 { color: var(--blue); margin-bottom: 20px; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: var(--panel); color: white; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 15px; background: var(--blue); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        
        /* Главный экран */
        .header { width: 100%; background: var(--panel); padding: 15px; text-align: center; border-bottom: 1px solid #000; font-weight: bold; }
        .chat-item { width: 100%; padding: 15px; background: var(--panel); border-bottom: 1px solid #0e1621; display: flex; align-items: center; }
        .avatar { width: 40px; height: 40px; background: var(--blue); border-radius: 50%; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen active">
        <h1>DICEGRAM</h1>
        <button class="btn" onclick="showScreen('reg-screen')">Зарегистрироваться</button>
        <button class="btn" style="background:#242f3d; margin-top:10px;" onclick="showScreen('login-screen')">Войти</button>
    </div>

    <div id="reg-screen" class="screen">
        <h2>Регистрация</h2>
        <input type="tel" id="reg-phone" placeholder="Номер (например 707...)">
        <button class="btn" id="reg-next-btn" onclick="handleRegNext()">Далее</button>
        <button style="background:none; border:none; color:gray; margin-top:15px;" onclick="showScreen('welcome-screen')">Назад</button>
    </div>

    <div id="reg-final-screen" class="screen">
        <h2>Почти готово</h2>
        <input type="password" id="reg-pass" placeholder="Придумайте пароль">
        <input type="text" id="reg-name" placeholder="Ваше имя">
        <button class="btn" id="reg-finish-btn" onclick="handleRegFinish()">Завершить</button>
    </div>

    <div id="login-screen" class="screen">
        <h2>Войти</h2>
        <input type="tel" id="login-phone" placeholder="Номер телефона">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button class="btn" id="login-btn" onclick="handleLogin()">Войти</button>
        <button style="background:none; border:none; color:gray; margin-top:15px;" onclick="showScreen('welcome-screen')">Назад</button>
    </div>

    <div id="main-screen" class="screen" style="justify-content: flex-start; padding:0;">
        <div class="header">DICEGRAM</div>
        <div id="chat-list" style="width:100%;"></div>
        <button onclick="logout()" style="margin-top:20px; color:red; background:none; border:none;">Выйти</button>
    </div>

    <script>
        // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ИЗ FIREBASE!
        const firebaseConfig = {
            databaseURL: "ТВОЯ_ССЫЛКА_ТУТ" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Логика кнопки "Далее" при регистрации
        function handleRegNext() {
            const phone = document.getElementById('reg-phone').value.trim();
            if (!phone) return alert("Введи номер!");

            const btn = document.getElementById('reg-next-btn');
            btn.disabled = true;
            btn.innerText = "Проверка...";

            db.ref('users/' + phone).once('value')
                .then(snap => {
                    btn.disabled = false;
                    btn.innerText = "Далее";
                    if (snap.exists()) {
                        alert("Этот номер уже занят! Попробуй войти.");
                    } else {
                        window.userPhone = phone;
                        showScreen('reg-final-screen');
                    }
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerText = "Далее";
                    alert("Ошибка БД! Проверь ссылку databaseURL и правила Rules.");
                });
        }

        // Финальная регистрация
        function handleRegFinish() {
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            if (!pass || !name) return alert("Заполни всё!");

            db.ref('users/' + window.userPhone).set({
                name: name,
                pass: pass
            }).then(() => {
                localStorage.setItem('dice_user', window.userPhone);
                enterApp("Добро пожаловать!");
            });
        }

        // Логика входа
        function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            db.ref('users/' + phone).once('value').then(snap => {
                btn.disabled = false;
                if (snap.exists() && snap.val().pass === pass) {
                    localStorage.setItem('dice_user', phone);
                    enterApp("С возвращением!");
                } else {
                    alert("Неверный номер или пароль!");
                }
            }).catch(() => {
                btn.disabled = false;
                alert("Ошибка связи с базой.");
            });
        }

        function enterApp(msg) {
            showScreen('main-screen');
            document.getElementById('chat-list').innerHTML = `
                <div class="chat-item">
                    <div class="avatar"></div>
                    <div>
                        <b>DICEGRAM Official</b><br>
                        <small style="color:gray">${msg}</small>
                    </div>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('dice_user');
            location.reload();
        }

        // Авто-вход
        window.onload = () => {
            const saved = localStorage.getItem('dice_user');
            if (saved) {
                db.ref('users/' + saved).once('value').then(snap => {
                    if (snap.exists()) enterApp("Вы в системе!");
                });
            }
        };
    </script>
</body>
</html>

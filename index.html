<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Онлайн Бутылочка Мультиплеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #141416;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
        }
        .game-header {
            text-align: center;
            padding: 10px;
            background: #1c1c1e;
            border-bottom: 1px solid #2c2c2e;
            z-index: 110;
        }
        .status-msg {
            font-size: 16px;
            font-weight: bold;
            color: #ffd32a;
            min-height: 20px;
        }
        .board-container {
            position: relative;
            width: 100%;
            height: 50vh; 
            background-color: #d1b894; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .bottle-node {
            position: absolute;
            width: 45px;
            height: 135px;
            top: calc(50% - 67.5px);
            left: calc(50% - 22.5px);
            z-index: 100;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 3.8s cubic-bezier(0.2, 1, 0.2, 1), opacity 0.4s;
            transform: rotate(0deg);
        }
        .bottle-node.hidden { opacity: 0; pointer-events: none; }
        .bottle-img { width: 100%; height: 100%; filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.5)); }

        /* Игровые ячейки по периметру стола */
        .grid-player {
            position: absolute;
            width: 65px;
            height: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            opacity: 0.3; /* Тусклые, если пустые */
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s;
        }
        .grid-player.occupied { opacity: 1; }
        .square-avatar {
            width: 52px;
            height: 52px;
            background: #34495e;
            border-radius: 12px; 
            border: 3px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .grid-player.active-spinner .square-avatar { border-color: #ffd32a; box-shadow: 0 0 12px #ffd32a; }
        .grid-player.active-target .square-avatar { border-color: #ff4757; box-shadow: 0 0 12px #ff4757; }
        
        .meta-name {
            font-size: 10px;
            color: #1e1e24; 
            font-weight: bold;
            margin-top: 3px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Позиционирование 12 мест */
        #user-p0 { top: 12px; left: 8%; }
        #user-p1 { top: 12px; left: 32%; }
        #user-p2 { top: 12px; left: 58%; }
        #user-p3 { top: 12px; left: 82%; }
        #user-p4 { top: 35%; right: 8%; }
        #user-p5 { top: 62%; right: 8%; }
        #user-p6 { bottom: 12px; left: 82%; }
        #user-p7 { bottom: 12px; left: 58%; }
        #user-p8 { bottom: 12px; left: 32%; }
        #user-p9 { bottom: 12px; left: 8%; }
        #user-p10 { top: 62%; left: 8%; }
        #user-p11 { top: 35%; left: 8%; }

        .vote-bubble {
            position: absolute;
            top: -22px;
            background: #ffffff;
            color: #000000;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 150;
        }

        /* Кнопки выбора поцелуев */
        .choice-panel-box {
            position: absolute;
            bottom: 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 200;
            width: 100%;
        }
        .choice-txt {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(0,0,0,0.85);
            padding: 5px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .choice-row-btns { display: flex; gap: 20px; }
        .act-btn {
            width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 24px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .btn-heart { background: #2ecc71; color: white; }
        .btn-cross { background: #e74c3c; color: white; }

        /* Чат секция */
        .chat-section {
            flex: 1; background: #1c1c1e; border-top: 2px solid #2c2c2e;
            display: flex; flex-direction: column; justify-content: space-between; height: 38vh;
        }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-row { display: flex; align-items: flex-start; gap: 8px; }
        .chat-mini-avatar {
            width: 28px; height: 28px; border-radius: 50%; background: #485e74;
            display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
        }
        .chat-body-text { background: #2c2c2e; padding: 6px 10px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .chat-sender-name { font-weight: bold; color: #ff9f43; margin-right: 5px; }
        .chat-input-bar { display: flex; padding: 8px; background: #141416; gap: 8px; }
        .chat-input-field {
            flex: 1; background: #2c2c2e; border: 1px solid #3a3a3c;
            border-radius: 20px; padding: 10px 15px; color: white; font-size: 14px; outline: none;
        }
        .chat-submit-btn {
            width: 38px; height: 38px; background: #ff4757; border: none;
            border-radius: 50%; color: white; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .fx-heart {
            position: absolute; font-size: 26px; animation: fly 1s ease-out forwards; pointer-events: none; z-index: 300;
        }
        @keyframes fly {
            0% { transform: translate(0,0) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="status-msg" id="game-status-label">Подключение к серверу стола...</div>
    </div>

    <div class="board-container" id="board">
        <div class="bottle-node" id="bottle" onclick="clientRequestSpin()">
            <svg class="bottle-img" viewBox="0 0 100 300" xmlns="http://www.w3.org/2000/svg">
                <path d="M42,15 L58,15 L58,65 L42,65 Z" fill="#1b4d3e" stroke="#0d261f" stroke-width="3"/>
                <path d="M42,65 C22,95 22,115 22,145 L22,265 C22,278 32,288 50,288 C68,288 78,278 78,265 L78,145 C78,115 78,95 58,65 Z" fill="#2c6b56" stroke="#0d261f" stroke-width="4"/>
                <rect x="27" y="135" width="46" height="50" rx="4" fill="#e74c3c"/>
                <circle cx="50" cy="160" r="10" fill="#ffffff"/>
            </svg>
        </div>

        <div class="grid-player" id="user-p0"><div class="vote-bubble" id="b-0"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p1"><div class="vote-bubble" id="b-1"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p2"><div class="vote-bubble" id="b-2"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p3"><div class="vote-bubble" id="b-3"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p4"><div class="vote-bubble" id="b-4"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p5"><div class="vote-bubble" id="b-5"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p6"><div class="vote-bubble" id="b-6"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p7"><div class="vote-bubble" id="b-7"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p8"><div class="vote-bubble" id="b-8"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p9"><div class="vote-bubble" id="b-9"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p10"><div class="vote-bubble" id="b-10"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>
        <div class="grid-player" id="user-p11"><div class="vote-bubble" id="b-11"></div><div class="square-avatar">🪑</div><div class="meta-name">Свободно</div></div>

        <div class="choice-panel-box" id="kiss-ui-panel">
            <div class="choice-txt" id="kiss-ui-title">Поцеловать?</div>
            <div class="choice-row-btns">
                <button class="act-btn btn-heart" onclick="sendAction(true)">❤️</button>
                <button class="act-btn btn-cross" onclick="sendAction(false)">❌</button>
            </div>
        </div>
    </div>

    <div class="chat-section">
        <div class="chat-messages" id="chat-box"></div>
        <div class="chat-input-bar">
            <input type="text" class="chat-input-field" id="chat-input" placeholder="Написать сообщение..." onkeypress="handleChatKey(event)">
            <button class="chat-submit-btn" onclick="sendChatMessage()">➔</button>
        </div>
    </div>

    <script>
        // УКАЖИТЕ АДРЕС ВАШЕГО ЗАПУЩЕННОГО БОТА/БЭКЕНДА
        const BACKEND_URL = "https://a38182-6d28.j.jrnm.app";
 
        
        const socket = io(BACKEND_URL);
        const tg = window.Telegram.WebApp;
        
        let myNickname = "@Player";
        let myAvatar = "👑";
        let myAssignedSeat = null;
        let isMyTurn = false;
        let localRotation = 0;

        if (tg) {
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                myNickname = `@${user.username || user.first_name}`;
                myAvatar = ["😎","🔥","✨","🍀","🎲"][Math.floor(Math.random() * 5)];
            }
        }

        socket.on("connect", () => {
            document.getElementById('game-status-label').innerText = "Вход за игровой стол...";
            socket.emit("join_table", { username: myNickname, avatar: myAvatar });
        });

        socket.on("join_response", (data) => {
            if (data.status === "spectator") {
                document.getElementById('game-status-label').innerText = "Все места заняты. Вы в режиме зрителя.";
                myAssignedSeat = null;
            } else {
                myAssignedSeat = data.seat;
            }
        });

        socket.on("table_update", (data) => {
            const seats = data.seats;
            const currentTurn = data.current_turn;
            const state = data.game_state;

            // Сброс визуального отображения мест
            for (let i = 0; i < 12; i++) {
                const node = document.getElementById(`user-p${i}`);
                const pData = seats[i];
                if (pData) {
                    node.classList.add('occupied');
                    node.querySelector('.square-avatar').innerText = pData.avatar;
                    node.querySelector('.meta-name').innerText = pData.name;
                } else {
                    node.classList.remove('occupied', 'active-spinner', 'active-target');
                    node.querySelector('.square-avatar').innerText = "🪑";
                    node.querySelector('.meta-name').innerText = "Свободно";
                    node.style.transform = "translate(0,0)";
                }
            }

            if (state === "WAITING") {
                document.getElementById('game-status-label').innerText = "Ожидание реальных игроков (минимум 2)...";
                isMyTurn = false;
                return;
            }

            // Установка активного ходящего
            for (let i = 0; i < 12; i++) {
                document.getElementById(`user-p${i}`).classList.remove('active-spinner', 'active-target');
                const bubble = document.getElementById(`b-${i}`);
                if(state !== "INTERACTION") bubble.style.display = 'none';
            }

            const currentSpinner = seats[currentTurn];
            if (currentSpinner) {
                document.getElementById(`user-p${currentTurn}`).classList.add('active-spinner');
                
                if (myAssignedSeat === currentTurn) {
                    document.getElementById('game-status-label').innerText = "Ваш ход! Нажмите на бутылочку!";
                    isMyTurn = true;
                } else {
                    document.getElementById('game-status-label').innerText = `Ходит ${currentSpinner.name}`;
                    isMyTurn = false;
                }
            }

            if (state === "IDLE") {
                document.getElementById('bottle').classList.remove('hidden');
                document.getElementById('kiss-ui-panel').style.display = 'none';
            }
        });

        function clientRequestSpin() {
            if (!isMyTurn) return;
            isMyTurn = false;
            socket.emit("request_spin");
        }

        socket.on("bottle_spin_command", (data) => {
            document.getElementById('game-status-label').innerText = "Бутылочка крутится...";
            const bottle = document.getElementById('bottle');
            
            const extraRotations = 2160; 
            localRotation += extraRotations + data.target_angle - (localRotation % 360);
            bottle.style.transform = `rotate(${localRotation}deg)`;

            // По завершении кручения плавно сближаем игроков в центре
            setTimeout(() => {
                socket.emit("trigger_interaction_phase", {});

                document.getElementById(`user-p${data.target_seat}`).classList.add('active-target');
                bottle.classList.add('hidden');

                // Плавное сдвижение аватарок в центр стола
                const spinnerNode = document.getElementById(`user-p${data.spinner_seat}`);
                const targetNode = document.getElementById(`user-p${data.target_seat}`);
                const rectBoard = document.getElementById('board').getBoundingClientRect();
                
                const sRect = spinnerNode.getBoundingClientRect();
                const tRect = targetNode.getBoundingClientRect();
                const cX = rectBoard.width / 2;
                const cY = rectBoard.height / 2;

                const sDx = cX - (sRect.left - rectBoard.left + sRect.width / 2) - 40;
                const sDy = cY - (sRect.top - rectBoard.top + sRect.height / 2);
                const tDx = cX - (tRect.left - rectBoard.left + tRect.width / 2) + 40;
                const tDy = cY - (tRect.top - rectBoard.top + tRect.height / 2);

                spinnerNode.style.transform = `translate(${sDx}px, ${sDy}px)`;
                targetNode.style.transform = `translate(${tDx}px, ${tDy}px)`;

                // Показываем плашку кнопок тем, кто участвует в событии
                if (myAssignedSeat === data.spinner_seat || myAssignedSeat === data.target_seat) {
                    document.getElementById('kiss-ui-title').innerText = "Ваш выбор:";
                    document.getElementById('kiss-ui-panel').style.display = 'flex';
                }
            }, 3900);
        });

        function sendAction(choice) {
            document.getElementById('kiss-ui-panel').style.display = 'none';
            socket.emit("submit_choice", { choice: choice });
        }

        socket.on("round_result", (data) => {
            revealLocalBubble(data.spinner_seat, data.spinner_choice);
            revealLocalBubble(data.target_seat, data.target_choice);

            if (data.success) {
                document.getElementById('game-status-label').innerText = "Взаимный поцелуй! 😘";
                generateScreenHearts();
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                document.getElementById('game-status-label').innerText = "Поцелуй не состоялся... 💔";
            }
        });

        function revealLocalBubble(seat, isYes) {
            const b = document.getElementById(`b-${seat}`);
            if (!b) return;
            b.innerText = isYes ? "❤️ Да" : "❌ Нет";
            b.style.background = isYes ? "#2ecc71" : "#e74c3c";
            b.style.color = "#ffffff";
            b.style.display = "block";
        }

        /* Системный онлайн чат */
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if (!txt) return;
            socket.emit("send_chat_msg", { text: txt });
            input.value = "";
        }

        socket.on("chat_msg_receive", (data) => {
            const chatBox = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = 'chat-row';
            row.innerHTML = `
                <div class="chat-mini-avatar">${data.avatar}</div>
                <div class="chat-body-text">
                    <span class="chat-sender-name">${data.name}:</span>${data.text}
                </div>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function handleChatKey(e) { if (e.key === 'Enter') sendChatMessage(); }

        function generateScreenHearts() {
            const board = document.getElementById('board');
            for (let i = 0; i < 10; i++) {
                const h = document.createElement('div');
                h.className = 'fx-heart';
                h.innerText = '❤️';
                h.style.left = 'calc(50% - 13px)';
                h.style.top = 'calc(50% - 13px)';
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 80;
                h.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                h.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                board.appendChild(h);
                setTimeout(() => h.remove(), 1000);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Clone | Общайся свободно</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель (чаты) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info" id="userInfo">
                    <div class="avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <span class="username" id="sidebarUsername">Гость</span>
                        <span class="status">онлайн</span>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="newChatBtn" title="Новый чат">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="icon-btn" id="settingsBtn" title="Настройки">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
            
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Поиск" id="searchChats">
            </div>
            
            <div class="chats-list" id="chatsList">
                <!-- Чаты будут загружены сюда -->
            </div>
        </div>
        
        <!-- Основная область чата -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header" id="chatHeader">
                <div class="chat-info">
                    <div class="avatar" id="chatAvatar">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="chat-details">
                        <h3 id="chatName">Выберите чат</h3>
                        <span id="chatStatus">последняя активность: сейчас</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" id="callBtn">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="icon-btn" id="videoCallBtn">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="icon-btn" id="chatInfoBtn">
                        <i class="fas fa-info-circle"></i>
                    </button>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="messages" id="messages">
                    <!-- Сообщения будут здесь -->
                </div>
            </div>
            
            <div class="message-input-area">
                <button class="attach-btn" id="attachBtn">
                    <i class="fas fa-paperclip"></i>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение" autocomplete="off">
                    <button class="emoji-btn" id="emojiBtn">
                        <i class="far fa-smile"></i>
                    </button>
                </div>
                <button class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        
        <!-- Модальное окно входа/регистрации -->
        <div class="modal" id="authModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Добро пожаловать</h2>
                    <p>Создайте аккаунт или войдите</p>
                </div>
                <div class="modal-body">
                    <div class="auth-tabs">
                        <button class="tab-btn active" data-tab="login">Вход</button>
                        <button class="tab-btn" data-tab="register">Регистрация</button>
                    </div>
                    
                    <div class="auth-form active" id="loginForm">
                        <input type="text" id="loginUsername" placeholder="Имя пользователя" class="auth-input">
                        <input type="password" id="loginPassword" placeholder="Пароль" class="auth-input">
                        <button class="auth-btn" id="loginBtn">Войти</button>
                    </div>
                    
                    <div class="auth-form" id="registerForm">
                        <input type="text" id="regUsername" placeholder="Имя пользователя" class="auth-input">
                        <input type="email" id="regEmail" placeholder="Email (необязательно)" class="auth-input">
                        <input type="password" id="regPassword" placeholder="Пароль" class="auth-input">
                        <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль" class="auth-input">
                        <button class="auth-btn" id="registerBtn">Создать аккаунт</button>
                    </div>
                    
                    <div class="guest-mode">
                        <span>или</span>
                        <button class="guest-btn" id="guestBtn">Продолжить как гость</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Модальное окно нового чата -->
        <div class="modal" id="newChatModal">
            <div class="modal-content small">
                <div class="modal-header">
                    <h3>Новый чат</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" id="newChatUsername" placeholder="Имя пользователя" class="auth-input">
                    <div id="searchResults" class="search-results"></div>
                    <button class="auth-btn" id="createChatBtn">Начать чат</button>
                </div>
            </div>
        </div>
        
        <!-- Уведомления -->
        <div id="notification" class="notification"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

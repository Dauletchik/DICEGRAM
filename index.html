<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Telegram-ботов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .command-card {
            transition: all 0.2s ease;
        }
        .command-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-2">
                🤖 Конструктор Telegram-ботов
            </h1>
            <p class="text-gray-600">Создайте своего бота за пару минут</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <!-- Token Input -->
            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    🔑 API Токен бота
                </label>
                <input type="text" id="tokenInput" placeholder="Введите токен от @BotFather (например: 1234567890:ABCdefGHIJKlmnoPQRstUVwxyz)" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                <p class="text-xs text-gray-500 mt-1">Получить токен можно у @BotFather в Telegram</p>
            </div>

            <!-- Commands Management -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-gray-800">📝 Команды бота</h2>
                    <button id="addCommandBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        Добавить команду
                    </button>
                </div>
                
                <div id="commandsContainer" class="space-y-3">
                    <!-- Commands will be added here dynamically -->
                </div>
                
                <div id="noCommandsMsg" class="text-center text-gray-400 py-8 bg-gray-50 rounded-lg">
                    Нет добавленных команд. Нажмите "Добавить команду"
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="flex gap-4 pt-4 border-t border-gray-200">
                <button id="startBotBtn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
                    🚀 Запустить бота
                </button>
                <button id="stopBotBtn" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-lg transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
                    ⏹️ Остановить бота
                </button>
            </div>

            <!-- Status Indicator -->
            <div class="mt-6 p-4 bg-gray-50 rounded-lg">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-600">Статус бота:</span>
                    <div class="flex items-center gap-2">
                        <div id="statusIndicator" class="w-3 h-3 bg-gray-400 rounded-full animate-pulse"></div>
                        <span id="statusText" class="text-sm font-semibold text-gray-700">Не запущен</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Info Footer -->
        <div class="text-center text-xs text-gray-500 mt-8">
            💡 Подсказка: Команды должны начинаться с / (например: /start, /help)
        </div>
    </div>

    <script>
        let commands = [];

        // Load commands from localStorage
        function loadCommands() {
            const saved = localStorage.getItem('botCommands');
            if (saved) {
                commands = JSON.parse(saved);
                renderCommands();
            }
        }

        // Save commands to localStorage
        function saveCommands() {
            localStorage.setItem('botCommands', JSON.stringify(commands));
        }

        // Render commands list
        function renderCommands() {
            const container = document.getElementById('commandsContainer');
            const noCommandsMsg = document.getElementById('noCommandsMsg');
            
            if (commands.length === 0) {
                container.innerHTML = '';
                noCommandsMsg.classList.remove('hidden');
                return;
            }
            
            noCommandsMsg.classList.add('hidden');
            container.innerHTML = commands.map((cmd, index) => `
                <div class="command-card bg-gray-50 rounded-lg p-4 border border-gray-200">
                    <div class="flex flex-col md:flex-row gap-3">
                        <div class="flex-1">
                            <label class="block text-xs font-medium text-gray-600 mb-1">Команда</label>
                            <input type="text" value="${escapeHtml(cmd.command)}" 
                                   onchange="updateCommand(${index}, 'command', this.value)"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 font-mono">
                        </div>
                        <div class="flex-[2]">
                            <label class="block text-xs font-medium text-gray-600 mb-1">Ответ бота</label>
                            <input type="text" value="${escapeHtml(cmd.response)}" 
                                   onchange="updateCommand(${index}, 'response', this.value)"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex items-end">
                            <button onclick="removeCommand(${index})" 
                                    class="bg-red-100 hover:bg-red-200 text-red-600 px-3 py-2 rounded-md transition">
                                🗑️ Удалить
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateCommand(index, field, value) {
            commands[index][field] = value;
            saveCommands();
        }

        function removeCommand(index) {
            commands.splice(index, 1);
            saveCommands();
            renderCommands();
        }

        function addCommand() {
            commands.push({ command: '/newcommand', response: 'Это ответ бота' });
            saveCommands();
            renderCommands();
        }

        // API calls
        async function startBot() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showStatus('❌ Введите токен бота', 'error');
                return;
            }
            
            if (commands.length === 0) {
                showStatus('❌ Добавьте хотя бы одну команду', 'error');
                return;
            }

            // Validate commands format
            for (let cmd of commands) {
                if (!cmd.command.startsWith('/')) {
                    showStatus('❌ Команды должны начинаться с /', 'error');
                    return;
                }
                if (!cmd.response) {
                    showStatus('❌ Укажите текст ответа для всех команд', 'error');
                    return;
                }
            }

            showStatus('🔄 Запуск бота...', 'loading');
            
            try {
                const response = await axios.post('/api/start', {
                    token: token,
                    commands: commands
                });
                
                if (response.data.success) {
                    showStatus('✅ Бот успешно запущен!', 'success');
                    updateUIForRunning(true);
                } else {
                    showStatus('❌ Ошибка: ' + response.data.error, 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка соединения с сервером', 'error');
            }
        }

        async function stopBot() {
            showStatus('🔄 Остановка бота...', 'loading');
            
            try {
                const response = await axios.post('/api/stop');
                
                if (response.data.success) {
                    showStatus('✅ Бот остановлен', 'success');
                    updateUIForRunning(false);
                } else {
                    showStatus('❌ Ошибка: ' + response.data.error, 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка соединения с сервером', 'error');
            }
        }

        function showStatus(message, type) {
            const statusText = document.getElementById('statusText');
            const statusIndicator = document.getElementById('statusIndicator');
            
            statusText.textContent = message;
            
            if (type === 'error') {
                statusIndicator.className = 'w-3 h-3 bg-red-500 rounded-full';
            } else if (type === 'success') {
                statusIndicator.className = 'w-3 h-3 bg-green-500 rounded-full';
            } else if (type === 'loading') {
                statusIndicator.className = 'w-3 h-3 bg-yellow-500 rounded-full animate-pulse';
            }
            
            setTimeout(() => {
                if (type !== 'loading') {
                    const isRunning = statusText.textContent.includes('успешно запущен');
                    if (!isRunning && !statusText.textContent.includes('остановлен')) {
                        // Don't auto-clear error/success messages
                    }
                }
            }, 3000);
        }

        function updateUIForRunning(isRunning) {
            const startBtn = document.getElementById('startBotBtn');
            const stopBtn = document.getElementById('stopBotBtn');
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (isRunning) {
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusIndicator.className = 'w-3 h-3 bg-green-500 rounded-full animate-pulse';
                statusText.textContent = '✅ Бот работает';
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusIndicator.className = 'w-3 h-3 bg-gray-400 rounded-full';
                statusText.textContent = '⏹️ Не запущен';
            }
        }

        // Check bot status on page load
        async function checkStatus() {
            try {
                const response = await axios.get('/api/status');
                if (response.data.running) {
                    updateUIForRunning(true);
                    // Load saved token and commands
                    const tokenResponse = await axios.get('/api/token');
                    if (tokenResponse.data.token) {
                        document.getElementById('tokenInput').value = tokenResponse.data.token;
                    }
                    const commandsResponse = await axios.get('/api/commands');
                    if (commandsResponse.data.commands && commandsResponse.data.commands.length > 0) {
                        commands = commandsResponse.data.commands;
                        renderCommands();
                    }
                } else {
                    updateUIForRunning(false);
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        // Event listeners
        document.getElementById('addCommandBtn').addEventListener('click', addCommand);
        document.getElementById('startBotBtn').addEventListener('click', startBot);
        document.getElementById('stopBotBtn').addEventListener('click', stopBot);
        
        // Initialize
        loadCommands();
        checkStatus();
        
        // Auto-save token
        document.getElementById('tokenInput').addEventListener('change', function() {
            if (this.value.trim()) {
                axios.post('/api/save-token', { token: this.value.trim() }).catch(console.error);
            }
        });
    </script>
</body>
</html>

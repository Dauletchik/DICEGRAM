<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Telegram Bot Constructor | Визуальный конструктор ботов</title>
    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Настройка тёмной темы для Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .log-line {
            border-left: 3px solid #3b82f6;
            transition: all 0.2s ease;
        }
        .log-line:hover {
            background-color: rgba(59,130,246,0.1);
        }
        .command-card {
            transition: all 0.2s;
        }
        .command-card:hover {
            transform: translateX(4px);
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased">
    <div class="container mx-auto px-4 py-6 max-w-5xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 shadow-lg mb-3">
                <i class="fa-solid fa-robot text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                Конструктор Telegram-ботов
            </h1>
            <p class="text-gray-400 mt-2">Создай бота за 2 минуты без сервера</p>
        </div>

        <!-- Главная карточка -->
        <div class="bg-gray-800/50 backdrop-blur-sm rounded-2xl border border-gray-700 shadow-xl overflow-hidden">
            <!-- Токен -->
            <div class="p-6 border-b border-gray-700">
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <i class="fa-solid fa-key text-yellow-500 mr-2"></i>API Токен бота
                </label>
                <input type="text" id="tokenInput" 
                       placeholder="1234567890:ABCdefGHIJKlmnoPQRstUVwxyz" 
                       class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-100 placeholder-gray-500 transition">
                <p class="text-xs text-gray-500 mt-2">
                    <i class="fa-regular fa-circle-question mr-1"></i>Получить токен можно у <a href="https://t.me/botfather" target="_blank" class="text-blue-400 hover:underline">@BotFather</a> в Telegram
                </p>
            </div>

            <!-- Команды -->
            <div class="p-6 border-b border-gray-700">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-3">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-green-400"></i>Команды бота
                    </h2>
                    <button id="addCommandBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl transition flex items-center gap-2 shadow-lg">
                        <i class="fa-solid fa-plus"></i>
                        Добавить команду
                    </button>
                </div>
                
                <div id="commandsContainer" class="space-y-3">
                    <!-- Команды будут тут -->
                </div>
                
                <div id="noCommandsMsg" class="text-center text-gray-500 py-8 bg-gray-900/50 rounded-xl border border-dashed border-gray-700">
                    <i class="fa-regular fa-message text-3xl mb-2 block"></i>
                    Нет добавленных команд. Нажмите "Добавить команду"
                </div>
            </div>

            <!-- Кнопки управления -->
            <div class="p-6 border-b border-gray-700">
                <div class="flex gap-4 flex-col sm:flex-row">
                    <button id="startBotBtn" class="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-bold py-3 rounded-xl transition transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 shadow-lg">
                        <i class="fa-solid fa-play mr-2"></i>Запустить бота
                    </button>
                    <button id="stopBotBtn" class="flex-1 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-500 hover:to-rose-500 text-white font-bold py-3 rounded-xl transition transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 shadow-lg">
                        <i class="fa-solid fa-stop mr-2"></i>Остановить бота
                    </button>
                </div>
            </div>

            <!-- Статус и логи -->
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div id="statusIndicator" class="w-3 h-3 bg-gray-500 rounded-full"></div>
                        <span id="statusText" class="text-sm font-medium text-gray-400">Не запущен</span>
                    </div>
                    <button id="clearLogsBtn" class="text-xs text-gray-500 hover:text-gray-300 transition">
                        <i class="fa-regular fa-trash-alt mr-1"></i>Очистить логи
                    </button>
                </div>
                
                <div class="bg-gray-900 rounded-xl border border-gray-700 p-3 h-48 overflow-y-auto font-mono text-xs">
                    <div id="logContainer">
                        <div class="text-gray-600 text-center py-8">📋 Лог событий появится здесь...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center text-xs text-gray-600 mt-6">
            <i class="fa-regular fa-lightbulb mr-1"></i>Команды должны начинаться с / (например: /start, /help)
        </div>
    </div>

    <script>
        // ==================== Глобальные переменные ====================
        let commands = [];               // Массив команд [{ command, response }]
        let pollingInterval = null;     // ID интервала опроса
        let lastUpdateId = 0;           // Последний обработанный update_id
        let isBotRunning = false;       // Флаг работы бота
        let currentToken = '';          // Текущий токен
        
        // ==================== Работа с localStorage ====================
        function loadFromStorage() {
            const savedCommands = localStorage.getItem('botCommands');
            if (savedCommands) {
                commands = JSON.parse(savedCommands);
                renderCommands();
            }
            
            const savedToken = localStorage.getItem('botToken');
            if (savedToken) {
                document.getElementById('tokenInput').value = savedToken;
            }
        }
        
        function saveCommands() {
            localStorage.setItem('botCommands', JSON.stringify(commands));
        }
        
        function saveToken(token) {
            localStorage.setItem('botToken', token);
        }
        
        // ==================== Управление UI командами ====================
        function renderCommands() {
            const container = document.getElementById('commandsContainer');
            const noCommandsMsg = document.getElementById('noCommandsMsg');
            
            if (commands.length === 0) {
                container.innerHTML = '';
                noCommandsMsg.classList.remove('hidden');
                return;
            }
            
            noCommandsMsg.classList.add('hidden');
            container.innerHTML = commands.map((cmd, index) => `
                <div class="command-card bg-gray-900 rounded-xl p-4 border border-gray-700">
                    <div class="flex flex-col md:flex-row gap-3">
                        <div class="flex-1">
                            <label class="block text-xs font-medium text-gray-500 mb-1">Команда</label>
                            <input type="text" value="${escapeHtml(cmd.command)}" 
                                   onchange="updateCommand(${index}, 'command', this.value)"
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm text-gray-100">
                        </div>
                        <div class="flex-[2]">
                            <label class="block text-xs font-medium text-gray-500 mb-1">Ответ бота</label>
                            <input type="text" value="${escapeHtml(cmd.response)}" 
                                   onchange="updateCommand(${index}, 'response', this.value)"
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm text-gray-100">
                        </div>
                        <div class="flex items-end">
                            <button onclick="removeCommand(${index})" 
                                    class="bg-red-900/50 hover:bg-red-800 text-red-300 px-3 py-2 rounded-lg transition">
                                <i class="fa-regular fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function updateCommand(index, field, value) {
            commands[index][field] = value;
            saveCommands();
            if (isBotRunning) {
                addLog('⚠️ Команда изменена. Перезапустите бота для применения.', 'warning');
            }
        }
        
        function removeCommand(index) {
            commands.splice(index, 1);
            saveCommands();
            renderCommands();
            if (isBotRunning) {
                addLog('⚠️ Команда удалена. Перезапустите бота.', 'warning');
            }
        }
        
        function addCommand() {
            commands.push({ command: '/newcommand', response: 'Привет! Я твой бот 🤖' });
            saveCommands();
            renderCommands();
            addLog('➕ Добавлена новая команда', 'info');
        }
        
        // ==================== Логирование ====================
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString('ru-RU');
            
            // Убираем заглушку если есть
            if (logContainer.innerHTML.includes('Лог событий появится здесь')) {
                logContainer.innerHTML = '';
            }
            
            const colors = {
                info: 'text-blue-400',
                success: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400',
                message: 'text-purple-400'
            };
            
            const icons = {
                info: 'fa-circle-info',
                success: 'fa-circle-check',
                error: 'fa-circle-exclamation',
                warning: 'fa-triangle-exclamation',
                message: 'fa-comment'
            };
            
            const logLine = document.createElement('div');
            logLine.className = `log-line pl-3 py-1 mb-1 text-xs ${colors[type] || colors.info}`;
            logLine.innerHTML = `<i class="fa-regular ${icons[type] || icons.info} mr-2 w-4"></i><span class="text-gray-500">[${timestamp}]</span> ${escapeHtml(message)}`;
            logContainer.appendChild(logLine);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // Ограничиваем количество логов (оставляем последние 100)
            while (logContainer.children.length > 100) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }
        
        function clearLogs() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '<div class="text-gray-600 text-center py-8">📋 Логи очищены</div>';
            addLog('Логи очищены', 'info');
        }
        
        // ==================== Telegram API методы ====================
        async function sendMessage(chatId, text) {
            if (!currentToken) return false;
            try {
                const response = await fetch(`https://api.telegram.org/bot${currentToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text,
                        parse_mode: 'HTML',
                        disable_web_page_preview: true
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    addLog(`📤 Ответ отправлен в чат ${chatId}`, 'success');
                    return true;
                } else {
                    addLog(`❌ Ошибка отправки: ${data.description}`, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`❌ Ошибка сети при отправке: ${error.message}`, 'error');
                return false;
            }
        }
        
        async function processUpdate(update) {
            if (!update.message) return;
            
            const message = update.message;
            const text = message.text;
            const chatId = message.chat.id;
            const username = message.from?.username || message.from?.first_name || 'пользователь';
            
            if (!text) return;
            
            addLog(`📨 Получено сообщение от @${username}: "${text.substring(0, 50)}"`, 'message');
            
            // Поиск команды
            for (let cmd of commands) {
                // Сравниваем команду (игнорируем регистр, поддерживаем пробел после команды)
                const commandPattern = new RegExp(`^${cmd.command}(\\s|$)`, 'i');
                if (commandPattern.test(text)) {
                    addLog(`🎯 Сработала команда ${cmd.command} → отправка ответа`, 'success');
                    await sendMessage(chatId, cmd.response);
                    return;
                }
            }
            
            // Если сообщение начинается с / и не найдено
            if (text.startsWith('/')) {
                const commandsList = commands.map(c => c.command).join(', ');
                const reply = `❌ Неизвестная команда.\n\nДоступные команды: ${commandsList || 'нет команд'}`;
                await sendMessage(chatId, reply);
                addLog(`⚠️ Неизвестная команда от @${username}`, 'warning');
            }
        }
        
        // ==================== Long Polling ====================
        async function pollUpdates() {
            if (!isBotRunning || !currentToken) return;
            
            try {
                let url = `https://api.telegram.org/bot${currentToken}/getUpdates?timeout=25&allowed_updates=["message"]`;
                if (lastUpdateId > 0) {
                    url += `&offset=${lastUpdateId + 1}`;
                }
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (let update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            await processUpdate(update);
                        }
                    }
                } else if (!data.ok) {
                    // Ошибка API (обычно неверный токен)
                    if (data.description && data.description.includes('Not found')) {
                        addLog('❌ Токен недействителен! Бот остановлен.', 'error');
                        stopBotInternal('Неверный токен');
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    // Таймаут - нормально для long polling
                    return;
                }
                addLog(`⚠️ Ошибка опроса: ${error.message}`, 'error');
            }
        }
        
        function startPollingLoop() {
            if (pollingInterval) clearInterval(pollingInterval);
            // Запускаем цикл: ждём 0.5 сек между запросами для экономии ресурсов
            pollingInterval = setInterval(() => {
                if (isBotRunning && currentToken) {
                    pollUpdates();
                }
            }, 800);
            addLog('🔄 Цикл опроса запущен', 'info');
        }
        
        function stopPollingLoop() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                addLog('⏹️ Цикл опроса остановлен', 'info');
            }
        }
        
        // ==================== Управление ботом ====================
        async function startBot() {
            const token = document.getElementById('tokenInput').value.trim();
            
            if (!token) {
                addLog('❌ Введите токен бота', 'error');
                return;
            }
            
            if (commands.length === 0) {
                addLog('❌ Добавьте хотя бы одну команду перед запуском', 'error');
                return;
            }
            
            // Валидация команд
            for (let cmd of commands) {
                if (!cmd.command.startsWith('/')) {
                    addLog('❌ Команды должны начинаться с символа / (например: /start)', 'error');
                    return;
                }
                if (!cmd.response.trim()) {
                    addLog(`❌ У команды ${cmd.command} пустой ответ`, 'error');
                    return;
                }
            }
            
            addLog('🔍 Проверка токена...', 'info');
            
            try {
                // Проверяем токен через getMe
                const testResponse = await fetch(`https://api.telegram.org/bot${token}/getMe`);
                const testData = await testResponse.json();
                
                if (!testData.ok) {
                    addLog(`❌ Неверный токен: ${testData.description}`, 'error');
                    return;
                }
                
                const botName = testData.result.username;
                currentToken = token;
                saveToken(token);
                lastUpdateId = 0;
                isBotRunning = true;
                
                addLog(`✅ Бот @${botName} успешно запущен!`, 'success');
                updateUIForRunning(true);
                
                // Запускаем polling
                startPollingLoop();
                
                // Делаем первый опрос сразу
                setTimeout(() => pollUpdates(), 500);
                
            } catch (error) {
                addLog(`❌ Ошибка подключения: ${error.message}`, 'error');
            }
        }
        
        function stopBotInternal(reason) {
            if (!isBotRunning && !reason) return;
            
            isBotRunning = false;
            stopPollingLoop();
            currentToken = '';
            
            updateUIForRunning(false);
            
            if (reason && reason !== 'Пользователь') {
                addLog(`🛑 Бот остановлен: ${reason}`, 'warning');
            } else {
                addLog(`🛑 Бот остановлен пользователем`, 'info');
            }
        }
        
        async function stopBot() {
            stopBotInternal('Пользователь');
        }
        
        // ==================== UI обновление ====================
        function updateUIForRunning(running) {
            const startBtn = document.getElementById('startBotBtn');
            const stopBtn = document.getElementById('stopBotBtn');
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const tokenInput = document.getElementById('tokenInput');
            
            if (running) {
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusIndicator.className = 'w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-glow';
                statusText.innerHTML = '<i class="fa-solid fa-circle text-green-500 text-xs mr-1"></i> Бот работает';
                tokenInput.disabled = true;
                tokenInput.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusIndicator.className = 'w-3 h-3 bg-gray-500 rounded-full';
                statusText.innerHTML = '<i class="fa-solid fa-circle text-gray-500 text-xs mr-1"></i> Не запущен';
                tokenInput.disabled = false;
                tokenInput.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
        
        // ==================== Инициализация и обработчики ====================
        document.getElementById('addCommandBtn').addEventListener('click', addCommand);
        document.getElementById('startBotBtn').addEventListener('click', startBot);
        document.getElementById('stopBotBtn').addEventListener('click', stopBot);
        document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);
        
        // Сохраняем токен при изменении
        document.getElementById('tokenInput').addEventListener('change', function() {
            if (this.value.trim()) {
                saveToken(this.value.trim());
            }
        });
        
        // Останавливаем бота при закрытии страницы (опционально)
        window.addEventListener('beforeunload', () => {
            if (isBotRunning) {
                stopPollingLoop();
            }
        });
        
        // Загружаем сохранённые данные
        loadFromStorage();
        addLog('🚀 Конструктор загружен. Введите токен и добавьте команды', 'info');
        
        // Проверяем сохранённый токен и восстанавливаем состояние если он есть
        const savedTokenCheck = localStorage.getItem('botToken');
        if (savedTokenCheck && commands.length > 0) {
            addLog('💾 Найдены сохранённые настройки. Нажмите "Запустить бота" для активации', 'info');
        }
    </script>
</body>
</html>

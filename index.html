<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Bottle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #table {
            position: relative;
            width: 320px;
            height: 320px;
            background: #8B5A2B;
            border-radius: 50%;
            border: 8px solid #5c3a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #bottle {
            width: 40px;
            height: 140px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/c/cf/Coca-Cola_Glass_Bottle.svg') no-repeat center;
            background-size: contain;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #ff4757;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #555;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        /* Примерное расположение 4 игроков вокруг стола */
        #p1 { top: 10px; left: 135px; }
        #p2 { top: 135px; right: 10px; }
        #p3 { bottom: 10px; left: 135px; }
        #p4 { top: 135px; left: 10px; }
    </style>
</head>
<body>

    <h2>Поцелуев: <span id="kisses">0</span></h2>

    <div id="table">
        <div class="player" id="p1"></div>
        <div class="player" id="p2"></div>
        <div class="player" id="p3"></div>
        <div class="player" id="p4"></div>
        
        <div id="bottle"></div>
    </div>

    <button class="btn" onclick="spinBottle()">Крутить!</button>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        let currentAngle = 0;

        function spinBottle() {
            // Генерируем случайный угол (минимум 3 полных оборота + случайный остаток)
            const randomDegrees = Math.floor(Math.random() * 360) + 1080;
            currentAngle += randomDegrees;
            
            const bottle = document.getElementById('bottle');
            bottle.style.transform = `rotate(${currentAngle}deg)`;

            // После остановки (3 секунды) можно отправлять результат на сервер
            setTimeout(() => {
                let finalAngle = currentAngle % 360;
                // Логика определения на кого указала бутылочка...
                alert("Бутылочка остановилась!");
            }, 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DICEGRAM — твой мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Главный контейнер */
        .app {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: #1e293b;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        /* Шапка */
        .header {
            background: #0f172a;
            padding: 20px 20px 12px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            background: none;
            color: #facc15;
            -webkit-background-clip: unset;
        }

        /* Экраны */
        .screen {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .hide {
            display: none !important;
        }

        /* Регистрация */
        .reg-card {
            background: #334155;
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            margin: auto;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .reg-card h2 {
            color: #facc15;
            margin-bottom: 20px;
            font-size: 26px;
        }
        .reg-input {
            width: 100%;
            padding: 14px 18px;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 20px;
        }
        .reg-input:focus {
            border-color: #c084fc;
        }
        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #8b5cf6;
            box-shadow: 0 4px 12px #8b5cf670;
        }
        .btn-primary:hover {
            background: #a78bfa;
            transform: scale(0.97);
        }
        .error-msg {
            color: #f87171;
            font-size: 14px;
            margin-top: 8px;
        }

        /* Список чатов / личек */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-item {
            background: #334155;
            padding: 14px 18px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #475569;
        }
        .chat-item:active {
            background: #475569;
        }
        .chat-name {
            font-weight: 600;
            color: #f1f5f9;
            font-size: 18px;
        }
        .chat-badge {
            background: #8b5cf6;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
        }

        /* Поиск */
        .search-box {
            background: #0f172a;
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .search-box button {
            background: #6366f1;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            color: white;
            font-weight: bold;
        }

        /* Окно диалога */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px;
            border-bottom: 1px solid #475569;
            margin-bottom: 12px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
        }
        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            margin-bottom: 12px;
            max-height: 55vh;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 15px;
            word-wrap: break-word;
        }
        .my-msg {
            background: #8b5cf6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: white;
        }
        .their-msg {
            background: #334155;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }
        .input-area {
            display: flex;
            gap: 10px;
            background: #0f172a;
            padding: 12px;
            border-radius: 60px;
        }
        .input-area input {
            flex: 1;
            background: #1e293b;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
        }
        .send-btn {
            background: #facc15;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: bold;
            color: #0f172a;
        }

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            background: #0f172a;
            padding: 10px 20px;
            justify-content: space-around;
            border-top: 1px solid #334155;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .nav-active {
            background: #334155;
            color: #facc15;
        }

        /* настройки */
        .settings-card {
            background: #334155;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .settings-item {
            background: #1e293b;
            padding: 14px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="logo">DICE<span>GRAM</span></div>
        <div style="font-size: 12px; color:#94a3b8;">бросай кубик — общайся</div>
    </div>

    <!-- экран регистрации -->
    <div id="regScreen" class="screen">
        <div class="reg-card">
            <h2>✨ DICEGRAM ✨</h2>
            <input type="text" id="regUsername" class="reg-input" placeholder="придумай юзернейм... например: dice_master" autocomplete="off">
            <button id="registerBtn" class="btn btn-primary">Войти в DICEGRAM</button>
            <div id="regError" class="error-msg"></div>
            <div style="margin-top: 24px; font-size:12px; color:#94a3b8;">🔥 твой уникальный мир общения</div>
        </div>
    </div>

    <!-- основной интерфейс после логина -->
    <div id="mainScreen" class="screen hide">
        <!-- список диалогов (вкладка Чаты) -->
        <div id="chatsPanel">
            <div class="search-box">
                <input type="text" id="searchUserInput" placeholder="Поиск по юзернейму... например: @alice">
                <button id="searchUserBtn">Найти</button>
            </div>
            <div id="chatsListContainer" class="chat-list">
                <!-- динамические лички -->
            </div>
            <div style="text-align: center; margin-top: 12px;">
                <button id="createGroupBtn" class="btn" style="background:#475569;">➕ Создать группу (бета)</button>
            </div>
        </div>

        <!-- панель сообщений (открытый диалог) -->
        <div id="chatPanel" class="hide">
            <div class="chat-header">
                <button id="backToListBtn" class="back-btn">←</button>
                <div style="font-weight: bold; font-size: 20px; color:#facc15;" id="currentChatTitle">@user</div>
            </div>
            <div id="messagesContainer" class="messages-area"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напиши сообщение...">
                <button id="sendMsgBtn" class="send-btn">📨</button>
            </div>
        </div>

        <!-- настройки -->
        <div id="settingsPanel" class="hide">
            <div class="settings-card">
                <div class="settings-item">
                    <span>🆔 Мой юзернейм</span>
                    <span style="color:#c084fc;" id="myUsernameDisplay">@user</span>
                </div>
                <div class="settings-item" id="logoutBtn">
                    <span>🚪 Выйти из аккаунта</span>
                    <span>→</span>
                </div>
                <div class="settings-item">
                    <span>🤖 DICEGRAM | официальное бот</span>
                    <span>✅</span>
                </div>
                <div style="font-size: 12px; color:#94a3b8; text-align: center;">версия 1.0 — твой мессенджер</div>
            </div>
        </div>

        <!-- нижнее меню -->
        <div class="bottom-nav">
            <button class="nav-btn" data-nav="chats">💬 Чаты</button>
            <button class="nav-btn" data-nav="settings">⚙️ Настройки</button>
        </div>
    </div>
</div>

<script>
    // ---------- СИСТЕМА ХРАНЕНИЯ ----------
    let currentUser = null;        // { username }
    let usersDB = [];              // массив зарегистрированных юзернеймов
    let messagesDB = [];           // { from, to, text, timestamp, isGroup? (пока лс) }

    // Загрузка из localStorage
    function loadData() {
        const storedUsers = localStorage.getItem('dicegram_users');
        if(storedUsers) usersDB = JSON.parse(storedUsers);
        else usersDB = [];

        const storedMessages = localStorage.getItem('dicegram_messages');
        if(storedMessages) messagesDB = JSON.parse(storedMessages);
        else messagesDB = [];

        const savedSession = localStorage.getItem('dicegram_session');
        if(savedSession) {
            const sessionUser = JSON.parse(savedSession);
            if(usersDB.find(u => u.username === sessionUser.username)) {
                currentUser = sessionUser;
            }
        }
    }

    function saveUsers() {
        localStorage.setItem('dicegram_users', JSON.stringify(usersDB));
    }
    function saveMessages() {
        localStorage.setItem('dicegram_messages', JSON.stringify(messagesDB));
    }
    function saveSession() {
        if(currentUser) localStorage.setItem('dicegram_session', JSON.stringify(currentUser));
        else localStorage.removeItem('dicegram_session');
    }

    // Регистрация нового пользователя
    function registerUser(username) {
        username = username.trim().toLowerCase();
        if(username === "") return { ok: false, error: "Введите юзернейм" };
        if(username.length < 3) return { ok: false, error: "Минимум 3 символа" };
        const exists = usersDB.some(u => u.username === username);
        if(exists) return { ok: false, error: "Уже существует такой юзернейм ❌" };
        // регистрируем
        usersDB.push({ username: username, createdAt: Date.now() });
        saveUsers();
        return { ok: true, username };
    }

    // вход / автосохранение после регистрации
    function loginUser(username) {
        currentUser = { username: username };
        saveSession();
        renderMainUI();
        // имитация бота: при регистрации высылаем сообщение от бота DICEGRAM
        const botMsgExists = messagesDB.some(m => m.from === "dicegram_bot" && m.to === username && m.text.includes("успешшно зарегситроовалти"));
        if(!botMsgExists) {
            const welcomeText = `🎲 вы успешшно ззаарегситроовалли аккауньа в дикеграам со юзер @${username}!\nДобро пожаловать в DICEGRAM! 🎉`;
            messagesDB.push({
                from: "dicegram_bot",
                to: username,
                text: welcomeText,
                timestamp: Date.now()
            });
            saveMessages();
        }
    }

    // отправка сообщения (личка)
    function sendMessage(toUsername, text) {
        if(!text.trim()) return;
        const msg = {
            from: currentUser.username,
            to: toUsername,
            text: text.trim(),
            timestamp: Date.now()
        };
        messagesDB.push(msg);
        saveMessages();
    }

    // получить диалог между двумя пользователями (сортировка)
    function getDialog(userA, userB) {
        return messagesDB.filter(m => 
            (m.from === userA && m.to === userB) || (m.from === userB && m.to === userA)
        ).sort((a,b) => a.timestamp - b.timestamp);
    }

    // получить список всех чатов (уникальные собеседники + бот)
    function getChatsList() {
        if(!currentUser) return [];
        const set = new Set();
        messagesDB.forEach(m => {
            if(m.from === currentUser.username) set.add(m.to);
            if(m.to === currentUser.username) set.add(m.from);
        });
        // также добавим всех зарегистрированных пользователей, кроме себя, чтобы можно было начать диалог
        usersDB.forEach(u => {
            if(u.username !== currentUser.username) set.add(u.username);
        });
        // добавим бота если нет
        if(!set.has("dicegram_bot")) set.add("dicegram_bot");
        
        return Array.from(set).sort();
    }

    // поиск юзера и открытие чата
    function findAndOpenChat(searchUsername) {
        let target = searchUsername.trim().toLowerCase().replace('@','');
        if(target === currentUser.username) {
            alert("Нельзя открыть чат с самим собой 🤡");
            return false;
        }
        const userExists = usersDB.some(u => u.username === target);
        if(!target || (!userExists && target !== "dicegram_bot")) {
            alert(`Пользователь @${target} не найден 😢`);
            return false;
        }
        openChatWith(target);
        return true;
    }

    // открыть личку
    let activeChatPartner = null;
    function openChatWith(partner) {
        activeChatPartner = partner;
        document.getElementById('chatsPanel').classList.add('hide');
        document.getElementById('chatPanel').classList.remove('hide');
        document.getElementById('settingsPanel').classList.add('hide');
        document.getElementById('currentChatTitle').innerText = `@${partner}`;
        renderMessages();
        // подсветка навигации (чаты)
        setActiveNav('chats');
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if(!activeChatPartner) return;
        const dialog = getDialog(currentUser.username, activeChatPartner);
        container.innerHTML = '';
        dialog.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.from === currentUser.username ? 'my-msg' : 'their-msg'}`;
            let senderName = msg.from === currentUser.username ? 'Вы' : `@${msg.from}`;
            if(msg.from === 'dicegram_bot') senderName = '🤖 DICEGRAM Bot';
            div.innerHTML = `<strong style="font-size:12px;">${senderName}</strong><br>${msg.text}`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function renderChatsList() {
        const container = document.getElementById('chatsListContainer');
        if(!container) return;
        const chats = getChatsList();
        if(chats.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#94a3b8;">Начни диалог через поиск 🔍</div>';
            return;
        }
        container.innerHTML = '';
        chats.forEach(chat => {
            const chatDiv = document.createElement('div');
            chatDiv.className = 'chat-item';
            let displayName = chat === 'dicegram_bot' ? '🤖 DICEGRAM Bot' : `@${chat}`;
            chatDiv.innerHTML = `<div class="chat-name">${displayName}</div><div class="chat-badge">💬</div>`;
            chatDiv.addEventListener('click', () => openChatWith(chat));
            container.appendChild(chatDiv);
        });
    }

    // отрисовка главного экрана (после логина)
    function renderMainUI() {
        document.getElementById('regScreen').classList.add('hide');
        document.getElementById('mainScreen').classList.remove('hide');
        document.getElementById('myUsernameDisplay').innerText = `@${currentUser.username}`;
        // показать панель чатов по умолчанию
        showPanel('chats');
        renderChatsList();
        // если чат был открыт, обновим
        if(activeChatPartner) renderMessages();
    }

    function showPanel(panel) {
        document.getElementById('chatsPanel').classList.add('hide');
        document.getElementById('chatPanel').classList.add('hide');
        document.getElementById('settingsPanel').classList.add('hide');
        if(panel === 'chats') {
            document.getElementById('chatsPanel').classList.remove('hide');
            renderChatsList();
            activeChatPartner = null;
        } else if(panel === 'settings') {
            document.getElementById('settingsPanel').classList.remove('hide');
        }
    }

    function setActiveNav(active) {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('nav-active');
        });
        if(active === 'chats') document.querySelector('[data-nav="chats"]').classList.add('nav-active');
        if(active === 'settings') document.querySelector('[data-nav="settings"]').classList.add('nav-active');
    }

    // ---------- инициализация событий ----------
    function bindEvents() {
        // Регистрация
        const regBtn = document.getElementById('registerBtn');
        const regInput = document.getElementById('regUsername');
        const regError = document.getElementById('regError');
        regBtn.onclick = () => {
            const username = regInput.value;
            const result = registerUser(username);
            if(result.ok) {
                loginUser(result.username);
                // после успеха: бот присылает письмо (уже сделано в loginUser)
            } else {
                regError.innerText = result.error;
            }
        };
        // Навигация
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                const navTo = btn.getAttribute('data-nav');
                if(navTo === 'chats') { showPanel('chats'); setActiveNav('chats'); }
                if(navTo === 'settings') { showPanel('settings'); setActiveNav('settings'); }
            };
        });
        // Поиск пользователя
        document.getElementById('searchUserBtn').onclick = () => {
            const searchVal = document.getElementById('searchUserInput').value;
            if(findAndOpenChat(searchVal)) {
                document.getElementById('searchUserInput').value = '';
            }
        };
        // Назад к списку чатов
        document.getElementById('backToListBtn').onclick = () => {
            showPanel('chats');
            activeChatPartner = null;
            setActiveNav('chats');
        };
        // Отправка сообщения
        document.getElementById('sendMsgBtn').onclick = () => {
            if(!activeChatPartner) return;
            const input = document.getElementById('messageInput');
            const text = input.value;
            if(text.trim()) {
                sendMessage(activeChatPartner, text);
                input.value = '';
                renderMessages();
            }
        };
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('sendMsgBtn').click();
        });
        // Выход
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('dicegram_session');
            currentUser = null;
            activeChatPartner = null;
            document.getElementById('regScreen').classList.remove('hide');
            document.getElementById('mainScreen').classList.add('hide');
            document.getElementById('regUsername').value = '';
            document.getElementById('regError').innerText = '';
        };
        // Создание группы (заглушка с функцией)
        document.getElementById('createGroupBtn').onclick = () => {
            alert("⚙️ Функция групп в разработке! Скоро вы сможете создавать группы и добавлять участников. DICEGRAM расширяется!");
        };
    }

    // Запуск приложения
    function init() {
        loadData();
        bindEvents();
        if(currentUser && usersDB.some(u => u.username === currentUser.username)) {
            renderMainUI();
        } else {
            document.getElementById('regScreen').classList.remove('hide');
            document.getElementById('mainScreen').classList.add('hide');
        }
    }
    init();
</script>
</body>
    </html>

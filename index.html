<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Онлайн Бутылочка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1e1e24;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 20px 10px;
            overflow: hidden;
        }
        
        /* Верхняя панель */
        .header-container {
            text-align: center;
            width: 100%;
            z-index: 10;
        }
        .header-container h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .status-bar {
            font-size: 16px;
            font-weight: 600;
            color: #f1c40f;
            margin-bottom: 8px;
            min-height: 22px;
        }
        .counter {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 14px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Игровое поле */
        .game-zone {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto 0;
        }
        .purple-table {
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #8e44ad, #6c3483);
            border-radius: 50%;
            border: 6px solid #512562;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* Бутылочка */
        .bottle-container {
            position: absolute;
            width: 40px;
            height: 120px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 3.5s cubic-bezier(0.25, 1, 0.2, 1), opacity 0.5s ease;
            opacity: 1;
        }
        .bottle-container.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .bottle-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.4));
        }

        /* Игроки и их плавное перемещение */
        .player-seat {
            position: absolute;
            width: 70px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .avatar-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #34495e;
            border: 3px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .player-seat.current-turn .avatar-circle {
            border-color: #f1c40f;
            box-shadow: 0 0 15px #f1c40f;
        }
        .player-seat.targeted .avatar-circle {
            border-color: #e74c3c;
            box-shadow: 0 0 15px #e74c3c;
        }
        .player-name {
            font-size: 11px;
            margin-top: 4px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 8px;
            max-width: 75px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .choice-bubble {
            position: absolute;
            top: -20px;
            background: #fff;
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 20;
        }

        /* Кнопка снизу */
        .action-button {
            width: 90%;
            max-width: 320px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            color: #ffffff;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            transition: background 0.2s, transform 0.1s;
            z-index: 10;
        }
        .action-button:active {
            transform: scale(0.96);
        }
        .action-button:disabled {
            background: #7f8c8d;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Интерактивная зона поцелуя в центре */
        .kiss-panel {
            position: absolute;
            bottom: 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 30;
        }
        .kiss-prompt-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .kiss-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        .k-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .k-btn:active { transform: scale(0.9); }
        .k-btn-yes { background: #2ecc71; color: white; }
        .k-btn-no { background: #e74c3c; color: white; }

        /* Эффект разлетающихся сердец */
        .heart-fx {
            position: absolute;
            font-size: 30px;
            animation: floatUp 1s ease-out forwards;
            opacity: 0;
            z-index: 40;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Онлайн Бутылочка</h1>
        <div class="status-bar" id="game-status">Подготовка игры...</div>
        <div class="counter">Поцелуи: <span id="kiss-value">0</span> 😘</div>
    </div>

    <div class="game-zone" id="stage">
        <div class="purple-table"></div>
        
        <div class="bottle-container" id="game-bottle">
            <svg class="bottle-svg" viewBox="0 0 100 300" xmlns="http://www.w3.org/2000/svg">
                <path d="M40,20 L60,20 L60,70 L40,70 Z" fill="#2d5a27" stroke="#1e3c1a" stroke-width="3"/>
                <path d="M40,70 C20,100 20,120 20,150 L20,260 C20,275 30,285 50,285 C70,285 80,275 80,260 L80,150 C80,120 80,100 60,70 Z" fill="#387330" stroke="#1e3c1a" stroke-width="4"/>
                <rect x="25" y="140" width="50" height="50" rx="5" fill="#e74c3c"/>
                <circle cx="50" cy="165" r="12" fill="#ffffff"/>
            </svg>
        </div>
        
        <div class="player-seat" id="seat-0"><div class="choice-bubble" id="choice-0"></div><div class="avatar-circle">👑</div><div class="player-name" id="user-my-name">Зверопо...</div></div>
        <div class="player-seat" id="seat-1"><div class="choice-bubble" id="choice-1"></div><div class="avatar-circle">💃</div><div class="player-name">Mira_doll</div></div>
        <div class="player-seat" id="seat-2"><div class="choice-bubble" id="choice-2"></div><div class="avatar-circle">😎</div><div class="player-name">Behruz</div></div>
        <div class="player-seat" id="seat-3"><div class="choice-bubble" id="choice-3"></div><div class="avatar-circle">💬</div><div class="player-name">ZAHID</div></div>
        <div class="player-seat" id="seat-4"><div class="choice-bubble" id="choice-4"></div><div class="avatar-circle">🦄</div><div class="player-name">Alina</div></div>
        <div class="player-seat" id="seat-5"><div class="choice-bubble" id="choice-5"></div><div class="avatar-circle">🔥</div><div class="player-name">Дмитрий</div></div>
    </div>

    <button class="action-button" id="spin-action-btn" onclick="humanSpinRequest()">КРУТИТЬ!</button>

    <div class="kiss-panel" id="action-kiss-panel">
        <div class="kiss-prompt-text" id="kiss-prompt-title">Поцеловать?</div>
        <div class="kiss-buttons">
            <button class="k-btn k-btn-yes" id="k-yes" onclick="submitHumanChoice(true)">❤️</button>
            <button class="k-btn k-btn-no" id="k-no" onclick="submitHumanChoice(false)">❌</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            const telegramUser = tg.initDataUnsafe?.user;
            if (telegramUser) {
                document.getElementById('user-my-name').innerText = telegramUser.first_name;
            }
        }

        // Позиции по кругу (радиус орбиты 125px)
        const orbitRadius = 125;
        const players = [
            { id: 0, name: "Ты", avatar: "👑", angle: 0, x: 0, y: -orbitRadius },
            { id: 1, name: "Mira_doll", avatar: "💃", angle: 60, x: 110, y: -65 },
            { id: 2, name: "Behruz", avatar: "😎", angle: 120, x: 110, y: 65 },
            { id: 3, name: "ZAHID", avatar: "💬", angle: 180, x: 0, y: orbitRadius },
            { id: 4, name: "Alina", avatar: "🦄", angle: 240, x: -110, y: 65 },
            { id: 5, name: "Дмитрий", avatar: "🔥", angle: 300, x: -110, y: -65 }
        ];

        let currentTurnIndex = 0; 
        let currentRotation = 0;
        let myKisses = parseInt(localStorage.getItem('saved_kisses')) || 0;
        
        // Переменные текущего раунда
        let activeSpinner = null;
        let activeTarget = null;
        let spinnerChoice = null;
        let targetChoice = null;

        document.getElementById('kiss-value').innerText = myKisses;

        // Первоначальный рендеринг позиций игроков на орбите стола
        function initPositions() {
            players.forEach(p => {
                const el = document.getElementById(`seat-${p.id}`);
                el.style.transform = `translate(${p.x}px, ${p.y}px)`;
            });
            // Старт со случайного игрока
            currentTurnIndex = Math.floor(Math.random() * players.length);
            nextTurn();
        }

        // Управление очередью ходов
        function nextTurn() {
            // Очищаем стили раунда
            players.forEach(p => {
                const el = document.getElementById(`seat-${p.id}`);
                el.classList.remove('current-turn', 'targeted');
                document.getElementById(`choice-${p.id}`).style.display = 'none';
            });
            document.getElementById('game-bottle').classList.remove('hidden');
            document.getElementById('action-kiss-panel').style.display = 'none';

            activeSpinner = players[currentTurnIndex];
            document.getElementById(`seat-${activeSpinner.id}`).classList.add('current-turn');

            if (activeSpinner.id === 0) {
                // Ход игрока
                document.getElementById('game-status').innerText = "Ваш ход! Вращайте бутылочку!";
                document.getElementById('spin-action-btn').style.display = "block";
                document.getElementById('spin-action-btn').disabled = false;
            } else {
                // Ход бота
                document.getElementById('game-status').innerText = `Ход игрока ${activeSpinner.name}...`;
                document.getElementById('spin-action-btn').style.display = "block";
                document.getElementById('spin-action-btn').disabled = true;
                // Бот думает 2 секунды перед вращением
                setTimeout(botSpinRequest, 2000);
            }
        }

        // Вращение игроком
        function humanSpinRequest() {
            document.getElementById('spin-action-btn').disabled = true;
            processSpin();
        }

        // Вращение ботом
        function botSpinRequest() {
            processSpin();
        }

        // Общая логика расчета траектории бутылочки
        function processSpin() {
            // Исключаем крутящего игрока из списка целей
            let validTargets = players.filter(p => p.id !== activeSpinner.id);
            activeTarget = validTargets[Math.floor(Math.random() * validTargets.length)];

            // Считаем угол вращения
            const extraSpins = 1800; // 5 полных кругов
            currentRotation += extraSpins + activeTarget.angle - (currentRotation % 360);
            
            const bottle = document.getElementById('game-bottle');
            bottle.style.transform = `rotate(${currentRotation}deg)`;

            // Ждем завершения вращения
            setTimeout(gatherInCenter, 3500);
        }

        // Сближение участников в центре
        function gatherInCenter() {
            document.getElementById(`seat-${activeTarget.id}`).classList.add('targeted');
            document.getElementById('game-bottle').classList.add('hidden');
            document.getElementById('spin-action-btn').style.display = "none";

            // Плавно сдвигаем аватаров в центр стола
            // Распределяем их немного по бокам от центра: крутящий чуть левее (-40px), цель чуть правее (40px)
            document.getElementById(`seat-${activeSpinner.id}`).style.transform = `translate(-40px, 0px)`;
            document.getElementById(`seat-${activeTarget.id}`).style.transform = `translate(40px, 0px)`;

            setTimeout(startInteractionPhase, 700);
        }

        // Фаза принятия решений (Поцелуй / Отказ)
        function startInteractionPhase() {
            spinnerChoice = null;
            targetChoice = null;

            // Сценарий 1: Крутил ТЫ
            if (activeSpinner.id === 0) {
                document.getElementById('game-status').innerText = `Вы выбрали: ${activeTarget.name}`;
                showHumanKissControls(`Поцеловать ${activeTarget.name}?`);
                // Бот-цель генерирует свой ответ (70% — ДА)
                targetChoice = Math.random() < 0.7;
            } 
            // Сценарий 2: Бот крутил ТЕБЯ
            else if (activeTarget.id === 0) {
                document.getElementById('game-status').innerText = `${activeSpinner.name} выбрал Вас!`;
                showHumanKissControls(`${activeSpinner.name} хочет поцеловать Вас?`);
                // Бот-ротатор делает выбор
                spinnerChoice = Math.random() < 0.7;
            } 
            // Сценарий 3: Бот крутил Бота (Полный автопилот)
            else {
                document.getElementById('game-status').innerText = `${activeSpinner.name} выбирает ${activeTarget.name}`;
                spinnerChoice = Math.random() < 0.7;
                targetChoice = Math.random() < 0.7;
                
                setTimeout(() => {
                    displayChoiceBubble(activeSpinner.id, spinnerChoice);
                    displayChoiceBubble(activeTarget.id, targetChoice);
                    setTimeout(evaluateResults, 1500);
                }, 1500);
            }
        }

        function showHumanKissControls(titleText) {
            document.getElementById('kiss-prompt-title').innerText = titleText;
            document.getElementById('action-kiss-panel').style.display = "flex";
        }

        // Выбор сделан реальным пользователем
        function submitHumanChoice(choice) {
            document.getElementById('action-kiss-panel').style.display = "none";
            
            if (activeSpinner.id === 0) {
                spinnerChoice = choice;
            } else if (activeTarget.id === 0) {
                targetChoice = choice;
            }

            // Показываем бабблы выбора на экране
            displayChoiceBubble(activeSpinner.id, spinnerChoice);
            displayChoiceBubble(activeTarget.id, targetChoice);

            setTimeout(evaluateResults, 1200);
        }

        function displayChoiceBubble(playerId, isYes) {
            const bubble = document.getElementById(`choice-${playerId}`);
            bubble.innerText = isYes ? "❤️ Да" : "❌ Нет";
            bubble.style.background = isYes ? "#2ecc71" : "#e74c3c";
            bubble.style.color = "#ffffff";
            bubble.style.display = "block";
        }

        // Подсчет итогов взаимности
        function evaluateResults() {
            const mutual = spinnerChoice && targetChoice;

            if (mutual) {
                document.getElementById('game-status').innerText = "Взаимный поцелуй! Найс! 💋";
                spawnHeartsAnimation();
                
                // Начисляем поцелуй, если в процессе участвовал ТЫ
                if (activeSpinner.id === 0 || activeTarget.id === 0) {
                    myKisses++;
                    localStorage.setItem('saved_kisses', myKisses);
                    document.getElementById('kiss-value').innerText = myKisses;
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }
            } else {
                document.getElementById('game-status').innerText = "Поцелуй не состоялся... 💔";
            }

            // Ждем 2 секунды демонстрации результата и возвращаем всех на места
            setTimeout(returnSeatsToOrbit, 2000);
        }

        // Возвращение игроков на исходные позиции
        function returnSeatsToOrbit() {
            players.forEach(p => {
                document.getElementById(`seat-${p.id}`).style.transform = `translate(${p.x}px, ${p.y}px)`;
                document.getElementById(`choice-${p.id}`).style.display = 'none';
            });

            // Передаем ход следующему по кругу
            currentTurnIndex = (currentTurnIndex + 1) % players.length;
            setTimeout(nextTurn, 800);
        }

        // Анимация разлетающихся сердечек из центра
        function spawnHeartsAnimation() {
            const stage = document.getElementById('stage');
            for (let i = 0; i < 12; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-fx';
                heart.innerText = ['❤️', '💖', '💝', '😘'][Math.floor(Math.random() * 4)];
                
                // Случайные векторы разлета во все стороны
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 90;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                heart.style.setProperty('--x', `${x}px`);
                heart.style.setProperty('--y', `${y}px`);
                
                // Смещение точки спавна (центр)
                heart.style.left = 'calc(50% - 15px)';
                heart.style.top = 'calc(50% - 15px)';

                stage.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }

        // Запуск симуляции при загрузке страницы
        window.onload = initPositions;
    </script>
</body>
</html>
